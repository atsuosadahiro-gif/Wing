
<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>鳥の2枚翼 超リアル版 + メーター</title>
<style>
  html, body {
    margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden;
    background: #07111b; color: #eaf6ff;
    font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
  }
  #wrap { position: fixed; inset: 0; display: grid; grid-template-rows: auto 1fr; }
  #ui {
    background: linear-gradient(180deg, rgba(4,16,25,.96), rgba(5,20,32,.90));
    border-bottom: 1px solid rgba(255,255,255,.08);
    padding: 10px 12px 8px;
    backdrop-filter: blur(6px);
    z-index: 10;
  }
  .row { display:flex; align-items:center; gap:10px; margin:8px 0; flex-wrap:wrap; }
  label { min-width:108px; font-size:16px; }
  input[type="range"] { width:180px; max-width:46vw; }
  button {
    background:#113042; color:#d7e9ff; border:1px solid rgba(255,255,255,.12);
    border-radius:12px; padding:10px 16px; font-size:15px;
  }
  .pill {
    display:inline-block; font-size:12px; padding:3px 8px; border-radius:999px;
    background:rgba(77,163,255,.10); border:1px solid rgba(77,163,255,.22); color:#cfe6ff;
  }
  #msg { color:#b7c9d8; font-size:13px; line-height:1.35; margin-top:6px; }
  canvas { width:100%; height:100%; display:block; touch-action:none; }
</style>
</head>
<body>
<div id="wrap">
  <div id="ui">
    <div class="row">
      <label>羽ばたき振幅</label>
      <input id="amp" type="range" min="10" max="120" value="44" />
    </div>
    <div class="row">
      <label>周波数</label>
      <input id="freq" type="range" min="20" max="180" value="58" />
    </div>
    <div class="row">
      <label>迎角ねじり</label>
      <input id="twist" type="range" min="0" max="100" value="44" />
    </div>
    <div class="row">
      <label>渦の強さ</label>
      <input id="strength" type="range" min="10" max="160" value="52" />
      <button id="reset">リセット</button>
      <span class="pill">超リアル版</span>
    </div>
    <div id="msg">
      左右2枚翼に加え、頭・胴体・尾羽・軽い前傾、前後の重なり差、羽根の層、翼端羽のしなりを強化した版です。左上に簡易の揚力・推力メーターを表示します。
    </div>
  </div>
  <canvas id="cv"></canvas>
</div>

<script>
(() => {
  const canvas = document.getElementById('cv');
  const ctx = canvas.getContext('2d', { alpha: false });

  const ampEl = document.getElementById('amp');
  const freqEl = document.getElementById('freq');
  const twistEl = document.getElementById('twist');
  const strengthEl = document.getElementById('strength');
  const resetBtn = document.getElementById('reset');

  let W = 0, H = 0, DPR = Math.min(devicePixelRatio || 1, 2);
  let vortices = [];
  let tracers = [];
  let touches = [];
  let simT = 0;
  let prevStrokeVel = 0;
  let emissionCooldown = 0;
  let liftVal = 0, thrustVal = 0, liftAvg = 0, thrustAvg = 0;

  const MAX_VORTICES = 62;
  const MAX_TRACERS = 760;
  const rand = (a,b) => a + Math.random() * (b-a);

  function resize() {
    const uiH = document.getElementById('ui').getBoundingClientRect().height;
    W = window.innerWidth;
    H = window.innerHeight - uiH;
    canvas.width = Math.floor(W * DPR);
    canvas.height = Math.floor(H * DPR);
    canvas.style.width = W + 'px';
    canvas.style.height = H + 'px';
    ctx.setTransform(DPR,0,0,DPR,0,0);
    seed();
  }

  function params() {
    return {
      amp: +ampEl.value,
      freq: +freqEl.value / 60,
      twist: +twistEl.value / 100,
      strength: +strengthEl.value / 100
    };
  }

  function wingState(t) {
    const p = params();
    const phase = t * p.freq * Math.PI * 2;

    const bodyX = W * 0.30 + Math.sin(phase) * 2.0;
    const bodyY0 = H * 0.50;
    const bob = p.amp * 0.08 * Math.sin(phase - 0.25);
    const bodyY = bodyY0 + bob;

    const pitch = -0.16 + 0.10 * Math.sin(phase + Math.PI/3);
    const torsoLean = 0.08 * Math.sin(phase + Math.PI/2);

    const shoulderSpan = Math.min(30, Math.max(14, W * 0.022));
    const shoulderLeftX = bodyX - shoulderSpan;
    const shoulderRightX = bodyX + shoulderSpan;
    const shoulderY = bodyY - 2 + p.amp * 0.84 * Math.sin(phase);

    const vy = p.amp * p.freq * Math.PI * 2 * Math.cos(phase);
    const downstroke = Math.max(0, Math.sin(phase));
    const upstroke = Math.max(0, -Math.sin(phase));

    const fold = 0.16 + 0.62 * upstroke;
    const spread = 0.72 + 0.44 * downstroke;

    const innerLen = Math.min(88, Math.max(52, W * 0.096)) * (0.92 + 0.10 * downstroke);
    const outerLen = Math.min(112, Math.max(68, W * 0.124)) * (1.00 - 0.30 * fold);
    const handLen  = Math.min(66, Math.max(34, W * 0.074)) * (1.03 - 0.16 * fold);

    const base = -0.32 + 0.36 * Math.sin(phase + Math.PI/2);
    const shoulderPitch = base + 0.22 * p.twist * Math.sin(phase + Math.PI/2);
    const elbowLag = 0.20 * Math.sin(phase + Math.PI/2 - 0.55);
    const wristLag = 0.26 * Math.sin(phase + Math.PI/2 - 1.0);

    const angInner = shoulderPitch;
    const angOuter = angInner + 0.34 * p.twist * (0.35 + 0.80 * downstroke) - 0.28 * fold + elbowLag;
    const angHand  = angOuter + 0.26 * p.twist * (0.20 + 0.95 * downstroke) - 0.36 * fold + wristLag;

    const tailFan = 0.24 + 0.26 * downstroke;
    const tailAngle = 0.16 + 0.08 * Math.sin(phase + Math.PI * 0.75);

    return {
      phase, vy, downstroke, upstroke, fold, spread,
      bodyX, bodyY, shoulderLeftX, shoulderRightX, shoulderY,
      innerLen, outerLen, handLen,
      angInner, angOuter, angHand,
      pitch, torsoLean, tailFan, tailAngle
    };
  }

  function seed() {
    tracers.length = 0;
    vortices.length = 0;
    for (let i=0; i<MAX_TRACERS; i++) {
      const x = rand(0, W), y = rand(0, H);
      tracers.push({
        x, y, px:x, py:y,
        age: rand(0, 160),
        life: rand(70, 150),
        a: rand(0.035, 0.10)
      });
    }
  }

  function resetAll() {
    simT = 0;
    prevStrokeVel = 0;
    emissionCooldown = 0;
    touches.length = 0;
    liftVal = thrustVal = liftAvg = thrustAvg = 0;
    seed();
  }

  function emitVortex(x, y, gamma, r) {
    vortices.push({ x, y, gamma, r, age:0, life:rand(2.8, 5.1) });
    if (vortices.length > MAX_VORTICES) {
      vortices.splice(0, vortices.length - MAX_VORTICES);
    }
  }

  function velocityAt(x, y) {
    const p = params();
    let u = 22 + p.freq * 10;
    let v = 0;

    for (const q of vortices) {
      const dx = x - q.x, dy = y - q.y;
      const rr = dx*dx + dy*dy + q.r*q.r;
      const f = q.gamma / rr;
      u += -dy * f;
      v +=  dx * f;
    }

    for (const tp of touches) {
      const dx = x - tp.x, dy = y - tp.y;
      const rr = dx*dx + dy*dy + 220;
      const pull = 600 / rr;
      u += tp.vx * pull;
      v += tp.vy * pull;
    }
    return { u, v };
  }

  function computeForces() {
    let lift = 0, thrust = 0, n = 0;
    const x0 = W * 0.16, x1 = W * 0.82;
    const y0 = H * 0.18, y1 = H * 0.82;

    for (const tr of tracers) {
      if (tr.x < x0 || tr.x > x1 || tr.y < y0 || tr.y > y1) continue;
      const vel = velocityAt(tr.x, tr.y);
      lift += -vel.v;
      thrust += vel.u;
      n++;
    }
    liftVal = n ? lift / n : 0;
    thrustVal = n ? thrust / n : 0;
    liftAvg = liftAvg * 0.92 + liftVal * 0.08;
    thrustAvg = thrustAvg * 0.92 + thrustVal * 0.08;
  }

  function wingJoints(ws, side) {
    const shoulderX = side < 0 ? ws.shoulderLeftX : ws.shoulderRightX;
    const shoulderY = ws.shoulderY;

    const a1 = side < 0 ? Math.PI - ws.angInner : ws.angInner;
    const a2 = side < 0 ? Math.PI - ws.angOuter : ws.angOuter;
    const a3 = side < 0 ? Math.PI - ws.angHand  : ws.angHand;

    const elbowX = shoulderX + Math.cos(a1) * ws.innerLen;
    const elbowY = shoulderY + Math.sin(a1) * ws.innerLen;
    const wristX = elbowX + Math.cos(a2) * ws.outerLen;
    const wristY = elbowY + Math.sin(a2) * ws.outerLen;
    const tipX = wristX + Math.cos(a3) * ws.handLen;
    const tipY = wristY + Math.sin(a3) * ws.handLen;

    return { shoulderX, shoulderY, elbowX, elbowY, wristX, wristY, tipX, tipY, a1, a2, a3 };
  }

  function step(dt) {
    simT += dt;
    const p = params();
    const ws = wingState(simT);
    emissionCooldown -= dt;

    const left = wingJoints(ws, -1);
    const right = wingJoints(ws, +1);

    const strokeSign = Math.sign(ws.vy || 1);
    const signFlip = Math.sign(prevStrokeVel || 1) !== strokeSign;
    prevStrokeVel = ws.vy;

    if (signFlip || (Math.abs(ws.vy) > 60 && emissionCooldown <= 0)) {
      const gamma = (-strokeSign) * (24 + 76 * p.strength + 36 * p.twist);
      const r = 13 + 10 * p.twist;

      for (const wing of [left, right]) {
        emitVortex(wing.tipX, wing.tipY, gamma, r);
        emitVortex(wing.tipX + rand(-8, 8), wing.tipY + strokeSign * rand(4, 10), -gamma * 0.30, r * 0.84);
        emitVortex(wing.wristX + rand(-6, 6), wing.wristY + strokeSign * rand(2, 8), gamma * 0.35, r * 0.72);
      }

      emissionCooldown = 0.16 + (1.0 - p.freq) * 0.05;
    }

    for (let i=vortices.length-1; i>=0; i--) {
      const q = vortices[i];
      q.age += dt;
      if (q.age > q.life) {
        vortices.splice(i,1);
        continue;
      }

      let u = 24 + p.freq * 11;
      let v = 0;
      for (let j=0; j<vortices.length; j++) {
        if (i===j) continue;
        const o = vortices[j];
        const dx = q.x - o.x, dy = q.y - o.y;
        const rr = dx*dx + dy*dy + o.r*o.r;
        const f = o.gamma / rr;
        u += -dy * f * 0.30;
        v +=  dx * f * 0.30;
      }
      q.x += u * dt;
      q.y += v * dt;
      q.gamma *= Math.pow(0.985, dt * 60);
      q.r += 1.0 * dt * 60;

      if (q.x > W + 80 || q.x < -80 || q.y < -90 || q.y > H + 90) {
        vortices.splice(i,1);
      }
    }

    for (const tr of tracers) {
      tr.age += dt * 60;
      tr.px = tr.x; tr.py = tr.y;
      const vel = velocityAt(tr.x, tr.y);
      tr.x += vel.u * dt;
      tr.y += vel.v * dt;

      if (tr.x < -15 || tr.x > W + 15 || tr.y < -15 || tr.y > H + 15 || tr.age > tr.life) {
        tr.x = rand(-10, W * 0.14);
        tr.y = rand(0, H);
        tr.px = tr.x; tr.py = tr.y;
        tr.age = 0; tr.life = rand(70,150);
      }
    }

    for (let i=touches.length-1; i>=0; i--) {
      touches[i].life -= dt;
      if (touches[i].life <= 0) touches.splice(i,1);
    }

    computeForces();
  }

  function drawBackground() {
    ctx.fillStyle = '#07111b';
    ctx.fillRect(0,0,W,H);

    ctx.strokeStyle = 'rgba(70,140,210,0.030)';
    ctx.lineWidth = 1;
    for (let y=0; y<H; y+=18) {
      ctx.beginPath();
      ctx.moveTo(0,y);
      for (let x=0; x<=W; x+=24) {
        ctx.lineTo(x, y + Math.sin((x*0.018)+(y*0.014)+simT*0.9)*1.2);
      }
      ctx.stroke();
    }
  }

  function drawTracers() {
    for (const tr of tracers) {
      const k = 1 - tr.age / tr.life;
      ctx.strokeStyle = `rgba(220,235,255,${0.036 + tr.a * k})`;
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(tr.px, tr.py);
      ctx.lineTo(tr.x, tr.y);
      ctx.stroke();
    }
  }

  function drawVortices() {
    for (const q of vortices) {
      const k = 1 - q.age / q.life;
      const r = Math.max(4, q.r * 0.38);

      ctx.fillStyle = q.gamma > 0
        ? `rgba(110,180,255,${0.045 * k})`
        : `rgba(255,135,180,${0.045 * k})`;
      ctx.beginPath();
      ctx.arc(q.x, q.y, r * 1.5, 0, Math.PI * 2);
      ctx.fill();

      ctx.strokeStyle = q.gamma > 0
        ? `rgba(130,190,255,${0.13 * k})`
        : `rgba(255,150,190,${0.13 * k})`;
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.arc(q.x, q.y, r, 0, Math.PI * 1.5);
      ctx.stroke();
    }
  }

  function drawWingFromJoints(ws, joint, side, depthScale=1) {
    const shoulderX = joint.shoulderX, shoulderY = joint.shoulderY;
    const elbowX = joint.elbowX, elbowY = joint.elbowY;
    const wristX = joint.wristX, wristY = joint.wristY;
    const tipX = joint.tipX, tipY = joint.tipY;
    const a1 = joint.a1, a2 = joint.a2, a3 = joint.a3;

    const innerWidth = 22 * ws.spread * depthScale;
    const outerWidth = 18 * (1 - 0.22 * ws.fold) * depthScale;
    const handWidth  = 11 * (1 - 0.35 * ws.fold) * depthScale;

    const nx1 = -Math.sin(a1), ny1 = Math.cos(a1);
    const nx2 = -Math.sin(a2), ny2 = Math.cos(a2);
    const nx3 = -Math.sin(a3), ny3 = Math.cos(a3);

    ctx.save();
    ctx.lineJoin = 'round';
    ctx.lineCap = 'round';

    const g1 = ctx.createLinearGradient(shoulderX, shoulderY, elbowX, elbowY);
    g1.addColorStop(0, `rgba(210,235,255,${0.84*depthScale})`);
    g1.addColorStop(1, `rgba(110,175,245,${0.72*depthScale})`);
    ctx.fillStyle = g1;
    ctx.strokeStyle = `rgba(230,245,255,${0.18*depthScale})`;
    ctx.lineWidth = 1.0;

    ctx.beginPath();
    ctx.moveTo(shoulderX + nx1 * innerWidth * 0.40, shoulderY + ny1 * innerWidth * 0.40);
    ctx.quadraticCurveTo(
      shoulderX + Math.cos(a1) * ws.innerLen * 0.34 + nx1 * innerWidth * 0.18,
      shoulderY + Math.sin(a1) * ws.innerLen * 0.34 + ny1 * innerWidth * 0.18,
      elbowX + nx1 * innerWidth * 0.18, elbowY + ny1 * innerWidth * 0.18
    );
    ctx.lineTo(elbowX - nx1 * innerWidth * 0.32, elbowY - ny1 * innerWidth * 0.32);
    ctx.quadraticCurveTo(
      shoulderX + Math.cos(a1) * ws.innerLen * 0.24 - nx1 * innerWidth * 0.34,
      shoulderY + Math.sin(a1) * ws.innerLen * 0.24 - ny1 * innerWidth * 0.34,
      shoulderX - nx1 * innerWidth * 0.20, shoulderY - ny1 * innerWidth * 0.20
    );
    ctx.closePath();
    ctx.fill();
    ctx.stroke();

    const g2 = ctx.createLinearGradient(elbowX, elbowY, wristX, wristY);
    g2.addColorStop(0, `rgba(188,224,255,${0.78*depthScale})`);
    g2.addColorStop(1, `rgba(88,150,232,${0.66*depthScale})`);
    ctx.fillStyle = g2;
    ctx.beginPath();
    ctx.moveTo(elbowX + nx2 * outerWidth * 0.36, elbowY + ny2 * outerWidth * 0.36);
    ctx.quadraticCurveTo(
      elbowX + Math.cos(a2) * ws.outerLen * 0.42 + nx2 * outerWidth * 0.22,
      elbowY + Math.sin(a2) * ws.outerLen * 0.42 + ny2 * outerWidth * 0.22,
      wristX + nx2 * outerWidth * 0.10, wristY + ny2 * outerWidth * 0.10
    );
    ctx.lineTo(wristX - nx2 * outerWidth * 0.20, wristY - ny2 * outerWidth * 0.20);
    ctx.quadraticCurveTo(
      elbowX + Math.cos(a2) * ws.outerLen * 0.40 - nx2 * outerWidth * 0.20,
      elbowY + Math.sin(a2) * ws.outerLen * 0.40 - ny2 * outerWidth * 0.20,
      elbowX - nx2 * outerWidth * 0.34, elbowY - ny2 * outerWidth * 0.34
    );
    ctx.closePath();
    ctx.fill();
    ctx.stroke();

    const g3 = ctx.createLinearGradient(wristX, wristY, tipX, tipY);
    g3.addColorStop(0, `rgba(198,230,255,${0.76*depthScale})`);
    g3.addColorStop(1, `rgba(95,158,238,${0.62*depthScale})`);
    ctx.fillStyle = g3;
    ctx.beginPath();
    ctx.moveTo(wristX + nx3 * handWidth * 0.34, wristY + ny3 * handWidth * 0.34);
    ctx.quadraticCurveTo(
      wristX + Math.cos(a3) * ws.handLen * 0.44 + nx3 * handWidth * 0.20,
      wristY + Math.sin(a3) * ws.handLen * 0.44 + ny3 * handWidth * 0.20,
      tipX + nx3 * handWidth * 0.04, tipY + ny3 * handWidth * 0.04
    );
    ctx.lineTo(tipX - nx3 * handWidth * 0.14, tipY - ny3 * handWidth * 0.14);
    ctx.quadraticCurveTo(
      wristX + Math.cos(a3) * ws.handLen * 0.42 - nx3 * handWidth * 0.16,
      wristY + Math.sin(a3) * ws.handLen * 0.42 - ny3 * handWidth * 0.16,
      wristX - nx3 * handWidth * 0.32, wristY - ny3 * handWidth * 0.32
    );
    ctx.closePath();
    ctx.fill();
    ctx.stroke();

    for (let i=0; i<5; i++) {
      const k = i / 4;
      const bx = elbowX + Math.cos(a2) * (ws.outerLen * (0.12 + 0.13 * k));
      const by = elbowY + Math.sin(a2) * (ws.outerLen * (0.12 + 0.13 * k));
      const dir = side < 0 ? -1 : 1;
      const fang = a2 + dir * (-0.10 + 0.08 * i) + dir * 0.06 * ws.downstroke;
      const flen = 18 + 6 * k + 6 * ws.spread;
      const fwid = 4.6 - 0.6 * k;
      const tx = bx + Math.cos(fang) * flen;
      const ty = by + Math.sin(fang) * flen;
      const fnx = -Math.sin(fang), fny = Math.cos(fang);

      ctx.fillStyle = `rgba(186,222,255,${(0.36 - 0.03 * k)*depthScale})`;
      ctx.beginPath();
      ctx.moveTo(bx + fnx * fwid, by + fny * fwid);
      ctx.quadraticCurveTo(
        bx + Math.cos(fang) * flen * 0.52 + fnx * fwid * 0.6,
        by + Math.sin(fang) * flen * 0.52 + fny * fwid * 0.6,
        tx, ty
      );
      ctx.quadraticCurveTo(
        bx + Math.cos(fang) * flen * 0.42 - fnx * fwid * 0.4,
        by + Math.sin(fang) * flen * 0.42 - fny * fwid * 0.4,
        bx - fnx * fwid * 0.7, by - fny * fwid * 0.7
      );
      ctx.closePath();
      ctx.fill();
    }

    const featherCount = 7;
    for (let i=0; i<featherCount; i++) {
      const k = i / (featherCount - 1);
      const baseX = wristX + Math.cos(a3) * (ws.handLen * (0.16 + 0.10 * k));
      const baseY = wristY + Math.sin(a3) * (ws.handLen * (0.16 + 0.10 * k));
      const dir = side < 0 ? -1 : 1;
      const fang = a3 + dir * (-0.38 + 0.14 * i) + dir * 0.24 * ws.downstroke - dir * 0.18 * ws.upstroke;
      const flen = 30 + 16 * k + 13 * ws.spread;
      const curve = 0.12 + 0.16 * ws.downstroke;
      const fwid = 5.6 - 0.7 * k;

      const tx = baseX + Math.cos(fang) * flen;
      const ty = baseY + Math.sin(fang) * flen;
      const fnx = -Math.sin(fang), fny = Math.cos(fang);

      ctx.fillStyle = `rgba(190,224,255,${(0.72 - 0.06 * k)*depthScale})`;
      ctx.strokeStyle = `rgba(225,242,255,${0.13*depthScale})`;
      ctx.lineWidth = 0.8;

      ctx.beginPath();
      ctx.moveTo(baseX + fnx * fwid, baseY + fny * fwid);
      ctx.quadraticCurveTo(
        baseX + Math.cos(fang) * flen * (0.52 + curve) + fnx * fwid * 0.7,
        baseY + Math.sin(fang) * flen * (0.52 + curve) + fny * fwid * 0.7,
        tx, ty
      );
      ctx.quadraticCurveTo(
        baseX + Math.cos(fang) * flen * 0.46 - fnx * fwid * 0.45,
        baseY + Math.sin(fang) * flen * 0.46 - fny * fwid * 0.45,
        baseX - fnx * fwid * 0.72, baseY - fny * fwid * 0.72
      );
      ctx.closePath();
      ctx.fill();
      ctx.stroke();
    }

    ctx.restore();
  }

  function drawBody(ws) {
    ctx.save();
    ctx.translate(ws.bodyX, ws.bodyY);
    ctx.rotate(ws.pitch);

    const bodyGrad = ctx.createRadialGradient(-8, -6, 1, 0, 0, 44);
    bodyGrad.addColorStop(0, 'rgba(226,240,255,0.94)');
    bodyGrad.addColorStop(0.38, 'rgba(122,182,248,0.76)');
    bodyGrad.addColorStop(1, 'rgba(40,100,185,0.08)');
    ctx.fillStyle = bodyGrad;
    ctx.beginPath();
    ctx.ellipse(0, 2, 34, 40, 0, 0, Math.PI*2);
    ctx.fill();

    ctx.fillStyle = 'rgba(184,222,255,0.36)';
    ctx.beginPath();
    ctx.ellipse(-26, -10, 11, 14, 0.15, 0, Math.PI*2);
    ctx.fill();

    ctx.fillStyle = 'rgba(30,55,84,0.78)';
    ctx.beginPath();
    ctx.arc(-30, -12, 1.8, 0, Math.PI*2);
    ctx.fill();

    ctx.fillStyle = 'rgba(220,190,120,0.62)';
    ctx.beginPath();
    ctx.moveTo(-38, -10);
    ctx.lineTo(-48, -8);
    ctx.lineTo(-38, -4);
    ctx.closePath();
    ctx.fill();

    // chest highlight
    ctx.strokeStyle = 'rgba(235,245,255,0.18)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(-20, 0);
    ctx.quadraticCurveTo(6, 12, 22, 8);
    ctx.stroke();

    // tail
    const tailBaseX = 24, tailBaseY = 8;
    const tailCount = 5;
    for (let i=0; i<tailCount; i++) {
      const k = i / (tailCount - 1);
      const fang = Math.PI - 0.20 + (-ws.tailFan + ws.tailFan * 2 * k) + ws.tailAngle;
      const flen = 24 + 10 * (1 - Math.abs(k - 0.5) * 2);
      const fwid = 4.5;
      const bx = tailBaseX;
      const by = tailBaseY + (k - 0.5) * 4;
      const tx = bx + Math.cos(fang) * flen;
      const ty = by + Math.sin(fang) * flen;
      const fnx = -Math.sin(fang), fny = Math.cos(fang);

      ctx.fillStyle = 'rgba(176,216,252,0.62)';
      ctx.beginPath();
      ctx.moveTo(bx + fnx * fwid, by + fny * fwid);
      ctx.quadraticCurveTo(
        bx + Math.cos(fang) * flen * 0.56 + fnx * fwid * 0.4,
        by + Math.sin(fang) * flen * 0.56 + fny * fwid * 0.4,
        tx, ty
      );
      ctx.quadraticCurveTo(
        bx + Math.cos(fang) * flen * 0.44 - fnx * fwid * 0.35,
        by + Math.sin(fang) * flen * 0.44 - fny * fwid * 0.35,
        bx - fnx * fwid * 0.6, by - fny * fwid * 0.6
      );
      ctx.closePath();
      ctx.fill();
    }

    ctx.restore();
  }

  function drawBird() {
    const ws = wingState(simT);
    const left = wingJoints(ws, -1);
    const right = wingJoints(ws, +1);

    // slight depth: left wing behind, right wing in front
    drawWingFromJoints(ws, left, -1, 0.90);
    drawBody(ws);
    drawWingFromJoints(ws, right, +1, 1.00);
  }

  function drawMeter() {
    const boxX = 10, boxY = 10, boxW = 190, boxH = 86;
    ctx.fillStyle = 'rgba(4,12,20,0.68)';
    ctx.fillRect(boxX, boxY, boxW, boxH);
    ctx.strokeStyle = 'rgba(180,220,255,0.16)';
    ctx.lineWidth = 1;
    ctx.strokeRect(boxX, boxY, boxW, boxH);

    ctx.fillStyle = 'rgba(230,245,255,0.92)';
    ctx.font = '13px system-ui, sans-serif';
    ctx.fillText(`↑ 揚力: ${liftVal.toFixed(2)}`, boxX + 10, boxY + 22);
    ctx.fillText(`→ 推力: ${thrustVal.toFixed(2)}`, boxX + 10, boxY + 44);
    ctx.fillText(`平均 揚力: ${liftAvg.toFixed(2)}`, boxX + 10, boxY + 66);
    ctx.fillText(`平均 推力: ${thrustAvg.toFixed(2)}`, boxX + 10, boxY + 84);

    const liftBar = Math.max(-50, Math.min(50, liftAvg * 2.0));
    const thrustBar = Math.max(0, Math.min(90, thrustAvg * 1.0));
    ctx.fillStyle = 'rgba(90,170,255,0.75)';
    ctx.fillRect(boxX + 122, boxY + 13, Math.max(0, liftBar), 6);
    ctx.fillStyle = 'rgba(255,150,190,0.75)';
    ctx.fillRect(boxX + 122, boxY + 35, thrustBar, 6);
  }

  function drawLabel() {
    ctx.fillStyle = 'rgba(210,225,240,0.22)';
    ctx.font = '12px system-ui, sans-serif';
    ctx.fillText('鳥の左右2枚翼 超リアル版 + メーター', 10, H - 12);
  }

  let lastStamp = performance.now();
  function loop(now) {
    const dt = Math.min(0.033, (now - lastStamp) / 1000);
    lastStamp = now;

    step(dt);
    drawBackground();
    drawTracers();
    drawVortices();
    drawBird();
    drawMeter();
    drawLabel();

    requestAnimationFrame(loop);
  }

  function pointerPos(ev) {
    const r = canvas.getBoundingClientRect();
    if (ev.touches && ev.touches.length) {
      return Array.from(ev.touches).map(t => ({ x: t.clientX - r.left, y: t.clientY - r.top }));
    }
    return [{ x: ev.clientX - r.left, y: ev.clientY - r.top }];
  }

  let lastTouchPts = [];
  function handleTouch(ev) {
    const pts = pointerPos(ev);
    const next = [];
    for (let i=0; i<pts.length; i++) {
      const p = pts[i];
      const prev = lastTouchPts[i] || p;
      next.push(p);
      touches.push({
        x: p.x, y: p.y,
        vx: (p.x - prev.x) * 7,
        vy: (p.y - prev.y) * 7,
        life: 0.20
      });
    }
    lastTouchPts = next;
    ev.preventDefault();
  }
  function endTouch() { lastTouchPts = []; }

  canvas.addEventListener('touchstart', handleTouch, { passive:false });
  canvas.addEventListener('touchmove', handleTouch, { passive:false });
  canvas.addEventListener('touchend', endTouch, { passive:false });
  canvas.addEventListener('mousedown', (e) => handleTouch(e));
  canvas.addEventListener('mousemove', (e) => { if (e.buttons) handleTouch(e); });
  canvas.addEventListener('mouseup', endTouch);

  resetBtn.addEventListener('click', resetAll);
  window.addEventListener('resize', resize);

  resize();
  resetAll();
  requestAnimationFrame(loop);
})();
</script>
</body>
</html>
