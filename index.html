  const mainT = getPectoralisForceAlignedTendonStart(side, o.keelMidSurface, ins.main, "main", 0.78, t);
  const caudalT = getPectoralisForceAlignedTendonStart(side, o.keelCaudalSurface, ins.caudal, "caudal", 0.80, t);
  const origins = [

    o.keelMidSurface.clone().lerp(o.keelCaudalSurface, 0.48).add(new THREE.Vector3(side * fanOut, -0.006 - 0.005 * caudalPhase - 0.002 * rearTorsion, -0.006 + rearTorsion)),
    o.keelCaudalSurface.clone().add(new THREE.Vector3(side * 0.006, 0.002, -0.020 + 0.45 * rearTorsion))
  ];
  const bellyA = [
    origins[0].clone().lerp(cranialT, 0.42).add(new THREE.Vector3(side * (0.020 + 0.018*t), lift + 0.002 * wave, 0.018 + 0.40 * torsion)),
    origins[1].clone().lerp(cranialT.clone().lerp(mainT, 0.40), 0.46).add(new THREE.Vector3(side * (0.038 + 0.022*t), lift - 0.004 - 0.004 * t, 0.006 + 0.85 * torsion)),
    origins[2].clone().lerp(mainT.clone().lerp(caudalT, 0.45), 0.46).add(new THREE.Vector3(side * (0.040 + 0.022*t), lift - 0.006 - 0.006 * t, -0.006 + 0.90 * rearTorsion)),
    origins[3].clone().lerp(caudalT, 0.42).add(new THREE.Vector3(side * (0.022 + 0.014*t), lift + 0.001 * rearWave, -0.018 + 0.55 * rearTorsion))
  ];
  const bellyB = [
    origins[0].clone().lerp(cranialT, 0.70).add(new THREE.Vector3(side * (0.016 + 0.012*t), lift - 0.003 - 0.002*t, 0.012 + 0.55 * torsion)),
    origins[1].clone().lerp(mainT, 0.70).add(new THREE.Vector3(side * (0.026 + 0.015*t), lift - 0.005 - 0.006*t, 0.004 + 0.95 * torsion)),
    origins[2].clone().lerp(mainT, 0.72).add(new THREE.Vector3(side * (0.026 + 0.015*t), lift - 0.006 - 0.007*t, -0.006 + 0.95 * rearTorsion)),
    origins[3].clone().lerp(caudalT, 0.70).add(new THREE.Vector3(side * (0.016 + 0.010*t), lift - 0.003 - 0.002*t, -0.012 + 0.55 * rearTorsion))

}
function updatePectoralisSurfaceMesh(mesh, side, drive, tLive) {
  const power = drive && drive.tendon ? drive.tendon.pectoralis : 0;
  const pts = getPectoralisSurfacePoints(side, power, tLive);
  const arr = mesh.geometry.attributes.position.array;
  for (let i = 0; i < pts.length; i++) {
    arr[i*3+0] = pts[i].x;
    arr[i*3+1] = pts[i].y;
    arr[i*3+2] = pts[i].z;

  mesh.geometry.attributes.position.needsUpdate = true;
  mesh.geometry.computeVertexNormals();
  applyMuscleActivationVisual(mesh, power, {

    maxOpacity: 0.88,
    contractColor: 0x8a0000,
    colorGain: 0.38,

}

}
function getPectoralisOrigins(side) {

  const mid = getThoracicPoint("sternumMid");

function getSupracoracoideusTendonPathPoints(side, power=0) {

  const origin = pose.originCenter;
  const tension = clamp01(power || 0);
  const snap = Math.pow(tension, 1.55);

  // 解剖学的には筋腹は深層で大きく移動しないため、腱の張力・三骨管での折れ返り・上腕骨背側停止の移動を強調表示する。

  // Step97: 腱線の始点も竜骨起始そのものに置く。ここが浮くと「青い線の起始が浮く」ように見える。
  const p0 = origin.clone();
  const p1 = origin.clone().lerp(canal, 0.70).add(new THREE.Vector3(side * (0.004 + 0.006*snap), 0.008 + 0.020*snap, 0.010 + 0.016*snap));
  const p2 = canal.clone().add(new THREE.Vector3(side * (-0.010 - 0.004*snap), 0.004 + 0.018*snap, 0.008 + 0.016*snap));
  const p3 = canal.clone().add(new THREE.Vector3(side * -0.002*snap, 0.010*snap, 0.010*snap));
  const p4 = canal.clone().lerp(insertion, 0.30).add(new THREE.Vector3(side * (-0.012 - 0.010*snap), 0.030 + 0.040*snap, 0.022 + 0.032*snap));
  const p5 = canal.clone().lerp(insertion, 0.64).add(new THREE.Vector3(side * (-0.007 - 0.006*snap), 0.018 + 0.028*snap, 0.012 + 0.022*snap));
  const p6 = insertion.clone().add(new THREE.Vector3(side * -0.004*snap, 0.010*snap, 0.008*snap));

function getSupracoracoideusTendonStart(side, origin, pulley, insertion, kind="main", ratio=0.62, localPower=0) {

function musclePhasePulse(tLive, delay=0, sharpness=1.0) {

}

  const delay = kind === "cranial" ? 0.03 : (kind === "caudal" ? 0.34 : 0.18);
  const pulse = musclePhasePulse(tLive - 0.22, delay, 1.45);

function getSupracoracoideusPhasedActivation(drive, tLive) {
  const mu = drive && drive.muscle ? drive.muscle : {};
  const base = Math.max(mu.supra || 0, mu.supraForce || 0);
  const pulse = musclePhasePulse(tLive - 0.22, Math.PI + 0.10, 1.30);
  return clamp01(base * 0.72 + pulse * 0.28);

function getDeltoidPhasedActivation(fiberKey, drive, tLive) {
  const sh = drive && drive.shoulder ? drive.shoulder : { lift:0, sweep:0, twist:0 };
  const mu = drive && drive.muscle ? drive.muscle : {};
  const fallback = 0.24 + 0.30 * Math.abs(sh.sweep) + 0.18 * Math.abs(sh.lift) + 0.14 * Math.abs(sh.twist);
  let base = fiberKey === "anterior" ? (mu.deltoidAnterior ?? fallback) : (fiberKey === "posterior" ? (mu.deltoidPosterior ?? fallback) : (mu.deltoidMiddle ?? fallback));

  muscleInspectionGroup.add(line);
  return line;
}
function getDeltoidPower(fiberKey, drive, tLive=null) {
  const sh = drive && drive.shoulder ? drive.shoulder : { lift:0, sweep:0, twist:0 };
  const mu = drive && drive.muscle ? drive.muscle : {};

  // Step107: 三角筋は三束で微小な時間差を持たせる。
  // 古い呼び出しでも落ちないよう、tLiveがない場合は従来値へ戻す。
  const fallback = 0.24 + 0.30 * Math.abs(sh.sweep) + 0.18 * Math.abs(sh.lift) + 0.14 * Math.abs(sh.twist);
  if (tLive == null) {
    if (fiberKey === "anterior") return clamp01((mu.deltoidAnterior ?? fallback) + 0.06 * Math.max(0, sh.sweep));
    if (fiberKey === "posterior") return clamp01((mu.deltoidPosterior ?? fallback) + 0.06 * Math.max(0, -sh.sweep));
    return clamp01((mu.deltoidMiddle ?? fallback) + 0.05 * Math.abs(sh.lift));
  }
  let p = getDeltoidPhasedActivation(fiberKey, drive, tLive);
  if (fiberKey === "anterior") p += 0.06 * Math.max(0, sh.sweep);
  if (fiberKey === "posterior") p += 0.06 * Math.max(0, -sh.sweep);
  if (fiberKey === "middle") p += 0.05 * Math.abs(sh.lift);
  return clamp01(p);
}
function updateDeltoidFanMesh(mesh, side, drive, tLive) {
  const o = getDeltoidOriginSet(side);
  const insertion = getDeltoidInsertionPoint(side);
  const keys = ["anterior", "middle", "posterior"];
  const origins = keys.map(k => o[k]);
  const arr = mesh.geometry.attributes.position.array;
  const pulse = 0.006 * Math.sin(tLive * 1.8 + (side < 0 ? 0.3 : 0.8));
  for (let i = 0; i < 3; i++) {
    const p = origins[i];
    const pwr = getDeltoidPower(keys[i], drive, tLive);
    arr[i*3+0] = p.x;
    arr[i*3+1] = p.y + 0.002 * pwr;
    arr[i*3+2] = p.z;
    const q = insertion.clone().lerp(p, 0.18 + 0.040 * pwr);
    q.x += side * (0.006 + pulse) * (1.0 + 0.35 * pwr);
    q.y += 0.006 * pwr;
    q.z += (i - 1) * 0.006;
    const j = i + 3;
    arr[j*3+0] = q.x;
    arr[j*3+1] = q.y;
    arr[j*3+2] = q.z;
  }
  mesh.geometry.attributes.position.needsUpdate = true;
  mesh.geometry.computeVertexNormals();
  const power = (getDeltoidPower("anterior", drive, tLive) + getDeltoidPower("middle", drive, tLive) + getDeltoidPower("posterior", drive, tLive)) / 3;
  applyMuscleActivationVisual(mesh, power, {
    minOpacity: 0.54,
    maxOpacity: 0.94,
    contractColor: 0x9a3d00,
    colorGain: 0.30,
    emissiveGain: 0.10
  });
}
function updateDeltoidFiberLine(line, side, drive, tLive) {
  const origins = getDeltoidOriginSet(side);
  const key = line.userData.fiberKey || "middle";
  const origin = origins[key] || origins.middle;
  const insertion = getDeltoidInsertionPoint(side);
  const pwr = getDeltoidPower(key, drive, tLive);
  const mid1 = origin.clone().lerp(insertion, 0.36 + 0.025 * pwr).add(new THREE.Vector3(side * (0.010 + 0.004 * pwr), 0.014 * pwr, key === "anterior" ? 0.010 : (key === "posterior" ? -0.010 : 0.0)));
  const mid2 = origin.clone().lerp(insertion, 0.70 + 0.018 * pwr).add(new THREE.Vector3(side * (0.012 + 0.003 * pwr), 0.010 * pwr, key === "anterior" ? 0.006 : (key === "posterior" ? -0.006 : 0.0)));
  const pts = [origin, mid1, mid2, insertion];
  const arr = line.geometry.attributes.position.array;
  for (let i = 0; i < pts.length; i++) {
    arr[i*3+0] = pts[i].x;
    arr[i*3+1] = pts[i].y;
    arr[i*3+2] = pts[i].z;
  }
  line.geometry.attributes.position.needsUpdate = true;
  applyMuscleActivationVisual(line, pwr, {
    minOpacity: 0.52,
    maxOpacity: 0.96,
    contractColor: 0x9a3d00,
    colorGain: 0.32
  });
}


// Step59: 姿勢制御筋。大胸筋・烏口上筋の駆動とは分け、肩甲骨を胸郭に固定する薄い支持筋として描く。
function getPosturalMusclePoints(side) {
  const neckBase = getThoracicPoint("spineThoracic1").add(new THREE.Vector3(0, 0.034, 0.010));
  const upperThorax = getThoracicPoint("spineThoracic2").add(new THREE.Vector3(0, 0.026, -0.012));
  const midThorax = getThoracicPoint("spineThoracic4").add(new THREE.Vector3(0, 0.018, -0.036));
  const scapMid = getShoulderRigWorldPoint(side, "scapulaMid");
  const scapTip = getShoulderRigWorldPoint(side, "scapulaTip");
  const glenoid = getShoulderRigWorldPoint(side, "glenoid");
  // Step60: ribLateral2/3/4 は定義済みpointsではなく、肋骨仕様から外側点を合成する。
  const rib1 = getThoracicRibLateralPoint(side, 2).add(new THREE.Vector3(side * 0.010, -0.004, 0.012));
  const rib2 = getThoracicRibLateralPoint(side, 3).add(new THREE.Vector3(side * 0.012, -0.006, -0.010));
  const rib3 = getThoracicRibLateralPoint(side, 4).add(new THREE.Vector3(side * 0.014, -0.008, -0.032));
  return { neckBase, upperThorax, midThorax, scapMid, scapTip, glenoid, ribs: [rib1, rib2, rib3] };
}
function addTrapeziusSheet(name, side) {

  geo.setAttribute("normal", new THREE.BufferAttribute(new Float32Array(6 * 3), 3));
  geo.setIndex([0, 1, 4, 0, 4, 3, 1, 2, 5, 1, 5, 4]);
  const mat = MUSCLE_MATS.trapezius.clone();
  mat.side = THREE.DoubleSide;
  mat.transparent = true;
  mat.opacity = 0.0;
  mat.depthWrite = false;
  const mesh = new THREE.Mesh(geo, mat);
  mesh.name = name;
  mesh.userData.muscleFamily = "postural";

  muscleInspectionGroup.add(mesh);
  return mesh;
}
function updateTrapeziusSheet(mesh, side, drive, tLive) {
  const p = getPosturalMusclePoints(side);

  const lift = 0.010 * power;
  const arr = mesh.geometry.attributes.position.array;
  const pts = [
    p.neckBase,
    p.upperThorax,
    p.midThorax,
    p.glenoid.clone().lerp(p.scapMid, 0.40).add(new THREE.Vector3(side * 0.010, lift, 0.010)),
    p.scapMid.clone().add(new THREE.Vector3(side * 0.012, lift, 0.000)),
    p.scapTip.clone().add(new THREE.Vector3(side * 0.010, lift * 0.65, -0.006))
  ];
  for (let i = 0; i < pts.length; i++) {
    arr[i*3+0] = pts[i].x;
    arr[i*3+1] = pts[i].y;
    arr[i*3+2] = pts[i].z;
  }
  mesh.geometry.attributes.position.needsUpdate = true;
  mesh.geometry.computeVertexNormals();
  applyMuscleActivationVisual(mesh, power, { minOpacity: 0.40, maxOpacity: 0.82, contractColor: 0x5b168a, colorGain: 0.32, emissiveGain: 0.10 });
}
function addSerratusLine(name, side, ribIndex) {
  const geo = new THREE.BufferGeometry();
  geo.setAttribute("position", new THREE.BufferAttribute(new Float32Array(5 * 3), 3));
  const mat = new THREE.LineBasicMaterial({ color: 0x55d6a8, transparent: true, opacity: 0.0, depthWrite: false });
  const line = new THREE.Line(geo, mat);
  line.name = name;
  line.userData.muscleFamily = "postural";

function updateSerratusLine(line, side, drive) {
  const p = getPosturalMusclePoints(side);
  const idx = line.userData.ribIndex || 0;
  const power = drive && drive.muscle ? drive.muscle.serratus : 0.46;
  const rib = p.ribs[Math.max(0, Math.min(p.ribs.length - 1, idx))];
  const target = idx === 0 ? p.glenoid.clone().lerp(p.scapMid, 0.60) : (idx === 1 ? p.scapMid : p.scapTip.clone().lerp(p.scapMid, 0.50));
  const press = new THREE.Vector3(side * (0.006 + 0.004 * idx), 0.004 * power, -0.006 * power);
  const mid1 = rib.clone().lerp(target, 0.34).add(new THREE.Vector3(side * 0.012, -0.003, 0.012 - 0.008 * idx));
  const mid2 = rib.clone().lerp(target, 0.62).add(press);
  const mid3 = rib.clone().lerp(target, 0.82).add(new THREE.Vector3(side * 0.004, 0.002 * power, -0.004 * power));
  const pts = [rib, mid1, mid2, mid3, target];
  const arr = line.geometry.attributes.position.array;
  for (let i = 0; i < pts.length; i++) {
    arr[i*3+0] = pts[i].x;
    arr[i*3+1] = pts[i].y;
    arr[i*3+2] = pts[i].z;
  }
  line.geometry.attributes.position.needsUpdate = true;
  applyMuscleActivationVisual(line, power, { minOpacity: 0.46, maxOpacity: 0.94, contractColor: 0x006a4e, colorGain: 0.28, emissiveGain: 0.08 });
}

function setCapsuleBetweenDynamic(mesh, a, b, radialScale=1.0, lengthScale=1.0) {
  const dir = new THREE.Vector3().subVectors(b, a);
  const len = Math.max(0.0001, dir.length());
  mesh.position.copy(a).add(b).multiplyScalar(0.5);
  mesh.quaternion.setFromUnitVectors(new THREE.Vector3(0, 1, 0), dir.clone().normalize());
  const baseLen = mesh.userData.baseLength || len;
  mesh.scale.set(radialScale, (len / baseLen) * lengthScale, radialScale);
}
function registerDynamicMuscleBundle(mesh, side, originKey, insertionKind) {

  mesh.userData.insertionKind = insertionKind;

}

function buildMuscleInspectionLayer() {
  muscleInspectionGroup.clear();
  muscleParts.length = 0;

  // 中央起始ランドマーク：竜骨の一点ではなく、竜骨面として読めるように複数点を置く。
  const originCenter = getThoracicPoint("sternumMid").lerp(getThoracicPoint("keelTip"), 0.56);
  addMuscleAnchor("pectoralis_origin_keel_surface_center", originCenter, 0.026, MUSCLE_MATS.anchor, 0.86).userData.anchorKind = "origin";
  addMuscleAnchor("pectoralis_origin_sternum_cranial", getThoracicPoint("sternumCranial"), 0.018, MUSCLE_MATS.anchor, 0.70).userData.anchorKind = "origin";
  addMuscleAnchor("pectoralis_origin_keel_caudal", getThoracicPoint("keelCaudal"), 0.018, MUSCLE_MATS.anchor, 0.70).userData.anchorKind = "origin";

  for (const side of [-1, 1]) {
    const prefix = side < 0 ? "L" : "R";
    const origins = getPectoralisOrigins(side);
    const insertionMain = staticHumerusInsertionPoint(side, 0.24, -0.038, 0.020);
    const insertionCranial = staticHumerusInsertionPoint(side, 0.18, -0.030, 0.034);
    const insertionCaudal = staticHumerusInsertionPoint(side, 0.30, -0.045, 0.006);

    const ins = addMuscleAnchor(prefix + "_pectoralis_insertion_humerus_ventral_crest", insertionMain, 0.022, MUSCLE_MATS.tendon, 0.90);
    ins.userData.anchorKind = "insertion";
    ins.userData.side = side;
    ins.userData.insertionKind = "main";

    addMuscleAnchor(prefix + "_pectoralis_origin_keel_cranial_surface", origins.keelCranialSurface, 0.014, MUSCLE_MATS.anchor, 0.68).userData.anchorKind = "origin";
    addMuscleAnchor(prefix + "_pectoralis_origin_keel_mid_surface", origins.keelMidSurface, 0.017, MUSCLE_MATS.anchor, 0.74).userData.anchorKind = "origin";
    addMuscleAnchor(prefix + "_pectoralis_origin_keel_caudal_surface", origins.keelCaudalSurface, 0.014, MUSCLE_MATS.anchor, 0.66).userData.anchorKind = "origin";

    const aponeurosis = makePectoralisAponeurosisMesh(prefix + "_pectoralis_aponeurosis_fan_sheet", side);
    const aponeurosisEdge = makeAponeurosisEdgeLine(prefix + "_pectoralis_aponeurosis_edge_line", side);
    updatePectoralisAponeurosisMesh(aponeurosis, side, 0);
    updatePectoralisAponeurosisEdge(aponeurosisEdge, side, 0);
    const pectoralisSurface = makePectoralisSurfaceMesh(prefix + "_pectoralis_broad_keel_origin_surface_sheet", side);
    updatePectoralisSurfaceMesh(pectoralisSurface, side, { tendon: { pectoralis: 0 } }, 0);

    // 主束：竜骨中部〜上腕骨近位腹側稜。筋腹は停止点まで届かせず、腱板に受け渡す。
    const mainTendonStart = origins.keelMidSurface.clone().lerp(insertionMain, 0.78);
    const main = addMuscleBundle(
      prefix + "_pectoralis_major_belly_keel_mid_to_tendon",
      origins.keelMidSurface,
      mainTendonStart,
      0.046,
      MUSCLE_MATS.pectoralis,
      0.80,
      side < 0 ? 0.00 : 0.10,
      1.28
    );
    registerDynamicMuscleBundle(main, side, "keelMidSurface", "main");
    main.userData.segmentRole = "belly";
    main.userData.tendonStartRatio = 0.78;

    const mainTendon = addMuscleBundle(
      prefix + "_pectoralis_major_white_tendon_to_humerus_crest",
      mainTendonStart,
      insertionMain,
      0.0105,
      MUSCLE_MATS.tendon,
      0.86,
      side < 0 ? 0.55 : 0.65,
      0.0
    );
    registerDynamicMuscleBundle(mainTendon, side, "keelMidSurface", "main");
    mainTendon.userData.segmentRole = "tendon";
    mainTendon.userData.tendonStartRatio = 0.78;

    // 前束：胸骨前方〜上腕骨近位。薄い筋腹から短い腱へ移行する。
    const cranialTendonStart = origins.keelCranialSurface.clone().lerp(insertionCranial, 0.82);
    const cranial = addMuscleBundle(
      prefix + "_pectoralis_cranial_belly_sternum_to_tendon",
      origins.keelCranialSurface,
      cranialTendonStart,
      0.031,
      MUSCLE_MATS.pectoralis,
      0.66,
      side < 0 ? 0.22 : 0.32,
      0.95
    );
    registerDynamicMuscleBundle(cranial, side, "keelCranialSurface", "cranial");
    cranial.userData.segmentRole = "belly";
    cranial.userData.tendonStartRatio = 0.82;

    const cranialTendon = addMuscleBundle(
      prefix + "_pectoralis_cranial_white_tendon_to_humerus_crest",
      cranialTendonStart,
      insertionCranial,
      0.0075,
      MUSCLE_MATS.tendon,
      0.76,
      side < 0 ? 0.62 : 0.72,
      0.0
    );
    registerDynamicMuscleBundle(cranialTendon, side, "keelCranialSurface", "cranial");
    cranialTendon.userData.segmentRole = "tendon";
    cranialTendon.userData.tendonStartRatio = 0.82;

    // 後束：竜骨後方〜上腕骨稜。細い筋腹から停止腱へ収束する。
    const caudalTendonStart = origins.keelCaudalSurface.clone().lerp(insertionCaudal, 0.80);
    const caudal = addMuscleBundle(
      prefix + "_pectoralis_caudal_belly_keel_to_tendon",
      origins.keelCaudalSurface,
      caudalTendonStart,
      0.027,
      MUSCLE_MATS.pectoralis,
      0.58,
      side < 0 ? 0.42 : 0.52,
      0.86
    );
    registerDynamicMuscleBundle(caudal, side, "keelCaudalSurface", "caudal");
    caudal.userData.segmentRole = "belly";
    caudal.userData.tendonStartRatio = 0.80;

    const caudalTendon = addMuscleBundle(
      prefix + "_pectoralis_caudal_white_tendon_to_humerus_crest",
      caudalTendonStart,
      insertionCaudal,
      0.0070,
      MUSCLE_MATS.tendon,
      0.72,
      side < 0 ? 0.70 : 0.80,
      0.0
    );
    registerDynamicMuscleBundle(caudalTendon, side, "keelCaudalSurface", "caudal");
    caudalTendon.userData.segmentRole = "tendon";
    caudalTendon.userData.tendonStartRatio = 0.80;

    // 烏口上筋：大胸筋とは別形式。3束に分けず、深層の短い筋塊＋滑車輪＋曲がる腱で表す。
    // 「大胸筋と同じ扇状筋腹」ではなく、三骨管で腱の向きが反転する構造を優先する。
    const supraPose = getSupracoracoideusDeepBellyPose(side, 0);
    addMuscleAnchor(prefix + "_supracoracoideus_deep_origin_mass_center", supraPose.originCenter, 0.014, MUSCLE_MATS.supracoracoideus, 0.58).userData.anchorKind = "supra_origin_center";
    const supraInsertion = getSupracoracoideusInsertionPoint(side);
    const insertionAnchor = addMuscleAnchor(prefix + "_supracoracoideus_single_dorsal_humerus_insertion", supraInsertion, 0.015, MUSCLE_MATS.tendon, 0.80);
    insertionAnchor.userData.anchorKind = "supra_single_insertion";
    insertionAnchor.userData.side = side;

    addSupracoracoideusDeepBelly(prefix + "_supracoracoideus_deep_oval_belly_mass", side);
    addSupracoracoideusTendonSheath(prefix + "_supracoracoideus_triosseal_canal_sheath_ring", side);
    addSupracoracoideusTendonCurve(prefix + "_supracoracoideus_sternum_to_dorsal_humerus_tendon", side);
    // Step97: 翼から背中へ伸びて見えた青い直線は、筋肉ではなく力線デバッグなので作成しない。
    // addSupracoracoideusForceRod(prefix + "_supracoracoideus_blue_force_rod_length_to_shoulder", side);

    // 三角筋：肩外側を覆う薄い扇状筋。大胸筋・烏口上筋と混ざらない独立形式。
    addMuscleAnchor(prefix + "_deltoid_origin_scapular_arc", getDeltoidOriginSet(side).middle, 0.012, MUSCLE_MATS.deltoidFiber, 0.62).userData.anchorKind = "deltoid_origin";
    addMuscleAnchor(prefix + "_deltoid_insertion_humerus_lateral", getDeltoidInsertionPoint(side), 0.012, MUSCLE_MATS.deltoidFiber, 0.66).userData.anchorKind = "deltoid_insertion";
    makeDeltoidFanMesh(prefix + "_deltoid_thin_fan_sheet", side);
    makeDeltoidFiberLine(prefix + "_deltoid_anterior_fiber_line", side, "anterior");
    makeDeltoidFiberLine(prefix + "_deltoid_middle_fiber_line", side, "middle");
    makeDeltoidFiberLine(prefix + "_deltoid_posterior_fiber_line", side, "posterior");

    // 姿勢制御系：僧帽筋＋前鋸筋。肩甲骨を胸郭へ固定し、翼基部の浮きを抑える。
    addMuscleAnchor(prefix + "_trapezius_neck_origin", getPosturalMusclePoints(side).neckBase, 0.010, MUSCLE_MATS.trapezius, 0.54).userData.anchorKind = "postural_origin";
    addTrapeziusSheet(prefix + "_trapezius_thin_back_sheet", side);
    for (let ri = 0; ri < 3; ri++) addSerratusLine(prefix + "_serratus_rib_to_scapula_line_" + ri, side, ri);
  }
}
buildMuscleInspectionLayer();

function updateMuscleInspectionLayer(tLive, bodyPhys) {
  if (!muscleInspectionGroup.visible) return;

  // Step42: 表示用の筋肉も、翼と同じdriveStateを読む。
  const basePhase = tLive - 0.22;
  const drive = getWingDriveState(basePhase);
  const impulse = drive.shoulder.spread;

  function pectoralisBundlePower(kind) {
    return getPectoralisPhasedActivation(kind || "main", drive, tLive);
  }

  for (const m of muscleParts) {
    const baseOpacity = m.userData.muscleOpacity || 0.72;
    const phase = m.userData.phase || 0;
    const bulge = m.userData.bulge || 1.0;

    if (m.userData.role === "pectoralis_surface_sheet") {
      updatePectoralisSurfaceMesh(m, m.userData.side || 1, drive, tLive);
      continue;
    }
    if (m.userData.role === "aponeurosis") {
      updatePectoralisAponeurosisMesh(m, m.userData.side || 1, impulse);
      continue;
    }
    if (m.userData.role === "aponeurosis_edge") {
      updatePectoralisAponeurosisEdge(m, m.userData.side || 1, impulse);
      continue;
    }

    if (m.userData.role === "anchor") {
      if (m.userData.anchorKind === "insertion") {
        const side = m.userData.side || 1;
        m.position.copy(getDynamicHumerusInsertionPoint(side, 0.24, -0.038, 0.020));
      } else if (m.userData.anchorKind === "supra_pulley") {
        const side = m.userData.side || 1;
        m.position.copy(getSupracoracoideusPulleyPoint(side));
      } else if (m.userData.anchorKind === "supra_insertion") {
        const side = m.userData.side || 1;
        const insertions = getSupracoracoideusInsertionSet(side);
        m.position.copy(insertions[m.userData.insertionKind || "main"] || getSupracoracoideusInsertionPoint(side));
      } else if (m.userData.anchorKind === "supra_single_insertion") {
        const side = m.userData.side || 1;
        m.position.copy(getSupracoracoideusInsertionPoint(side));
      }
      const p = 1.0 + 0.055 * impulse;
      m.scale.setScalar(p);
      m.material.opacity = baseOpacity * (0.72 + 0.28 * impulse);
      if (m.material.emissive) m.material.emissive.copy(m.material.color).multiplyScalar(0.035 + 0.10 * impulse);
      continue;
    }

    if (m.userData.muscleFamily === "supracoracoideus") {
      const side = m.userData.side || 1;
      const supraPower = getSupracoracoideusPhasedActivation(drive, tLive);
      const segmentRole = m.userData.segmentRole || "deep_belly_mass";
      if (segmentRole === "deep_belly_mass") {
        updateSupracoracoideusDeepBelly(m, side, supraPower, tLive);
      } else if (segmentRole === "pulley_tendon_curve") {
        updateSupracoracoideusPulleyTendonLine(m, side, supraPower);
      } else if (segmentRole === "pulley_sheath_ring") {
        updateSupracoracoideusPulleySheath(m, side, supraPower);
      } else if (segmentRole === "force_rod") {
        // Step97: 青い力線は筋肉確認から除外。古い保存版から残っても表示しない。
        m.visible = false;
        if (m.material) { m.material.opacity = 0.0; m.material.needsUpdate = true; }
      }
      continue;
    }

    if (m.userData.muscleFamily === "deltoid") {
      const side = m.userData.side || 1;
      const segmentRole = m.userData.segmentRole || "fan_sheet";
      if (segmentRole === "fan_sheet") updateDeltoidFanMesh(m, side, drive, tLive);
      else if (segmentRole === "fiber_line") updateDeltoidFiberLine(m, side, drive, tLive);
      continue;
    }

    if (m.userData.muscleFamily === "postural") {
      const side = m.userData.side || 1;
      const segmentRole = m.userData.segmentRole || "trapezius_sheet";
      if (segmentRole === "trapezius_sheet") updateTrapeziusSheet(m, side, drive, tLive);
      else if (segmentRole === "serratus_line") updateSerratusLine(m, side, drive);
      continue;
    }

    const side = m.userData.side || 1;
    const origins = getPectoralisOrigins(side);
    let from = origins[m.userData.originKey] ? origins[m.userData.originKey].clone() : m.userData.from.clone();
    let to = getDynamicHumerusInsertionPoint(side, 0.24, -0.038, 0.020);
    if (m.userData.insertionKind === "cranial") to = getDynamicHumerusInsertionPoint(side, 0.18, -0.030, 0.034);
    if (m.userData.insertionKind === "caudal") to = getDynamicHumerusInsertionPoint(side, 0.30, -0.045, 0.006);
    const tendonStartRatio = typeof m.userData.tendonStartRatio === "number" ? m.userData.tendonStartRatio : 0.78;
    const segmentRole = m.userData.segmentRole || "belly";
    const localPower = pectoralisBundlePower(m.userData.insertionKind || "main");
    const tendonStart = getPectoralisForceAlignedTendonStart(
      side,
      from,
      to,
      m.userData.insertionKind || "main",
      tendonStartRatio,
      localPower
    );
    if (segmentRole === "tendon") {
      from = tendonStart;
    } else {
      to = tendonStart;
    }

    if (segmentRole === "tendon") {
      // 腱は白く細く、収縮で太らない。対応する筋束の張力だけを薄く反映する。
      setCapsuleBetweenDynamic(m, from, to, 1.0, 1.0);
      applyMuscleActivationVisual(m, localPower, {
        tendon: true,
        minOpacity: 0.82,
        maxOpacity: 0.98,
        colorGain: 0.22,
        emissiveGain: 0.04
      });
    } else {
      // 筋腹だけが束ごとの位相で膨隆・発光し、少し短縮する。
      // 前束→中束→後束の順に力が流れて見える。
      const finePulse = 0.018 * Math.sin(tLive * 1.7 + phase);
      const radialPulse = 1.0 + (0.22 * localPower + finePulse) * bulge;
      const shorten = 1.0 - 0.058 * localPower;
      setCapsuleBetweenDynamic(m, from, to, radialPulse, shorten);
      applyMuscleActivationVisual(m, localPower, {
        minOpacity: 0.62,
        maxOpacity: 1.00,
        contractColor: 0x7a0000,
        colorGain: 0.46,
        emissiveGain: 0.18
      });
    }
  }
}

// 軽量CFD風可視化：重い格子計算は行わず、翼下の後流リボンと翼端渦だけを描く。
// 目的は「空気を押している向き」を見ることで、圧力場・流線・粒子の全面計算は戻さない。
const cfdVizGroup = new THREE.Group();
cfdVizGroup.visible = false;
scene.add(cfdVizGroup);

const cfdLineMat = new THREE.LineBasicMaterial({
  color: 0x5aa8ff,
  transparent: true,
  opacity: 0.30,
  depthWrite: false
});
const cfdVortexMat = new THREE.LineBasicMaterial({
  color: 0xffffff,
  transparent: true,
  opacity: 0.32,
  depthWrite: false
});
const cfdRibbons = [];
const cfdVortices = [];
const CFD_POINTS = 18;

function makeCfdRibbon(side, index, count) {
  const geo = new THREE.BufferGeometry();
  geo.setAttribute("position", new THREE.BufferAttribute(new Float32Array(CFD_POINTS * 3), 3));
  const line = new THREE.Line(geo, cfdLineMat.clone());
  line.userData.side = side;
  line.userData.index = index;
  line.userData.count = count;
  line.userData.phase = index * 0.73 + (side < 0 ? 0.2 : 1.1);
  cfdVizGroup.add(line);
  cfdRibbons.push(line);
}

function makeCfdVortex(side, index) {
  const pts = 32;
  const geo = new THREE.BufferGeometry();
  geo.setAttribute("position", new THREE.BufferAttribute(new Float32Array(pts * 3), 3));
  const line = new THREE.LineLoop(geo, cfdVortexMat.clone());
  line.userData.side = side;
  line.userData.index = index;
  line.userData.phase = index * 1.4 + (side < 0 ? 0.4 : 1.7);
  cfdVizGroup.add(line);
  cfdVortices.push(line);
}

for (const side of [-1, 1]) {
  for (let i = 0; i < 9; i++) makeCfdRibbon(side, i, 9);
  for (let i = 0; i < 3; i++) makeCfdVortex(side, i);
}

const tmpCfdS = new THREE.Vector3();
const tmpCfdW = new THREE.Vector3();
const tmpCfdT = new THREE.Vector3();
const tmpCfdRootToTip = new THREE.Vector3();

function updateLightCfdViz(leftW, rightW, t) {
  if (!cfdVizGroup.visible) return;
  const wings = [leftW, rightW];
  const down = Math.max(0, Math.sin(t));
  const up = Math.max(0, -Math.sin(t));
  const driveCfd = getWingDriveState(t - 0.22);
  const aeroCfd = driveCfd && driveCfd.aero ? driveCfd.aero : { dragLoad: 0, liftLoad: 0, effectiveArea: 1 };
  const impulse = 0.35 + 0.75 * down + 0.20 * Math.abs(Math.cos(t)) + 0.35 * clamp01((aeroCfd.dragLoad || 0) + (aeroCfd.liftLoad || 0));
  let ribbonCursor = 0;
  let vortexCursor = 0;

  for (const w of wings) {
    w.shoulder.getWorldPosition(tmpCfdS);
    w.wrist.getWorldPosition(tmpCfdW);
    w.tip.getWorldPosition(tmpCfdT);
    tmpCfdRootToTip.subVectors(tmpCfdT, tmpCfdS);

    for (let i = 0; i < 9; i++, ribbonCursor++) {
      const line = cfdRibbons[ribbonCursor];
      const q = i / 8;
      const span = 0.18 + q * 0.76;
      const base = tmpCfdS.clone().lerp(tmpCfdT, span);
      const arr = line.geometry.attributes.position.array;
      const sideOffset = w.side * (q - 0.5) * 0.08;
      const phase = line.userData.phase;
      const alpha = 0.16 + 0.30 * down + 0.10 * (1.0 - q);
      line.material.opacity = alpha;

      for (let p = 0; p < CFD_POINTS; p++) {
        const u = p / (CFD_POINTS - 1);
        // 後流は翼の下方＋少し後方へ流す。外翼ほど巻き込みを大きくする。
        const curl = Math.sin(u * Math.PI * 2.0 + t * 1.6 + phase) * (0.035 + 0.060 * q) * (0.35 + impulse);
        const wakeDrop = u * (0.34 + 0.34 * impulse + 0.10 * (aeroCfd.effectiveArea || 1)) * (0.65 + 0.55 * q);
        const wakeBack = u * (0.16 + 0.18 * impulse) + 0.025 * Math.sin(t + phase);
        const wakeSide = sideOffset + w.side * curl + w.side * 0.035 * up * q;
        arr[p*3+0] = base.x + wakeSide;
        arr[p*3+1] = base.y - wakeDrop;
        arr[p*3+2] = base.z - wakeBack - 0.05 * u * q;
      }
      line.geometry.attributes.position.needsUpdate = true;
    }

    for (let j = 0; j < 3; j++, vortexCursor++) {
      const ring = cfdVortices[vortexCursor];
      const q = 0.72 + j * 0.105;
      const center = tmpCfdS.clone().lerp(tmpCfdT, q);
      const arr = ring.geometry.attributes.position.array;
      const pts = arr.length / 3;
      const radius = (0.080 + 0.030 * j) * (0.80 + 0.50 * down);
      const squash = 0.55 + 0.20 * Math.sin(t + ring.userData.phase);
      ring.material.opacity = 0.10 + 0.28 * down + 0.08 * Math.abs(Math.cos(t));
      for (let p = 0; p < pts; p++) {
        const a = (p / pts) * Math.PI * 2 + t * 0.55 * w.side + ring.userData.phase;
        arr[p*3+0] = center.x + w.side * Math.cos(a) * radius;
        arr[p*3+1] = center.y - 0.10 - j * 0.045 + Math.sin(a) * radius * squash;
        arr[p*3+2] = center.z - 0.10 - j * 0.060 + Math.sin(a + Math.PI/2) * radius * 0.28;
      }
      ring.geometry.attributes.position.needsUpdate = true;
    }
  }
}

const vS = new THREE.Vector3();
const vE = new THREE.Vector3();
const vW = new THREE.Vector3();
const vT = new THREE.Vector3();

function setVertex(arr, i, v) {
  arr[i*3] = v.x;
  arr[i*3+1] = v.y;
  arr[i*3+2] = v.z;
}

const tmpAxisA = new THREE.Vector3();
const tmpAxisB = new THREE.Vector3();
const tmpAxisMid = new THREE.Vector3();
const tmpAxisDir = new THREE.Vector3();
function updateCylinderBetween(mesh, a, b, radiusScale=1.0) {
  if (!mesh) return;
  tmpAxisDir.subVectors(b, a);
  const len = tmpAxisDir.length();
  if (!Number.isFinite(len) || len < 1e-5) {
    mesh.visible = false;
    return;
  }
  mesh.visible = true;
  tmpAxisMid.copy(a).add(b).multiplyScalar(0.5);
  mesh.position.copy(tmpAxisMid);
  mesh.quaternion.setFromUnitVectors(new THREE.Vector3(0, 1, 0), tmpAxisDir.normalize());
  mesh.scale.set(radiusScale, len, radiusScale);
}


function updateCarpometacarpusVisuals(w, wrist, tip, t, up, down, turn) {
  const g = w && w.carpo;
  if (!g || !g.userData) return;
  // Step87: 羽に沿って見える手根中手骨〜初列風切根元ベクトルは、
  // 筋肉確認では筋腹・腱の読解を邪魔するため非表示にする。
  // 骨格確認 / 骨格＋CFD では構造確認用として残す。
  const modeId = getDisplayMode().id;
  const visible = (modeId === "skeleton" || modeId === "all");
  g.visible = visible;
  for (const child of g.children) child.visible = visible;
  if (!visible) return;
  const side = w.side;
  const handAxis = tip.clone().sub(wrist);
  const handLen = handAxis.length();
  if (!Number.isFinite(handLen) || handLen < 1e-5) { g.visible = false; return; }
  handAxis.multiplyScalar(1.0 / handLen);
  const dorsal = new THREE.Vector3(0, 1, 0);
  const lateral = new THREE.Vector3().crossVectors(handAxis, dorsal);
  if (lateral.lengthSq() < 1e-5) lateral.set(side, 0, 0);
  lateral.normalize().multiplyScalar(side);
  const downVec = dorsal.clone().multiplyScalar(-1);
  function railPoint(q, offset=0) {
    const p = wrist.clone().lerp(tip, q);
    p.addScaledVector(lateral, offset);
    p.addScaledVector(downVec, 0.010 + 0.018 * q);
    p.z += 0.012 * Math.sin(t + q * 5.0) * (0.25 + 0.75 * turn);
    return p;
  }
  const base = railPoint(0.08, 0.000);
  const end = railPoint(0.95, 0.000);
  const minorA = railPoint(0.20, 0.035);
  const minorB = railPoint(0.86, 0.055 + 0.020 * up);
  updateCylinderBetween(g.userData.mainRail, base, end, 1.0);
  updateCylinderBetween(g.userData.minorRail, minorA, minorB, 1.0);
  g.userData.wristBlock.position.copy(base);
  g.userData.distalBlock.position.copy(end);
  const roots = g.userData.primaryRoots || [];
  for (let i = 0; i < roots.length; i++) {
    const r = roots[i];
    const q = Math.max(0.05, Math.min(0.98, (r.u - 0.70) / 0.30));
    const onRail = railPoint(0.18 + 0.72 * q, 0.030 + 0.055 * q + 0.020 * up);
    const featherBase = railPoint(0.18 + 0.72 * q, 0.080 + 0.105 * q + 0.060 * up);
    featherBase.addScaledVector(downVec, 0.035 + 0.020 * q + 0.025 * down);
    r.peg.position.copy(onRail);
    updateCylinderBetween(r.link, onRail, featherBase, 1.0);
  }
}

function updateBodySegmentSkeleton() {
  if (!bodySegmentRig || !bodySegmentRig.joints) return;
  const visible = isSkeletonDisplayMode();
  const j = bodySegmentRig.joints;
  const b = bodySegmentRig.bones;

  const thorax = bodyLocalPoint(chest, 0, -0.02, 0.12);
  const sternum = bodyLocalPoint(keel, 0, -0.06, 0.04);

  const tailBase = bodyLocalPoint(tailCone, 0, -0.01, -0.01);
  const tailTip = bodyLocalPoint(tailTipSleeve, 0, -0.005, -0.03);
  const neckP = bodyLocalPoint(neck, 0, 0.02, 0.02);
  const headP = bodyLocalPoint(head, 0, 0.00, 0.02);

  j.thorax.position.copy(thorax);
  j.sternum.position.copy(sternum);

  j.tailBase.position.copy(tailBase);
  j.tailTip.position.copy(tailTip);
  j.neck.position.copy(neckP);
  j.head.position.copy(headP);

  updateCylinderBetween(b.thoraxAbdomen, thorax, abdomenP, 1.0);
  updateCylinderBetween(b.abdomenTail, abdomenP, tailBase, 0.92);
  updateCylinderBetween(b.tailAxis, tailBase, tailTip, 0.76);
  updateCylinderBetween(b.thoraxSternum, thorax, sternum, 0.82);
  updateCylinderBetween(b.thoraxNeck, thorax, neckP, 0.72);
  updateCylinderBetween(b.neckHead, neckP, headP, 0.62);

  for (const part of [...Object.values(j), ...Object.values(b)]) {
    if (isMuscleDisplayMode() && isButtSphereHiddenKey(part)) {
      hideButtSphereObject(part);
      continue;
    }
    const base = visible && !(part.userData && part.userData.hideWhenUnifiedSpine);
    setSkeletonPartVisible(part, base, 0.78);
  }

  applyMuscleModeSkeletonExclusions();
}

function updateWingMotion(w, t) {
  const side = w.side;
  const tipLag = 0.34;
  const flap = Math.sin(t);
  const flapMid = Math.sin(t - tipLag * 0.5);
  const flapTip = Math.sin(t - tipLag);
  const sweep = Math.sin(t + Math.PI / 2);
  const sweepTip = Math.sin(t + Math.PI / 2 - tipLag);
  const twist = Math.sin(t + Math.PI);

  w.scap.rotation.z = side * (0.08 + 0.12 * Math.sin(t + 0.65));
  w.scap.rotation.x = 0.10 * Math.sin(t + 0.85);
  w.scap.rotation.y = side * 0.16 * Math.sin(t + 0.30);

  // Step45: 肩運動は筋肉→腱→慣性→迎角つき空気力を持つdriveから作る。
  const drive = getWingDriveState(t - 0.22);
  let down = drive.tendon.pectoralis;
  let up = drive.tendon.supra;

  // 迎角は空気力側で計算した値を翼姿勢にも戻す。
  // 根元は安定、翼端は少し遅れて強く返す。
  let aoaReal = 0.58 * drive.aero.aoaRoot + 0.32 * drive.aero.aoaTip - 0.08 * drive.aero.dragLoad;

  let verticalStroke = 0.30 * drive.shoulder.lift - 0.050 * drive.aero.liftLoad;
  let horizontalSweep = 0.82 * drive.shoulder.sweep;
  let figureEight = 0.20 * Math.sin(t * 2.0) + 0.10 * drive.shoulder.impulse + 0.05 * drive.aero.aoaCoeff;

  // 手首主導の返しも、烏口上筋腱張力と肩twistから作る。
  let wristLead = 0.70 * drive.shoulder.twist + 0.30 * Math.sin(t + 1.35 - tipLag * 0.7);
  let wristSnap = 0.78 * drive.shoulder.twist + 0.22 * Math.sin(t + Math.PI / 2.0 - tipLag);

  // 肩：筋腱駆動によって水平面を掃く
  w.shoulder.rotation.x = verticalStroke + aoaReal * 0.78;
  w.shoulder.rotation.y = side * (horizontalSweep + 0.08);
  w.shoulder.rotation.z = side * (0.44 + 0.25 * drive.shoulder.sweep + figureEight);

  // 肘：大きく畳まず、手首に遅れてしなる
  w.elbow.rotation.z = side * (-0.16 - 0.06 * Math.max(0, flapMid) + 0.10 * Math.sin(t + 0.95 - tipLag * 0.5));

  // 手首：主役。回内回外を強くし、上下ストロークで迎角を反転させる
  w.wrist.rotation.z = side * (0.58 * wristLead + 0.07 * sweepTip);
  w.wrist.rotation.x = 1.18 * wristSnap + 0.18 * Math.sin((t - tipLag) * 2.0);

  // 羽先側の追加しなり感：前フレーム速度を使い、速い切り返しほど羽先が遅れてたわむ。
  if (w.tip) {
    const speedFlex = Math.min(0.24, (w.speeds && w.speeds[3] ? w.speeds[3] : 0) * 6.5);
    const inertialLag = Math.sin(t + 2.05 - tipLag);
    w.tip.rotation.x = 0.44 * Math.sin(t + 1.65 - tipLag) - speedFlex * inertialLag;
    w.tip.rotation.z = side * (0.28 * Math.sin(t + 1.25 - tipLag) + 0.16 * speedFlex * Math.cos(t - tipLag));
  }
}

function updateWingGeometry(w, t) {
  w.root.updateWorldMatrix(true, true);
  w.shoulder.getWorldPosition(vS);
  w.elbow.getWorldPosition(vE);
  w.wrist.getWorldPosition(vW);
  w.tip.getWorldPosition(vT);

  const p = [vS.clone(), vE.clone(), vW.clone(), vT.clone()];

  if (w.prev) {
    for (let i = 0; i < 4; i++) {
      const d = p[i].distanceTo(w.prev[i]);
      w.speeds[i] = w.speeds[i] * 0.72 + d * 0.28;
    }
  }
  w.prev = p.map(q => q.clone());

  const arr = w.surface.geometry.attributes.position.array;
  const spanN = w.surface.userData.spanN || 9;
  const chordN = w.surface.userData.chordN || 3;

  const root = p[0], elbow = p[1], wrist = p[2], tip = p[3];

  const flapPhase = Math.sin(t);
  const down = Math.max(0, flapPhase);
  const up = Math.max(0, -flapPhase);
  const turn = Math.pow(1.0 - Math.abs(flapPhase), 2.0); // 上死点・下死点の返し
  // Step100: 翼面も筋腱・空力負荷を読む。強い振り下ろしでは面が張り、振り上げでは初列風切が逃げる。
  const driveGeom = getWingDriveState(t - 0.22);
  const pecTensionGeom = driveGeom && driveGeom.tendon ? driveGeom.tendon.pectoralis : down;
  const supraTensionGeom = driveGeom && driveGeom.tendon ? driveGeom.tendon.supra : up;
  const aeroLoadGeom = driveGeom && driveGeom.aero ? clamp01((driveGeom.aero.dragLoad || 0) + 0.6 * (driveGeom.aero.liftLoad || 0)) : 0;
  const aeroPulseGeom = clamp01(0.55 * pecTensionGeom + 0.30 * down + 0.25 * aeroLoadGeom);
  const recoveryDumpGeom = clamp01(0.65 * supraTensionGeom + 0.55 * up);
  updateCarpometacarpusVisuals(w, wrist, tip, t, up, down, turn);

  // 実物寄り：全翼を一様に拡大縮小しない。
  // 次列風切・内翼は比較的面を保ち、初列風切・外翼だけが大きく開閉する。
  const innerCoverts = 1.0 + 0.08 * down + 0.025 * aeroPulseGeom - 0.04 * up;
  const secondaryArea = 1.0 + 0.14 * down + 0.050 * aeroPulseGeom - 0.09 * up;
  const primaryArea = 1.0 + 0.23 * down + 0.075 * aeroPulseGeom - 0.31 * up - 0.08 * recoveryDumpGeom;

  // 振り上げでは羽軸間が開いて空気を逃がし、振り下げでは閉じて連続面に近づく。
  const slitBase = 0.010 + 0.018 * turn + 0.145 * up + 0.040 * recoveryDumpGeom - 0.010 * aeroPulseGeom;

  // 振り下げでは後縁側のキャンバーが増え、振り上げでは薄く逃げる。
  const camber = 0.035 * down + 0.020 * aeroPulseGeom - 0.020 * up;

  const tipLag = 0.34;
  const wristTwist = Math.sin(t + Math.PI / 2.0 - tipLag);
  const elasticWave = Math.sin(t + 1.45 - tipLag);
  const tipFlexWave = Math.sin(t + 1.10 - tipLag);

  function spanPoint(u) {
    if (u < 0.38) {
      return root.clone().lerp(elbow, u / 0.38);
    } else if (u < 0.70) {
      return elbow.clone().lerp(wrist, (u - 0.38) / 0.32);
    } else {
      return wrist.clone().lerp(tip, (u - 0.70) / 0.30);
    }
  }

  function smoothstep(a, b, x) {
    const q = Math.max(0, Math.min(1, (x - a) / (b - a)));
    return q * q * (3 - 2 * q);
  }

  function areaScaleAt(u) {
    const inner = 1.0 - smoothstep(0.22, 0.48, u);
    const mid = smoothstep(0.25, 0.55, u) * (1.0 - smoothstep(0.66, 0.84, u));
    const outer = smoothstep(0.62, 0.95, u);
    return innerCoverts * inner + secondaryArea * mid + primaryArea * outer + 1.0 * Math.max(0, 1.0 - inner - mid - outer);
  }

  function carpometacarpusRootPoint(u, edge=0) {
    const primaryLocal = smoothstep(0.64, 0.96, u);
    const q = Math.max(0, Math.min(1, (u - 0.70) / 0.30));
    const p = wrist.clone().lerp(tip, q);
    p.x += w.side * (0.018 + 0.045 * q + 0.030 * edge + 0.030 * up * primaryLocal);
    p.y -= 0.012 + 0.030 * primaryLocal + 0.018 * down;
    p.z += -0.012 * q + w.side * 0.010 * Math.sin(t + q * 4.5);
    return p;
  }

  // ベース翼面は「羽毛の重なりで作る準連続面」。振り上げで薄くし、空気抜けを視覚化。
  w.surface.material.opacity = wingTransparent ? (0.15 + 0.10 * down - 0.085 * up) : 0.85;

  for (let c = 0; c < chordN; c++) {
    const chord = c / (chordN - 1);
    for (let s = 0; s < spanN; s++) {
      const u = s / (spanN - 1);
      const idx = c * spanN + s;
      const base = spanPoint(u);

      const scaleU = areaScaleAt(u);
      const primary = smoothstep(0.64, 0.96, u);
      const secondary = smoothstep(0.30, 0.62, u) * (1.0 - primary);

      // 後縁幅：内翼は安定、外翼はアップストロークで強く閉じる。
      const baseWidth = (0.055 + 0.50 * Math.sin(Math.PI * u) + 0.18 * u);
      const chordWidth = baseWidth * chord * scaleU;

      const twistGain = Math.pow(u, 1.75);
      const tipDelayBoost = smoothstep(0.58, 1.00, u);
      const aeroTwistRelief = recoveryDumpGeom * primary * (0.18 + 0.16 * chord);
      const twistAngle = (0.16 + 1.22 * twistGain) * wristTwist + 0.34 * twistGain * elasticWave - aeroTwistRelief;
      const spanFlex = (0.055 + 0.028 * aeroLoadGeom) * tipDelayBoost * tipFlexWave * (0.35 + 0.65 * chord) + 0.020 * primary * recoveryDumpGeom * chord;

      // 実物寄りの「閉じる」方向：外翼の後縁が根元側・上側へ逃げる。
      const outerFold = up * primary * (0.22 + 0.05 * turn);
      const featherTuck = up * primary * chord * 0.18;

      const spread = w.side * ((0.055 * u + 0.34 * u * chord) * scaleU - outerFold - featherTuck);

      const chordArch = Math.sin(Math.PI * chord);
      const featherBundle = (0.020 + 0.030 * secondary + 0.040 * primary) * chordArch * (0.55 + 0.45 * down);
      const upperFluff = 0.018 * chordArch * (1.0 - 0.35 * up) + 0.010 * Math.sin(9.0 * u + t * 0.8) * chordArch;
      const trailingSoftness = 0.018 * chord * chord * (0.40 + 0.80 * primary) * (0.55 + 0.45 * up);

      const yDrop = chordWidth * Math.cos(twistAngle) - camber * chord * (0.4 + 0.8 * secondary + 1.1 * primary) - spanFlex - featherBundle - upperFluff + trailingSoftness;
      const zTwist = chordWidth * Math.sin(twistAngle) - 0.018 * up * primary * chord + w.side * 0.018 * chordArch * (secondary + primary) * Math.sin(t + u * 4.0);

      arr[idx*3+0] = base.x + spread;
      arr[idx*3+1] = base.y - yDrop;
      arr[idx*3+2] = base.z - 0.055 * s * chord + zTwist;
    }
  }

  // 羽毛スリット短冊：初列風切と次列風切で振る舞いを分ける
  const strips = w.surface.userData.featherStrips || [];
  for (let i = 0; i < strips.length; i++) {
    const strip = strips[i];
    const fc = strip.userData.count;
    const q0 = i / fc;
    const q1 = (i + 0.82) / fc;
    const u0 = 0.30 + q0 * 0.64;
    const u1 = 0.30 + q1 * 0.64;

    const b0 = spanPoint(u0);
    const b1 = spanPoint(u1);

    const localU = (u0 + u1) * 0.5;
    const primary = smoothstep(0.64, 0.96, localU);
    const secondary = smoothstep(0.30, 0.62, localU) * (1.0 - primary);
    const scaleU = areaScaleAt(localU);

    const twistGain = Math.pow(localU, 1.75);
    const tipDelayBoost = smoothstep(0.58, 1.00, localU);
    const featherLoadRelief = recoveryDumpGeom * primary * 0.24;
    const twistAngle = (0.16 + 1.30 * twistGain) * wristTwist + 0.38 * twistGain * elasticWave - featherLoadRelief;
    const spanFlex = (0.060 + 0.030 * aeroLoadGeom) * tipDelayBoost * tipFlexWave + 0.026 * recoveryDumpGeom * primary;

    // 初列は長く、振り上げで強くすぼむ。次列は面を保つ。
    const lengthBase = 0.18 + 0.38 * localU + 0.18 * primary + 0.05 * secondary;
    const length = lengthBase * scaleU;
    const gap = slitBase * (0.25 + 1.55 * primary + 0.55 * secondary) * (1.0 + 0.30 * recoveryDumpGeom);

    // 振り上げ時だけ羽が櫛状に開く。振り下げでは重なって面になる。
    const comb = up * primary * (i - fc * 0.5) / fc;
    const rootShift = w.side * gap * ((i - fc/2) / fc + comb * 1.8);

    function featherEnd(base, u, sideEdge) {
      const primaryLocal = smoothstep(0.64, 0.96, u);
      const scaleLocal = areaScaleAt(u);
      const closeOnUp = up * primaryLocal * 0.20;
      const outward = w.side * ((0.10 + 0.43*u) * scaleLocal - closeOnUp) + rootShift;
      const vaneCrown = 0.022 * (0.35 + primaryLocal + secondary * 0.55) * (0.50 + 0.50 * down);
      const featherCurl = 0.018 * primaryLocal * Math.sin(t + u * 5.5 + sideEdge * 1.7);
      const yDrop = length * Math.cos(twistAngle) * (0.70 + 0.30*sideEdge) - camber * (0.6 + primaryLocal) - spanFlex * (0.5 + primaryLocal) - vaneCrown;
      const zOff = length * Math.sin(twistAngle) - 0.12*u - 0.04 * up * primaryLocal + w.side * featherCurl;
      return new THREE.Vector3(
        base.x + outward + w.side * sideEdge * gap,
        base.y - yDrop,
        base.z + zOff
      );
    }

    // 根元側は翼面に接続、先端側だけ開閉するので「羽毛が空気を逃がす」見え方になる。
    const p0 = b0.clone();
    const p1 = b1.clone();
    const rootLock = primary * 0.72;
    if (rootLock > 0.001) {
      p0.lerp(carpometacarpusRootPoint(u0, -0.45), rootLock);
      p1.lerp(carpometacarpusRootPoint(u1,  0.45), rootLock);
    }
    const p2 = featherEnd(p0, u0, -0.5);
    const p3 = featherEnd(p1, u1, 0.5);

    const fa = strip.geometry.attributes.position.array;
    p2.y += 0.010 * (0.4 + primary) * Math.sin(t * 0.9 + i * 0.73);
    p3.y -= 0.008 * (0.4 + primary) * Math.cos(t * 0.8 + i * 0.61);

    setVertex(fa, 0, p0);
    setVertex(fa, 1, p1);
    setVertex(fa, 2, p2);
    setVertex(fa, 3, p3);
    strip.geometry.attributes.position.needsUpdate = true;
    strip.geometry.computeVertexNormals();

    tmpAxisA.copy(p0).lerp(p1, 0.50);
    tmpAxisB.copy(p2).lerp(p3, 0.50);
    updateCylinderBetween(strip.userData.shaft, tmpAxisA, tmpAxisB, 1.0 + 0.30 * primary);
    if (strip.userData.shaft) {
      const showFeatherShaft = wingTransparent && !isMuscleDisplayMode();
      strip.userData.shaft.visible = showFeatherShaft;
      strip.userData.shaft.material.transparent = true;
      strip.userData.shaft.material.opacity = showFeatherShaft ? strip.material.opacity : 0.0;
      strip.userData.shaft.material.depthWrite = showFeatherShaft;
      strip.userData.shaft.material.needsUpdate = true;
    }

    // ダウンストロークは密で不透明、アップストロークは透けてスリットが見える。
    strip.material.opacity = wingTransparent ? (0.44 + 0.24*down - 0.16*up + 0.05*primary) : 0.92;
    if (strip.userData.shaft) {
      const showFeatherShaft = wingTransparent && !isMuscleDisplayMode();
      strip.userData.shaft.visible = showFeatherShaft;
      strip.userData.shaft.material.opacity = showFeatherShaft ? strip.material.opacity : 0.0;
      strip.userData.shaft.material.depthWrite = showFeatherShaft;
      strip.userData.shaft.material.needsUpdate = true;
    }
  }

  w.surface.geometry.attributes.position.needsUpdate = true;
  w.surface.geometry.computeVertexNormals();

}

// 圧力・流線・渦・粒子・履歴は完全削除。

let dragging = false, lastX = 0, lastY = 0, lastPinch = 0;

function dist(e) {
  const dx = e.touches[0].clientX - e.touches[1].clientX;
  const dy = e.touches[0].clientY - e.touches[1].clientY;
  return Math.sqrt(dx*dx + dy*dy);
}

renderer.domElement.addEventListener("touchstart", e => {
  e.preventDefault();
  if (e.touches.length === 1) {
    dragging = true;
    lastX = e.touches[0].clientX;
    lastY = e.touches[0].clientY;
  } else if (e.touches.length === 2) {
    dragging = false;
    lastPinch = dist(e);
  }
}, { passive:false });

renderer.domElement.addEventListener("touchmove", e => {
  e.preventDefault();
  if (e.touches.length === 1 && dragging) {
    const x = e.touches[0].clientX;
    const y = e.touches[0].clientY;
    camTheta -= (x - lastX) * 0.006;
    camPhi -= (y - lastY) * 0.006;
    lastX = x;
    lastY = y;
    updateCamera();
  } else if (e.touches.length === 2) {
    const d = dist(e);
    camRadius -= (d - lastPinch) * 0.018;
    lastPinch = d;
    updateCamera();
  }
}, { passive:false });

renderer.domElement.addEventListener("touchend", () => dragging = false);

window.addEventListener("keydown", (e) => {

function animate() {
  requestAnimationFrame(animate);

  const t = Date.now() * 0.0046;
  // 生体らしさの最終調整：完全な機械周期を避ける。
  // 骨格長・関節数・基本位相は維持し、観察上の微小なリズム揺らぎだけを足す。
  const bioRhythm = 0.014 * Math.sin(t * 0.63 + 0.4) + 0.007 * Math.sin(t * 1.17);
  const tLive = t + bioRhythm;
  updateLivingColors(tLive);

  for (const p of bodySpeckles) {
    p.material.opacity = p.userData.baseOpacity * (0.82 + 0.18 * Math.sin(t * 0.7 + p.userData.phase));
  }

  const flapPhase = tLive - 0.22;
  const driveState = updateInertialWingDrive(flapPhase, 1 / 60);
  const downstroke = driveState.tendon.pectoralis;
  const reversal = Math.pow(Math.abs(Math.cos(flapPhase)), 2.0);

  // バイオメカニクス作用反作用：
  // 翼の速度ピークそのものではなく「切り返し〜加速開始」で胸郭が反力を受けるようにする。
  // 値は疑似インパルスで、翼骨格・関節長・位相は変更しない。
  const wingKin = updateWingKinematics(tLive, flapPhase);
  const wingVelocityLike = Math.cos(flapPhase);
  const wingAccelLike = -Math.sin(flapPhase);
  const wingImpulse = 0.42 * wingVelocityLike * Math.abs(wingAccelLike) + 0.58 * wingKin.impulse;
  const downImpulse = Math.max(0, wingImpulse);
  const upImpulse = Math.max(0, -wingImpulse);
  let thoraxReaction = 0.70 * wingImpulse + 0.30 * Math.sin(flapPhase + Math.PI * 0.18) * reversal;
  let abdomenReaction = 0.62 * Math.sin(flapPhase - 0.38) * Math.abs(Math.cos(flapPhase - 0.18));
  let tailReaction = 0.52 * Math.sin(flapPhase - 0.62) * Math.abs(Math.cos(flapPhase - 0.30));
  const bodyPhys = updateBodyPhysics(tLive, flapPhase, wingImpulse, reversal, wingKin);
  updateBiomechForceBus(tLive, bodyPhys, driveState, wingKin);
  const wholeBodyReaction = updateWholeBodyReactionState(tLive, bodyPhys, wingKin, driveState);
  feedWholeBodyReactionIntoBodyPhysics(bodyPhys, wholeBodyReaction);
  updateBiomechForceBus(tLive, bodyPhys, driveState, wingKin);
  updateSpineFunctionState(tLive, driveState, bodyPhys, wingKin, reversal);
  thoraxReaction = bodyPhys.thoraxReaction;
  abdomenReaction = bodyPhys.abdomenReaction;
  tailReaction = bodyPhys.tailReaction;

  // 胴体運動分離：胸・腹・頭・尾筒を同時に動かさない。
  // 翼骨格と位相は維持し、見た目の反力・慣性だけを分離する。
  const thoraxLag = tLive - 0.30;      // 胸筋：翼に近く、反応が早い
  const abdomenLag = tLive - 0.62;     // 腹：質量があり遅れる
  const headStabilize = tLive - 0.82;  // 頭：視線安定のため振幅を小さく遅く
  const tailBaseLag = tLive - 0.78;    // 腰〜尾筒：さらに遅れて追従

  // 胴体全体は小さくピッチング。ただし頭を大きく揺らさないため振幅は控えめ。
  bird.rotation.x = -0.18
    + 0.010 * Math.sin(tLive - 0.48)
    + 0.007 * Math.sin(flapPhase - 0.62)
    - 0.010 * thoraxReaction
    - 0.006 * wingKin.forcePitch
    - 0.012 * wholeBodyReaction.pitch; // 翼迎角加速度への逆相ピッチ応答
  bird.rotation.z = 0.0045 * Math.sin(tLive * 0.73 + 0.9)
    + 0.0025 * Math.sin(tLive * 1.91)
    + 0.0020 * Math.sin(flapPhase + 0.35) * reversal
    + 0.0080 * wholeBodyReaction.roll;
  bird.position.x = 0.0065 * Math.sin(tLive * 0.83 + 0.3)
    + 0.0025 * Math.sin(tLive * 1.73)
    + 0.0022 * Math.sin(flapPhase + 0.20) * reversal;
  bird.position.y = 0.032 * Math.sin(tLive * 0.5)
    - 0.009 * downstroke
    + 0.014 * downImpulse
    - 0.006 * upImpulse
    + 0.010 * bodyPhys.heaveReaction
    + 0.004 * wingKin.forceY
    + 0.010 * wholeBodyReaction.heave; // 空気を押した反作用としての微小な上下応答
  bird.position.z = 0.0055 * Math.sin(tLive * 0.71 + 1.1)
    - 0.0045 * thoraxReaction
    + 0.0035 * bodyPhys.recoilZ
    + 0.0060 * wholeBodyReaction.recoil;

  // 胸郭：胸筋が主役。上下だけでなく前後にもごく小さく伸縮させる。
  const thoraxPump = Math.sin(thoraxLag * 2.0 + 0.35);
  chest.scale.x = 0.43 * (1.0 + 0.014 * downstroke + 0.006 * reversal + 0.006 * Math.abs(thoraxReaction));
  chest.scale.y = 0.50 * (1.0 + 0.024 * thoraxPump + 0.010 * reversal + 0.010 * downImpulse + 0.010 * wholeBodyReaction.sternum);
  chest.scale.z = 0.62 * (1.0 - 0.014 * downstroke - 0.008 * thoraxPump - 0.008 * thoraxReaction);
  chest.rotation.z = 0.007 * Math.sin(thoraxLag) + 0.004 * Math.sin(flapPhase + 0.40) * reversal;
  chest.rotation.x = -0.10 + 0.016 * Math.sin(thoraxLag - 0.25) - 0.016 * thoraxReaction - 0.010 * wholeBodyReaction.thorax;

  // 腹：胸より遅れ、振幅も少し小さくする。
  const abdomenInertia = Math.sin(abdomenLag * 2.0 + 1.1);
  abdomen.scale.x = 0.34 * (1.0 - 0.006 * Math.sin(abdomenLag) - 0.003 * abdomenReaction);
  abdomen.scale.y = 0.36 * (1.0 + 0.012 * abdomenInertia + 0.005 * Math.abs(abdomenReaction));
  abdomen.scale.z = 0.56 * (1.0 + 0.016 * abdomenInertia + 0.006 * abdomenReaction);
  abdomen.rotation.x = 0.08 - 0.014 * Math.sin(abdomenLag - 0.10) + 0.010 * abdomenReaction - 0.006 * wholeBodyReaction.pitch;

  // 腰〜尾筒は胴体より少し遅れてしなる。急な継ぎ目ではなく、
  // 胴体後端が尾羽を支える柔らかい収束部として動く。
  rump.scale.x = 0.20 * (1.0 - 0.010 * downstroke);
  rump.scale.y = 0.18 * (1.0 + 0.008 * reversal);
  rump.scale.z = 0.34 * (1.0 + 0.012 * Math.sin(tailBaseLag + 0.55));
  rump.rotation.x = 0.12 - 0.014 * Math.sin(tailBaseLag - 0.15) + 0.008 * tailReaction + 0.010 * wholeBodyReaction.pelvis;

  tailCone.scale.x = 0.155 * (1.0 - 0.014 * downstroke + 0.008 * Math.sin(tailBaseLag));
  tailCone.scale.y = 0.135 * (1.0 + 0.010 * reversal);
  tailCone.scale.z = 0.315 * (1.0 + 0.018 * Math.sin(tailBaseLag + 0.45));
  tailCone.rotation.x = 0.16 - 0.018 * Math.sin(tailBaseLag - 0.22) + 0.010 * tailReaction + 0.010 * wholeBodyReaction.tail;
  tailCone.position.y = -0.082 - 0.004 * reversal - 0.003 * tailReaction;
  tailCone.position.z = -1.035 + 0.008 * Math.sin(tailBaseLag + 0.30) + 0.004 * tailReaction;

  tailTipSleeve.scale.x = 0.095 * (1.0 - 0.020 * downstroke);
  tailTipSleeve.scale.y = 0.080 * (1.0 + 0.010 * reversal);
  tailTipSleeve.scale.z = 0.165 * (1.0 + 0.014 * Math.sin(tailBaseLag + 0.70));
  tailTipSleeve.rotation.x = 0.12 - 0.016 * Math.sin(tailBaseLag - 0.10) + 0.012 * tailReaction;
  tailTipSleeve.position.y = -0.092 - 0.004 * reversal - 0.0035 * tailReaction;
  tailTipSleeve.position.z = -1.145 + 0.007 * Math.sin(tailBaseLag + 0.45) + 0.0045 * tailReaction;

  for (const c of tailConeFeathers) {
    const side = c.userData.side;
    const absSide = c.userData.absSide;
    const row = c.userData.row;
    const soft = 0.007 * Math.sin(t * 1.15 + c.userData.phase);
    c.rotation.x = c.userData.baseRotX - 0.010 * downstroke + soft;
    c.rotation.y = c.userData.baseRotY + side * 0.018 * Math.sin(thoraxLag - 0.20);
    c.rotation.z = c.userData.baseRotZ + side * 0.010 * Math.sin(t * 0.9 + row);
    c.position.y = c.userData.baseY - 0.003 * reversal;
    c.position.z = c.userData.baseZ + 0.004 * Math.sin(thoraxLag + row * 0.4);
  }

  chestBellyBlend.scale.x = 0.38 * (1.0 + 0.004 * Math.sin(thoraxLag));
  chestBellyBlend.scale.y = 0.30 * (1.0 + 0.006 * reversal);
  chestBellyBlend.scale.z = 0.42 * (1.0 + 0.006 * Math.sin(thoraxLag + 0.7));
  chestBellyBlend.rotation.x = -0.02 + 0.006 * Math.sin(thoraxLag - 0.1);

  // Step48 頭部安定制御：
  // 胴体・胸椎の揺れを読み取り、14頚椎へ分散して視線を安定させる。
  // 頭蓋骨だけを強制固定しないので、首の連続性と生き物らしい遅れが残る。
  updateHeadStabilizationControl(tLive, bodyPhys, wingDriveState);
  updateGazeTailCoupling();

  // 首は一つの棒ではなく、胸椎側・中位頚椎・後頭部で補正を分担する。
  neck.rotation.x = -0.16 + 0.34 * headControlState.pitch - 0.0040 * Math.sin(headStabilize + 0.35);
  neck.rotation.y = 0.40 * headControlState.gazeYaw + 0.0020 * Math.sin(headStabilize * 0.8);
  neck.rotation.z = 0.28 * headControlState.roll;
  head.rotation.x = -0.05 + 0.66 * headControlState.pitch + headControlState.gazePitch + 0.0012 * Math.sin(tLive * 2.6 + 0.2);
  head.rotation.y = 0.72 * headControlState.gazeYaw + 0.0015 * Math.sin(tLive * 3.2);
  head.rotation.z = 0.62 * headControlState.roll + 0.0010 * Math.sin(tLive * 2.1 + 0.7);

  // 目は頭に固定せず、視線ターゲットへごく小さく先行する。
  // 大きく動かすと哺乳類的になるので、眼球運動は極小に抑える。
  for (const e of eyes) {
    const sx = e.userData.side || 1;
    e.position.x = e.userData.baseX + sx * 0.0014 * Math.sin(tLive * 1.35 + 0.4);
    e.position.y = e.userData.baseY + 0.0012 * Math.sin(tLive * 1.9 + 0.2);
    e.position.z = e.userData.baseZ + 0.0010 * Math.sin(tLive * 1.2);
    e.rotation.y = sx * (0.28 + 0.55 * headControlState.gazeYaw + 0.006 * Math.sin(tLive * 1.55));
    e.rotation.x = 0.04 + 0.40 * headControlState.gazePitch + 0.004 * Math.sin(tLive * 1.85 + 0.3);
  }

  for (const c of shoulderCovers) {
    const side = c.side;
    c.mesh.position.y = 0.12 + 0.014 * Math.sin(thoraxLag - 0.15) + 0.006 * downImpulse;
    c.mesh.position.z = 0.18 - 0.018 * downstroke - 0.006 * thoraxReaction;
    c.mesh.rotation.z = side * (0.18 + 0.035 * Math.sin(thoraxLag - 0.20) + 0.010 * thoraxReaction);
    c.mesh.rotation.y = side * (0.25 + 0.020 * Math.sin(thoraxLag + 0.40) + 0.006 * thoraxReaction);
  }

  // 胴体表面の短い羽毛も胸郭の呼吸・反力に追従させる。
  // 大きく動かすと虫のように見えるため、根元だけ微小に揺らす。
  for (const g of bodyPlumageGroups) {
    g.position.y = 0.004 * Math.sin(thoraxLag - 0.15);
    g.position.z = -0.010 * downstroke;
    g.rotation.x = 0.006 * Math.sin(thoraxLag - 0.20);
    g.rotation.z = 0.004 * Math.sin(thoraxLag + 0.25);
    for (const f of g.children) {
      const dorsal = f.userData.dorsal || 0;
      const ventral = f.userData.ventral || 0;
      const phase = f.userData.phase || 0;
      const flutter = 0.006 * Math.sin(t * 2.1 + phase) * (0.35 + 0.55 * dorsal + 0.25 * ventral);
      f.position.y = f.userData.baseY + 0.0025 * Math.sin(thoraxLag + phase * 0.03) * (0.5 + dorsal);
      f.position.z = f.userData.baseZ - 0.004 * downstroke * (0.3 + dorsal);
      f.rotation.x = f.userData.baseRotX + flutter;
      f.rotation.y = f.userData.baseRotY + flutter * 0.38;
      f.rotation.z = f.userData.baseRotZ + 0.004 * Math.sin(t * 1.4 + phase);
    }
  }

  // 羽毛密度カバーも胸郭・肩帯に追従。
  // 根元の短い羽は大きく羽ばたかせず、微小に震わせるだけにする。
  for (const g of covertFeatherGroups) {
    const side = g.userData.side;
    g.position.x = g.userData.baseX + side * 0.006 * Math.sin(thoraxLag - 0.18);
    g.position.y = g.userData.baseY + 0.010 * Math.sin(thoraxLag - 0.25) + 0.004 * downImpulse;
    g.position.z = g.userData.baseZ - 0.020 * downstroke - 0.006 * thoraxReaction;
    g.rotation.x = 0.018 * Math.sin(thoraxLag - 0.16) - 0.008 * thoraxReaction;
    g.rotation.y = side * 0.026 * Math.sin(thoraxLag - 0.32);
    g.rotation.z = side * 0.018 * Math.sin(thoraxLag + 0.12);
    for (const f of g.children) {
      const q = f.userData.q || 0;
      const row = f.userData.row || 0;
      const flutter = 0.010 * Math.sin(t * 2.6 + f.userData.phase) * (0.35 + q + row * 0.22);
      f.rotation.x = f.userData.baseRotX + flutter;
      f.rotation.y = f.userData.baseRotY + side * flutter * 0.65;
      f.rotation.z = f.userData.baseRotZ + side * 0.006 * Math.sin(t * 1.8 + f.userData.phase);
    }
  }

  // 肩甲骨・烏口骨・叉骨の見た目だけを翼より少し遅らせて動かす。
  // 肩帯の定義と運動を関数化し、次の骨格アップデートで差し替えやすくする。
  updateShoulderGirdleKinematics(thoraxLag, downstroke, downImpulse, thoraxReaction, reversal);
  updateThoracicRigKinematics(thoraxLag, downstroke, downImpulse, thoraxReaction, reversal);

  // Step21: 叉骨バネと竜骨制御は updateThoracicRigKinematics 内で
  // 翼反力に基づいて更新する。ここでは全体の微小揺れだけを残す。
  furculaSpring.rotation.x = 0.010 * Math.sin(thoraxLag - 0.25) - 0.008 * thoraxReaction;
  furculaSpring.position.y = 0.003 * Math.sin(thoraxLag) + 0.003 * downImpulse;

  // Step9: 翼の加速度に対して、肩関節rootが制約内で微小に受ける。
  // ここでは翼三節の運動は変更しない。
  updateShoulderJointTransmission(1 / 60, flapPhase, wingKin, bodyPhys, reversal, downstroke);

  // Step13: 骨盤主導の尾羽制御。
  // 尾羽を翼の直接同期から外し、骨盤の慣性遅れ・ヨー・ロールを受ける安定板として動かす。
  // 尾筒の接続は残し、骨盤→尾筒→尾羽へ少し遅れて伝わる。
  const pelvisLag = bodyPhys.pelvisLag || 0;
  const legLag = bodyPhys.legLag || 0;
  const toeLag = bodyPhys.toeLag || 0;
  const tailPhase = tLive - 0.74 + 0.020 * Math.sin(tLive * 0.37);
  const pelvisYaw = 0.052 * pelvisLag + 0.018 * legLag + 0.010 * Math.sin(tLive * 0.58 + 1.2);
  const pelvisRoll = 0.034 * legLag - 0.018 * pelvisLag + 0.007 * Math.sin(tLive * 0.62);
  const pelvisPitchControl = -0.095 * pelvisLag + 0.040 * abdomenReaction + 0.022 * tailReaction;
  const stabilityNeed = clamp01(0.34 + 0.42 * Math.abs(pelvisLag) + 0.20 * Math.abs(legLag) + 0.14 * reversal);
  const reversalAirDump = Math.pow(Math.abs(Math.cos(tailPhase)), 2.2);
  const gazeTail = gazeTailCouplingState;
  const tailOpen = clamp01(0.20 + 0.46 * stabilityNeed + 0.10 * reversalAirDump + 0.06 * Math.abs(toeLag) + gazeTail.open);
  const tailPitch = -0.13 + pelvisPitchControl + 0.028 * reversalAirDump + gazeTail.pitch;
  const yawTrim = pelvisYaw + 0.006 * Math.sin(t * 0.73 + 1.2) + gazeTail.yaw;

  tailRoot.rotation.x = -0.04 + tailPitch;
  tailRoot.rotation.y = yawTrim;
  tailRoot.rotation.z = pelvisRoll + 0.004 * tailReaction;
  tailRoot.position.y = -0.098 - 0.006 * Math.abs(pelvisLag) + 0.003 * legLag;
  tailRoot.position.z = -1.030 + 0.010 * pelvisLag + 0.004 * tailReaction;

  for (let i = 0; i < tailFeathers.length; i++) {
    const f = tailFeathers[i];
    const side = f.userData.side;
    const absSide = f.userData.absSide;
    const curvature = absSide * absSide;
    const layerRank = f.userData.layerRank || 0;
    const signedLayer = layerRank - 4;
    const micro = 0.018 * Math.sin(t * 1.7 + f.userData.microPhase);
    const outerLag = 0.030 * absSide * Math.sin(tailPhase - 0.7) + 0.028 * absSide * pelvisLag;

    // 実物寄り尾羽：同一平面の扇子ではなく、浅い円錐面に配置する。
    // 外側羽ほど後方・下方へ落とし、中央羽は少し立てて安定板として残す。
    const coneDepth = 0.032 * absSide + 0.095 * curvature * tailOpen;
    const coneDrop = 0.012 * absSide + 0.060 * curvature * tailOpen;

    // 羽同士の重なり。完全な同一面を避け、左右で薄い段差を作る。
    const layerY = -0.0045 * layerRank + 0.0020 * Math.sin(t * 0.9 + layerRank);
    const layerZ = 0.0045 * signedLayer;
    const naturalAsym = f.userData.asym || 0;

    f.position.x = side * (0.004 + 0.030 * curvature * tailOpen) + naturalAsym * (0.35 + absSide) + side * 0.004 * legLag;
    f.position.y = -0.010 - coneDrop + layerY - 0.006 * Math.abs(pelvisLag);
    f.position.z = 0.050 - coneDepth + layerZ + 0.012 * pelvisLag + 0.004 * toeLag;

    // 左右へ扇状に開く。外側ほど大きく、中央羽は安定板として残る。
    f.rotation.y = side * (0.09 + 0.35 * tailOpen + 0.16 * curvature * tailOpen) + outerLag + naturalAsym + side * 0.018 * pelvisYaw;

    // 円錐曲面：外側羽ほど下向きに寝る。骨盤ピッチで安定板角が変わる。
    f.rotation.x = -0.020 - 0.100 * curvature * tailOpen - 0.018 * absSide + micro * 0.75 + 0.045 * pelvisPitchControl + gazeTail.pitch * (0.35 + 0.50 * curvature);

    // 羽軸方向のねじれ。外側ほど強く、骨盤ロールに対して左右差を作る。
    f.rotation.z = side * (0.014 + 0.045 * tailOpen + 0.070 * curvature * tailOpen) + micro * 0.45 + naturalAsym * 0.6 + side * 0.030 * pelvisRoll + side * gazeTail.yaw * (0.18 + 0.45 * curvature);
  }

  // 接続カバー羽は尾羽より控えめに動き、尾筒と尾羽根元を連続させる。
  tailRootCoverts.rotation.x = -0.04 + tailPitch * 0.42;
  tailRootCoverts.rotation.y = yawTrim * 0.45;
  tailRootCoverts.rotation.z = pelvisRoll * 0.36;
  tailRootCoverts.position.y = -0.064 - 0.006 * reversalAirDump - 0.004 * Math.abs(pelvisLag);
  tailRootCoverts.position.z = -0.975 + 0.010 * pelvisLag + 0.006 * Math.sin(tailPhase - 0.30);
  for (const c of tailRootCovertFeathers) {
    const side = c.userData.side;
    const absSide = c.userData.absSide;
    const soft = 0.010 * Math.sin(t * 1.45 + c.userData.phase);
    c.rotation.y = side * (0.10 + 0.20 * absSide + 0.12 * absSide * tailOpen);
    c.rotation.x = -0.10 - 0.09 * absSide - 0.035 * absSide * tailOpen + soft;
    c.rotation.z = side * (0.018 + 0.045 * absSide + 0.035 * tailOpen * absSide);
  }

  for (const c of tailBridgeFeathers) {
    const side = c.userData.side;
    const absSide = c.userData.absSide;
    const soft = 0.007 * Math.sin(t * 1.25 + c.userData.phase);
    c.rotation.x = 0.34 + 0.05 * absSide - 0.020 * tailOpen + soft;
    c.rotation.y = side * (0.10 + 0.15 * absSide + 0.035 * tailOpen);
    c.rotation.z = side * (0.020 + 0.040 * absSide + 0.018 * tailOpen);
  }

  // Step109: 左右翼の時刻サンプリング、運動更新、形状更新を一箇所に集約。
  // 次段階で反作用を入れる時も、この関数の出力 biomechFrameState を読む。
  updateWingPairKinematics(tLive);

  // Step102: フレーム末尾の更新・表示強制を関数化。
  // ここ以降に個別の visible 操作を増やさない。
  updateFrameModelLayers(tLive, bodyPhys);
  enforcePostFrameVisibility();

  renderer.render(scene, camera);
}

animate();

addEventListener("resize", () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
  updateCamera();
});
</script>
</body>
</html>
