
<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>正面＋側面ビュー</title>
<style>
body {margin:0; background:#e6eef6; font-family:sans-serif;}
.container {display:flex; flex-direction:row; height:100vh;}
canvas {flex:1;}
</style>
</head>
<body>
<div class="container">
<canvas id="front"></canvas>
<canvas id="side"></canvas>
</div>

<script>
const cf = document.getElementById("front");
const cs = document.getElementById("side");
const ctxF = cf.getContext("2d");
const ctxS = cs.getContext("2d");

function resize(){
  cf.width = window.innerWidth/2;
  cs.width = window.innerWidth/2;
  cf.height = cs.height = window.innerHeight;
}
window.onresize = resize;
resize();

let t=0;

function draw(){
  t+=0.05;
  ctxF.clearRect(0,0,cf.width,cf.height);
  ctxS.clearRect(0,0,cs.width,cs.height);

  const flap = Math.sin(t);

  // 正面
  ctxF.fillStyle="#fff";
  ctxF.beginPath();
  ctxF.arc(cf.width/2, cf.height/2, 40, 0, Math.PI*2);
  ctxF.fill();

  ctxF.strokeStyle="#000";
  ctxF.beginPath();
  ctxF.moveTo(cf.width/2, cf.height/2);
  ctxF.lineTo(cf.width/2 - 100, cf.height/2 - flap*80);
  ctxF.moveTo(cf.width/2, cf.height/2);
  ctxF.lineTo(cf.width/2 + 100, cf.height/2 - flap*80);
  ctxF.stroke();

  // 側面
  ctxS.fillStyle="#fff";
  ctxS.beginPath();
  ctxS.arc(cs.width/2, cs.height/2, 40, 0, Math.PI*2);
  ctxS.fill();

  ctxS.strokeStyle="#000";
  ctxS.beginPath();
  ctxS.moveTo(cs.width/2, cs.height/2);
  ctxS.lineTo(cs.width/2 + flap*80, cs.height/2 - 80);
  ctxS.stroke();

  requestAnimationFrame(draw);
}
draw();
</script>
</body>
</html>
