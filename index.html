<body>

ドラッグ：回転 / ピンチ：ズーム<br>右下ボタン：表示メニュー（観察 / 骨格確認 / 筋肉確認 / CFD）<br>筋肉確認：大胸筋＝筋腹＋停止腱 / 烏口上筋＝三骨管滑車腱 / 三角筋＝肩外側<br>Step107：筋肉位相ずれ追加／大胸筋は内側→外側へ収縮伝播／烏口上筋・三角筋を時間差強調

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
<script>
// Shoulder-rig refactor baseline
// - Geometry/phase/length/symmetry are intentionally preserved.
// - Shoulder girdle, wing kinematic chain, body physics, and display modes are kept as separate layers.
// - Runtime errors are shown on screen so the model does not fail silently on mobile browsers.
const errorPanel = document.getElementById("errorPanel");
window.addEventListener("error", (ev) => {
  if (!errorPanel) return;
  errorPanel.style.display = "block";
  errorPanel.textContent = "表示エラー: " + ev.message + "\n" + (ev.filename || "") + ":" + (ev.lineno || "?");
});
window.addEventListener("unhandledrejection", (ev) => {
  if (!errorPanel) return;
  errorPanel.style.display = "block";
  errorPanel.textContent = "非同期エラー: " + (ev.reason && ev.reason.message ? ev.reason.message : String(ev.reason));
});

const scene = new THREE.Scene();
function makeSkyGradientTexture() {
  const canvas = document.createElement("canvas");
  canvas.width = 16;
  canvas.height = 512;
  const ctx = canvas.getContext("2d");
  const grad = ctx.createLinearGradient(0, 0, 0, canvas.height);
  grad.addColorStop(0.00, "#b7d8ff");
  grad.addColorStop(0.55, "#e7f4ff");
  grad.addColorStop(1.00, "#f8fcff");
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  const tex = new THREE.CanvasTexture(canvas);
  tex.colorSpace = THREE.SRGBColorSpace;
  return tex;
}
scene.background = makeSkyGradientTexture();

const camera = new THREE.PerspectiveCamera(55, innerWidth / innerHeight, 0.1, 1000);
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);

scene.add(new THREE.AmbientLight(0xffffff, 0.65));
const light = new THREE.DirectionalLight(0xffffff, 1.5);
light.position.set(3, 5, 4);
scene.add(light);

const grid = new THREE.GridHelper(8, 8, 0xc7d5df, 0xdde8ef);
grid.position.y = -1.6;
scene.add(grid);

let camRadius = 6.8;
let camTheta = 0;
let camPhi = 1.2;
const target = new THREE.Vector3(0, 0.1, 0);

function updateCamera() {
  camPhi = Math.max(0.45, Math.min(2.25, camPhi));
  camRadius = Math.max(3.2, Math.min(12, camRadius));
  camera.position.x = camRadius * Math.sin(camPhi) * Math.sin(camTheta);
  camera.position.y = camRadius * Math.cos(camPhi);
  camera.position.z = camRadius * Math.sin(camPhi) * Math.cos(camTheta);
  camera.lookAt(target);
}
updateCamera();

const bird = new THREE.Group();
scene.add(bird);

const bodyMat = new THREE.MeshStandardMaterial({ color: 0x324039, roughness: 0.82 });
const wingMat = new THREE.MeshStandardMaterial({ color: 0x1b211d, roughness: 0.72, metalness: 0.02, transparent: false, opacity: 1.0, side: THREE.DoubleSide });
const featherMat = new THREE.MeshStandardMaterial({ color: 0x22261f, roughness: 0.78, metalness: 0.01, transparent: false, opacity: 1.0, side: THREE.DoubleSide });
const wingMaterials = [];
const skeletonParts = [];
const jointAxisHelpers = [];
const bodyOriginalMaterials = new Map();
const debugPanel = document.getElementById("debugPanel");
const reportToggleButton = document.getElementById("reportToggleButton");
let debugReportVisible = false;
let wingTransparent = false;

function updateWingTransparency() {
  for (const m of wingMaterials) {
    m.transparent = false;
    m.opacity = 1.0;
    m.depthWrite = true;
    m.needsUpdate = true;
  }
  for (const w of [leftWing, rightWing]) {
    if (w && w.surface && w.surface.userData.featherStrips) {
      for (const strip of w.surface.userData.featherStrips) {
        strip.material.transparent = false;
        strip.material.opacity = 1.0;
        strip.material.depthWrite = true;
        strip.material.needsUpdate = true;
      }
    }
  }
}


// Step94: 表示レイヤー整理。
// 不要表示をDEBUG候補として一括隔離する。骨格・筋肉・三骨管・自然外形は残し、
// レポート・軸・羽軸・ランドマーク球を通常表示から外す。
const DISPLAY_LAYER_POLICY = {
  showDebugHelpers: false,
  showReportPanel: false,
  showShoulderLandmarkSpheres: false,
  keepGlenoidJointSphere: false
};

function isShoulderLandmarkSphere(obj) {
  const name = (obj && obj.name || '').toLowerCase();
  return name.startsWith('shoulder_landmark_');
}
function isThoracicLandmarkSphere(obj) {
  const name = (obj && obj.name || '').toLowerCase();
  return name.startsWith('thoracic_landmark_') || name.includes('_landmark');
}
function isDebugHelperObject(obj) {
  if (!obj) return false;
  const name = (obj.name || '').toLowerCase();
  const role = obj.userData && String(obj.userData.role || obj.userData.kind || obj.userData.segmentRole || '').toLowerCase();
  if (jointAxisHelpers.includes(obj)) return true;
  if (obj.userData && (
    obj.userData.isDebugHelper || obj.userData.isFeatherDebug || obj.userData.isFeatherVector ||
    obj.userData.isPrimaryRootVector || obj.userData.isCarpometacarpusDebug || obj.userData.isFeatherShaft ||
    obj.userData.wingSkeletonRole === 'distalHandVector'
  )) return true;
  if (/debug|axis_helper|feather_shaft|hand_bone_vector|distal_hand|primary_root_vector|carpometacarpus.*debug/.test(name)) return true;
  if (/debug|axis|vector|shaft/.test(role) && !/triosseal/.test(name)) return true;
  return false;
}
function setObjectHardHidden(obj) {
  if (!obj) return;
  if (obj.scale && !obj.userData.__displayLayerBaseScale) obj.userData.__displayLayerBaseScale = obj.scale.clone();
  obj.visible = false;
  if (obj.material) {
    obj.material.transparent = true;
    obj.material.opacity = 0.0;
    obj.material.depthWrite = false;
    obj.material.needsUpdate = true;
  }
}
function restoreObjectLayerScale(obj) {
  if (obj && obj.scale && obj.userData && obj.userData.__displayLayerBaseScale) obj.scale.copy(obj.userData.__displayLayerBaseScale);
}
function shouldKeepLandmarkSphere(obj) {
  if (!obj || !obj.userData) return false;
  if (!DISPLAY_LAYER_POLICY.keepGlenoidJointSphere) return false;
  return obj.userData.label === 'glenoid';
}
function applyUnifiedDisplayLayers() {
  const mode = getDisplayMode ? getDisplayMode().id : 'observe';
  const showSkeleton = mode === 'skeleton' || mode === 'all' || mode === 'muscle';
  const showDebug = DISPLAY_LAYER_POLICY.showDebugHelpers && showSkeleton;

  if (debugPanel) debugPanel.style.display = 'none';
  if (reportToggleButton) {
    reportToggleButton.style.display = 'none';
    const wrap = reportToggleButton.parentElement;
    if (wrap) wrap.style.display = 'none';
  }
  for (const h of jointAxisHelpers) setObjectHardHidden(h);

  scene.traverse((obj) => {
    if (!obj || obj === scene) return;
    restoreObjectLayerScale(obj);
    const name = (obj.name || '').toLowerCase();
    if (/triosseal_canal|triosseal_.*lip/.test(name)) return;

    if (isDebugHelperObject(obj)) {
      if (showDebug) {
        obj.visible = true;
        if (obj.material) {
          obj.material.transparent = true;
          obj.material.opacity = obj.userData.__wingBaseOpacity || obj.userData.skeletonOpacity || 0.50;
          obj.material.depthWrite = false;
          obj.material.needsUpdate = true;
        }
      } else {
        setObjectHardHidden(obj);
      }
      return;
    }
    if (isShoulderLandmarkSphere(obj)) {
      if (shouldKeepLandmarkSphere(obj) && showSkeleton) {
        obj.visible = true;
        if (obj.material) {
          obj.material.transparent = true;
          obj.material.opacity = mode === 'muscle' ? 0.42 : 0.62;
          obj.material.depthWrite = false;
          obj.material.needsUpdate = true;
        }
      } else setObjectHardHidden(obj);
      return;
    }
    if (isThoracicLandmarkSphere(obj) && !(obj.userData && obj.userData.role === 'triosseal_bone_lip_guide')) {
      setObjectHardHidden(obj);
      return;
    }
  });
}

// Step102: フレーム末尾の表示強制処理を一箇所に集約。
// 以前は animate() の末尾に複数の enforce/apply が直列に並び、
// どれが最後に勝つか読みにくかった。ここで「最後の表示ルール」を固定する。
const FRAME_VISIBILITY_ENFORCERS = [
  () => typeof applyMuscleModeSkeletonExclusions === "function" && applyMuscleModeSkeletonExclusions(),
  () => typeof applyMuscleModeWingSkeletonStyling === "function" && applyMuscleModeWingSkeletonStyling(),
  () => typeof enforceNoFeatherDebugInMuscleMode === "function" && enforceNoFeatherDebugInMuscleMode(),
  () => typeof enforceJointAxesForCurrentMode === "function" && enforceJointAxesForCurrentMode(),
  () => typeof enforceWingNaturalVisualLayerForCurrentMode === "function" && enforceWingNaturalVisualLayerForCurrentMode(),
  () => typeof applyUnifiedDisplayLayers === "function" && applyUnifiedDisplayLayers()
];

function enforcePostFrameVisibility() {
  for (const enforce of FRAME_VISIBILITY_ENFORCERS) enforce();
}

// Step102: animate() から「モデル更新群」を分離。
// 翼運動の後に、CFD・体幹骨格・頚椎・下半身・筋肉をこの順番で更新する。
// 順序を明示することで、尾骨・三骨管・筋肉表示が後段で消される事故を防ぐ。
function updateFrameModelLayers(tLive, bodyPhys) {
  updateLightCfdViz(leftWing, rightWing, tLive);
  updateBodySegmentSkeleton();
  updateCervicalSkullRig(tLive, bodyPhys);
  updateLowerBodyRigSkeleton(tLive, bodyPhys);
  updateLowerBodyVisuals(tLive, bodyPhys);
  updateMuscleInspectionLayer(tLive, bodyPhys);
  updateDebugPanel(tLive);
}


// Step109: biomechanical signal bus.
// ここではまだ骨格運動を増やさず、翼運動・筋腱駆動・胸郭反作用の値を一箇所に集約する。
// 次の「翼加速度→肩帯→胸郭→胴体逆相反応」一体化で、各部が同じ値を読むための土台。
const biomechFrameState = {
  t: 0,
  wingTimes: { left: 0, right: 0 },
  wing: {
    left:  { shoulderSpeed: 0, wristSpeed: 0, tipSpeed: 0 },
    right: { shoulderSpeed: 0, wristSpeed: 0, tipSpeed: 0 }
  },
  drive: {
    pectoralis: 0,
    supracoracoideus: 0,
    liftLoad: 0,
    dragLoad: 0
  },
  force: {
    shoulder: 0,
    thorax: 0,
    sternum: 0,
    pelvis: 0,
    tail: 0
  },
  wholeBody: {
    pitch: 0,
    roll: 0,
    heave: 0,
    recoil: 0,
    thorax: 0,
    sternum: 0,
    pelvis: 0,
    tail: 0,
    energy: 0
  }
};

function sampleWingTimes(tLive) {
  return {
    left:  tLive + 0.010 + 0.004 * Math.sin(tLive * 0.97),
    right: tLive - 0.008 + 0.003 * Math.sin(tLive * 1.11 + 0.6)
  };
}

function updateWingPairKinematics(tLive) {
  const times = sampleWingTimes(tLive);
  biomechFrameState.t = tLive;
  biomechFrameState.wingTimes.left = times.left;
  biomechFrameState.wingTimes.right = times.right;

  // 左右の微小非対称は時刻だけで与える。関節長・翼骨格構造は変更しない。
  updateWingMotion(leftWing, times.left);
  updateWingMotion(rightWing, times.right);
  updateWingGeometry(leftWing, times.left);
  updateWingGeometry(rightWing, times.right);

  const wings = [["left", leftWing], ["right", rightWing]];
  for (const [key, w] of wings) {
    const speeds = w.speeds || [0, 0, 0, 0];
    biomechFrameState.wing[key].shoulderSpeed = speeds[0] || 0;
    biomechFrameState.wing[key].wristSpeed = speeds[2] || 0;
    biomechFrameState.wing[key].tipSpeed = speeds[3] || 0;
  }
  return biomechFrameState;
}

function updateBiomechForceBus(tLive, bodyPhys, driveState, wingKin) {
  const tendon = driveState && driveState.tendon ? driveState.tendon : {};
  const aero = driveState && driveState.aero ? driveState.aero : {};
  const leftTip = biomechFrameState.wing.left.tipSpeed || 0;
  const rightTip = biomechFrameState.wing.right.tipSpeed || 0;
  const avgTipSpeed = 0.5 * (leftTip + rightTip);
  const asymTipSpeed = leftTip - rightTip;
  const impulse = wingKin && Number.isFinite(wingKin.impulse) ? wingKin.impulse : 0;

  biomechFrameState.drive.pectoralis = tendon.pectoralis || 0;
  biomechFrameState.drive.supracoracoideus = tendon.supra || 0;
  biomechFrameState.drive.liftLoad = aero.liftLoad || 0;
  biomechFrameState.drive.dragLoad = aero.dragLoad || 0;

  // 符号付き信号：肩帯は翼加速度、胸郭は大胸筋張力、胸骨は空力負荷、骨盤尾部は遅れ成分を読む。
  // この段階では値を保存するだけで、既存の見た目・位相は変えない。
  biomechFrameState.force.shoulder = 0.58 * impulse + 0.42 * avgTipSpeed;
  biomechFrameState.force.thorax = 0.62 * (bodyPhys && bodyPhys.thoraxReaction || 0) + 0.38 * (tendon.pectoralis || 0);
  biomechFrameState.force.sternum = 0.55 * (aero.dragLoad || 0) + 0.45 * (bodyPhys && bodyPhys.sternumLag || 0);
  biomechFrameState.force.pelvis = 0.72 * (bodyPhys && bodyPhys.pelvisLag || 0) + 0.10 * asymTipSpeed;
  biomechFrameState.force.tail = 0.70 * (bodyPhys && bodyPhys.tailReaction || 0) + 0.18 * asymTipSpeed;

  if (bodyPhys) bodyPhys.biomech = biomechFrameState;
  return biomechFrameState;
}


// Step112: 翼加速度→肩帯→胸郭→背骨→骨盤を一つの反作用チェーンとして扱う。
// ここでは関節長・翼位相は変えず、胴体側の受けだけを微小に分配する。
const wholeBodyReactionState = {
  pitch: { x: 0, v: 0 },
  roll: { x: 0, v: 0 },
  heave: { x: 0, v: 0 },
  recoil: { x: 0, v: 0 },
  thorax: { x: 0, v: 0 },
  sternum: { x: 0, v: 0 },
  pelvis: { x: 0, v: 0 },
  tail: { x: 0, v: 0 },
  energy: 0
};

function updateWholeBodyReactionState(tLive, bodyPhys, wingKin, driveState) {
  const tendon = driveState && driveState.tendon ? driveState.tendon : {};
  const aero = driveState && driveState.aero ? driveState.aero : {};
  const forceY = wingKin ? (wingKin.forceY || 0) : 0;
  const forcePitch = wingKin ? (wingKin.forcePitch || 0) : 0;
  const forceSweep = wingKin ? (wingKin.forceSweep || 0) : 0;
  const impulse = wingKin ? (wingKin.impulse || 0) : 0;
  const pec = tendon.pectoralis || 0;
  const supra = tendon.supra || 0;
  const drag = aero.dragLoad || 0;
  const lift = aero.liftLoad || 0;
  const thoraxBase = bodyPhys ? (bodyPhys.thoraxReaction || 0) : 0;
  const abdomenBase = bodyPhys ? (bodyPhys.abdomenReaction || 0) : 0;

  // 翼が空気を押すと、体幹は逆相にわずかに沈む・反る・後退する。
  const pitchTarget = clampSym(-0.58 * impulse - 0.18 * forcePitch + 0.10 * (supra - pec), 0.85);
  const rollTarget = clampSym(0.24 * forceSweep + 0.028 * Math.sin(tLive * 0.73), 0.45);
  const heaveTarget = clampSym(0.52 * forceY + 0.18 * lift - 0.16 * pec + 0.08 * supra, 0.65);
  const recoilTarget = clampSym(-0.42 * drag + 0.26 * forceSweep - 0.12 * thoraxBase, 0.55);

  // 反力は胸郭で最大、背骨を通って骨盤・尾へ行くほど遅れて小さくなる。
  const thoraxTarget = clampSym(0.78 * pitchTarget + 0.24 * pec - 0.12 * supra, 0.70);
  const sternumTarget = clampSym(0.52 * Math.abs(forcePitch) + 0.34 * Math.abs(pec) + 0.14 * Math.abs(drag), 0.62);
  const pelvisTarget = clampSym(-0.42 * pitchTarget + 0.24 * abdomenBase - 0.14 * forceSweep, 0.50);
  const tailTarget = clampSym(0.34 * pelvisTarget + 0.22 * recoilTarget - 0.10 * forceY, 0.48);

  const dt = 1 / 60;
  const r = wholeBodyReactionState;
  const pitch = stepSpringMass(r.pitch, pitchTarget, dt, 30, 8.6, 1.0);
  const roll = stepSpringMass(r.roll, rollTarget, dt, 24, 7.2, 0.75);
  const heave = stepSpringMass(r.heave, heaveTarget, dt, 34, 9.2, 0.85);
  const recoil = stepSpringMass(r.recoil, recoilTarget, dt, 26, 8.0, 0.75);
  const thorax = stepSpringMass(r.thorax, thoraxTarget, dt, 42, 10.5, 0.85);
  const sternum = stepSpringMass(r.sternum, sternumTarget, dt, 50, 12.0, 0.80);
  const pelvis = stepSpringMass(r.pelvis, pelvisTarget, dt, 18, 6.4, 0.70);
  const tail = stepSpringMass(r.tail, tailTarget, dt, 14, 5.6, 0.65);
  r.energy = 0.88 * r.energy + 0.12 * (Math.abs(pitch) + 0.70 * Math.abs(thorax) + 0.42 * Math.abs(pelvis) + 0.30 * Math.abs(tail));

  const out = { pitch, roll, heave, recoil, thorax, sternum, pelvis, tail, energy: r.energy };
  Object.assign(biomechFrameState.wholeBody, out);
  if (bodyPhys) bodyPhys.wholeBodyReaction = out;
  return out;
}

function feedWholeBodyReactionIntoBodyPhysics(bodyPhys, reaction) {
  if (!bodyPhys || !reaction) return bodyPhys;
  bodyPhys.thoraxReaction = clampSym((bodyPhys.thoraxReaction || 0) + 0.16 * reaction.thorax, 1.2);
  bodyPhys.abdomenReaction = clampSym((bodyPhys.abdomenReaction || 0) - 0.10 * reaction.pitch + 0.08 * reaction.heave, 1.2);
  bodyPhys.tailReaction = clampSym((bodyPhys.tailReaction || 0) + 0.18 * reaction.tail, 1.2);
  bodyPhys.heaveReaction = clampSym((bodyPhys.heaveReaction || 0) + 0.18 * reaction.heave, 1.2);
  bodyPhys.recoilZ = clampSym((bodyPhys.recoilZ || 0) + 0.14 * reaction.recoil, 1.2);
  bodyPhys.sternumCompression = clampSym((bodyPhys.sternumCompression || 0) + 0.20 * reaction.sternum, 1.2);
  bodyPhys.pelvisLag = clampSym((bodyPhys.pelvisLag || 0) + 0.22 * reaction.pelvis, 1.2);
  bodyPhys.legLag = clampSym((bodyPhys.legLag || 0) + 0.08 * reaction.pelvis, 1.2);
  bodyPhys.toeLag = clampSym((bodyPhys.toeLag || 0) + 0.05 * reaction.tail, 1.2);
  return bodyPhys;
}

// Step85: 筋肉確認モードでは翼骨格・手根中手骨・初列風切根元を細く薄くする。
// 骨格確認では太く読めるまま、筋肉確認では筋腹・腱の動きを主役にする。
function tagWingSkeletonObject(obj, role="wingSkeleton") {
  if (!obj) return obj;
  obj.userData.isWingSkeleton = true;
  obj.userData.wingSkeletonRole = role;
  if (obj.scale && !obj.userData.__wingBaseScale) obj.userData.__wingBaseScale = obj.scale.clone();
  if (obj.material && !obj.userData.__wingBaseOpacity) obj.userData.__wingBaseOpacity = obj.material.opacity;
  return obj;
}
function tagWingSkeletonTree(root, role="wingSkeleton") {
  if (!root || !root.traverse) return;
  root.traverse((obj) => {
    if (obj.type === "Mesh" || obj.type === "Line") tagWingSkeletonObject(obj, role);
  });
}
function restoreWingSkeletonBaseScale(obj) {
  if (!obj || !obj.scale) return;
  const base = obj.userData && obj.userData.__wingBaseScale;
  if (base) obj.scale.copy(base);
}
function thinWingSkeletonForMuscleMode(obj) {
  if (!obj || !obj.userData || !obj.userData.isWingSkeleton) return;
  const isMuscle = isMuscleDisplayMode();
  const role = obj.userData.wingSkeletonRole || "wingSkeleton";
  const isRoot = role === "primaryRoot" || /carpometacarpus|primary_root|carpal|metacarpal/i.test(obj.name || "");
  const isDistalHandVector = role === "distalHandVector" || /distal_hand_bone_vector|hand_bone_vector/i.test(obj.name || "");

  // Step92: 筋肉確認では、青く羽に沿って見える遠位手骨も「骨」ではなくベクトル表示に見えるため非表示にする。
  // 肩〜肘の力の流れは残し、手首より先の青い直線だけ消して筋肉表示をクリーンにする。
  // ここは骨格ではなく「羽根方向の確認ベクトル」に見えるため、筋肉確認では主役を邪魔する。
  if (isMuscle && (isRoot || isDistalHandVector)) {
    obj.visible = false;
    if (obj.material) {
      obj.material.transparent = true;
      obj.material.opacity = 0.0;
      obj.material.depthWrite = false;
      obj.material.needsUpdate = true;
    }
    return;
  }

  obj.visible = true;
  if (obj.material) {
    obj.material.transparent = true;
    obj.material.opacity = isMuscle ? 0.24 : (obj.userData.__wingBaseOpacity || 0.78);
    obj.material.depthWrite = !isMuscle;
    obj.material.needsUpdate = true;
  }
  if (!obj.scale) return;
  restoreWingSkeletonBaseScale(obj);
  if (!isMuscle) return;
  const gtype = obj.geometry && obj.geometry.type;
  const isCylinder = /Cylinder/i.test(gtype || "");
  const isSphere = /Sphere/i.test(gtype || "");
  const f = 0.50;
  if (isCylinder) {
    obj.scale.x *= f;
    obj.scale.z *= f;
  } else if (isSphere) {
    obj.scale.multiplyScalar(0.62);
  } else {
    obj.scale.multiplyScalar(0.68);
  }
}

function applyMuscleModeWingSkeletonStyling() {
  for (const w of [typeof leftWing !== "undefined" ? leftWing : null, typeof rightWing !== "undefined" ? rightWing : null]) {
    if (!w) continue;
    tagWingSkeletonTree(w.root, "wingSkeleton");
    if (w.carpo) tagWingSkeletonTree(w.carpo, "primaryRoot");
  }
  scene.traverse((obj) => {
    if (obj.userData && obj.userData.isWingSkeleton) thinWingSkeletonForMuscleMode(obj);
  });
}


// Step90: 羽沿いベクトル完全OFF。
// 残っていた線は「関節軸」ではなく、翼面生成側の羽軸 shaft / 直接Line / 手根中手骨デバッグが
// 毎フレーム更新で再表示される系統だった。
// 筋肉確認では、タグ・名前・親階層・Line/Cylinder形状をまとめて判定して強制OFFする。
function isFeatherDebugLikeObject(obj) {
  if (!obj) return false;
  const name = (obj.name || "").toLowerCase();
  const role = obj.userData && (obj.userData.segmentRole || obj.userData.role || obj.userData.kind || "");
  if (obj.userData && (
    obj.userData.isFeatherDebug ||
    obj.userData.isFeatherVector ||
    obj.userData.isPrimaryRootVector ||
    obj.userData.isCarpometacarpusDebug ||
    obj.userData.isFeatherShaft
  )) return true;
  if (/feather.*(axis|vector|debug|shaft)|primary.*(root|vector)|carpo.*(axis|vector|debug)|shaft/.test(name)) return true;
  if (typeof role === "string" && /feather|primary|carpo|shaft|axis|vector/.test(role.toLowerCase())) return true;
  return false;
}

function setDebugObjectHardVisible(obj, visible, opacityWhenVisible=0.78) {
  if (!obj) return;
  obj.visible = !!visible;
  if (obj.material) {
    obj.material.transparent = true;
    obj.material.opacity = visible ? opacityWhenVisible : 0.0;
    obj.material.depthWrite = !!visible;
    obj.material.needsUpdate = true;
  }
  if (!visible && obj.scale && !obj.userData.__hiddenByMuscleModeBaseScale) {
    obj.userData.__hiddenByMuscleModeBaseScale = obj.scale.clone();
  }
  if (!visible && obj.scale) obj.scale.set(0.0001, 0.0001, 0.0001);
  if (visible && obj.scale && obj.userData.__hiddenByMuscleModeBaseScale) {
    obj.scale.copy(obj.userData.__hiddenByMuscleModeBaseScale);
    delete obj.userData.__hiddenByMuscleModeBaseScale;
  }
}

function enforceNoFeatherDebugInMuscleMode() {
  const isMuscle = isMuscleDisplayMode();
  const showDebug = !isMuscle && isSkeletonDisplayMode();

  for (const w of [typeof leftWing !== "undefined" ? leftWing : null, typeof rightWing !== "undefined" ? rightWing : null]) {
    if (!w) continue;

    // 手根中手骨〜初列風切根元の三ツ矢/骨軸デバッグ。
    if (w.carpo) {
      w.carpo.visible = showDebug;
      w.carpo.traverse((obj) => {
        if (obj !== w.carpo) obj.visible = showDebug;
        if (obj.material) {
          obj.material.transparent = true;
          obj.material.opacity = showDebug ? (obj.userData.__wingBaseOpacity || 0.78) : 0.0;
          obj.material.depthWrite = showDebug;
          obj.material.needsUpdate = true;
        }
      });
    }

    // 羽軸 shaft は scene 直下に追加されているので、surfaceの子制御だけでは消えない。
    const strips = w.surface && w.surface.userData ? (w.surface.userData.featherStrips || []) : [];
    for (const strip of strips) {
      if (strip && strip.userData) strip.userData.isFeatherDebug = true;
      const shaft = strip && strip.userData ? strip.userData.shaft : null;
      if (!shaft) continue;
      shaft.userData.isFeatherDebug = true;
      shaft.userData.isFeatherShaft = true;
      shaft.name = shaft.name || "feather_shaft_debug_line";
      setDebugObjectHardVisible(shaft, showDebug, 0.88);
    }
  }

  // 最後の保険：羽系デバッグのLine/Cylinderが別経路で作られても、筋肉確認では殺す。
  if (isMuscle) {
    scene.traverse((obj) => {
      const isLine = obj.type === "Line" || obj.type === "LineSegments" || obj.type === "ArrowHelper";
      const isCylinderShaft = obj.geometry && obj.geometry.type && /CylinderGeometry/.test(obj.geometry.type) && isFeatherDebugLikeObject(obj);
      const isDistalHandVector = obj.userData && obj.userData.wingSkeletonRole === "distalHandVector";
      if (isDistalHandVector || isFeatherDebugLikeObject(obj) || (isLine && isFeatherDebugLikeObject(obj.parent)) || isCylinderShaft) {
        setDebugObjectHardVisible(obj, false, 0.0);
      }
    });
  }
}

// Step91: 表示レイヤーのリファクタリング。
// これまで羽沿いの残線を個別に消していたが、実際には wing.surface とは別に
// scene 直下へ追加された featherStrips / shaft があり、筋肉確認で残っていた。
// ここでは「自然な翼面・羽毛」と「骨格・筋肉」を明確に分け、筋肉確認では
// 翼面・羽毛・羽軸を親レイヤー相当で一括OFFする。
function tagWingNaturalVisualObject(obj, role) {
  if (!obj) return obj;
  obj.userData.isWingNaturalVisual = true;
  obj.userData.wingVisualRole = role || obj.userData.wingVisualRole || "wingVisual";
  return obj;
}

function forEachWingNaturalVisualObject(callback) {
  for (const w of [typeof leftWing !== "undefined" ? leftWing : null, typeof rightWing !== "undefined" ? rightWing : null]) {
    if (!w) continue;
    if (w.surface) {
      tagWingNaturalVisualObject(w.surface, "wingSurface");
      callback(w.surface, w, "wingSurface");
      const strips = (w.surface.userData && w.surface.userData.featherStrips) ? w.surface.userData.featherStrips : [];
      for (const strip of strips) {
        if (!strip) continue;
        tagWingNaturalVisualObject(strip, "featherStrip");
        callback(strip, w, "featherStrip");
        const shaft = strip.userData && strip.userData.shaft;
        if (shaft) {
          tagWingNaturalVisualObject(shaft, "featherShaft");
          shaft.userData.isFeatherDebug = true;
          shaft.userData.isFeatherShaft = true;
          callback(shaft, w, "featherShaft");
        }
      }
    }
  }
}

function setNaturalWingVisualObjectVisible(obj, visible, role) {
  if (!obj) return;
  obj.visible = !!visible;
  if (obj.material) {
    obj.material.transparent = wingTransparent || role === "featherShaft" || !visible;
    if (!visible) {
      obj.material.opacity = 0.0;
      obj.material.depthWrite = false;
    } else if (role === "featherShaft") {
      const showShaft = wingTransparent && !isMuscleDisplayMode();
      obj.visible = showShaft;
      obj.material.opacity = showShaft ? 0.66 : 0.0;
      obj.material.depthWrite = showShaft;
    } else if (role === "featherStrip") {
      obj.material.opacity = wingTransparent ? Math.min(obj.material.opacity || 0.30, 0.34) : 0.92;
      obj.material.depthWrite = !wingTransparent;
    } else {
      obj.material.opacity = wingTransparent ? Math.min(obj.material.opacity || 0.30, 0.34) : 1.0;
      obj.material.depthWrite = !wingTransparent;
    }
    obj.material.needsUpdate = true;
  }
}

function enforceWingNaturalVisualLayerForCurrentMode() {
  const showNaturalWing = !isMuscleDisplayMode();
  forEachWingNaturalVisualObject((obj, w, role) => {
    setNaturalWingVisualObjectVisible(obj, showNaturalWing, role);
  });
  scene.traverse((obj) => {
    if (obj && obj.userData && obj.userData.isWingNaturalVisual) {
      setNaturalWingVisualObjectVisible(obj, showNaturalWing, obj.userData.wingVisualRole);
    }
  });
}

// 表示切り替え：実際に存在する表示だけをメニュー化する。
// 観察：完成形。骨格とCFDは隠す。
// 骨格確認：翼骨格・関節を表示して構造確認。
// 筋肉確認：自然外形を消し、骨格＋筋肉だけで力の流れを確認する。
// 軽量CFD：翼端渦・後流リボンだけを重ねる。
const DISPLAY_MODES = [
  { id: "observe", label: "観察", desc: "自然表示のみ" },
  { id: "skeleton", label: "骨格確認", desc: "半透明ボディ＋骨格・軸・角度ログ" },
  { id: "muscle", label: "筋肉確認", desc: "骨格＋大胸筋＋烏口上筋＋三角筋＋姿勢制御筋" },
  { id: "cfd", label: "軽量CFD", desc: "翼端渦・後流リボン" },
  { id: "all", label: "骨格＋CFD", desc: "骨格確認に後流も重ねる" }
];
let displayModeIndex = 0;
let displayMenuOpen = false;

// Step102: 表示モードの意味を一箇所に集約。
// 追加・削除時はここだけ見れば、自然外形/骨格/筋肉/CFDのON/OFFが分かる。
const DISPLAY_MODE_RULES = {
  observe:  { skeleton: false, muscle: false, cfd: false, naturalIsolation: false },
  skeleton: { skeleton: true,  muscle: false, cfd: false, naturalIsolation: false },
  muscle:   { skeleton: true,  muscle: true,  cfd: false, naturalIsolation: true  },
  cfd:      { skeleton: false, muscle: false, cfd: true,  naturalIsolation: false },
  all:      { skeleton: true,  muscle: false, cfd: true,  naturalIsolation: false }
};

function getDisplayRule() {
  const mode = getDisplayMode();
  return DISPLAY_MODE_RULES[mode.id] || DISPLAY_MODE_RULES.observe;
}

// Step15: 脚の機能モード。
// 飛行中は空気抵抗を減らす収納、着地では伸展、把持では足指を強く巻く。
const LEG_MODES = [
  { id: "flight", label: "飛行", desc: "脚を腹側へ収納", tuck: 1.0, extend: 0.0, grasp: 0.25 },
  { id: "landing", label: "着地", desc: "脚を下方へ伸展", tuck: 0.18, extend: 1.0, grasp: 0.42 },
  { id: "grasp", label: "把持", desc: "枝をつかむ足指", tuck: 0.35, extend: 0.72, grasp: 1.0 }
];
let legModeIndex = 0;
function getLegMode() { return LEG_MODES[legModeIndex] || LEG_MODES[0]; }
function getLegModeParams(tLive=0) {
  const m = getLegMode();
  const reflex = 0.12 * Math.sin(tLive * 0.52 + 0.7);
  return {
    tuck: m.tuck,
    extend: clamp01(m.extend + reflex * (m.id === "flight" ? 0.35 : 0.55)),
    grasp: m.grasp,
    reflex,
    id: m.id,
    label: m.label
  };
}
function setLegModeById(id) {
  const idx = LEG_MODES.findIndex(m => m.id === id);
  legModeIndex = idx >= 0 ? idx : 0;
  renderLegModeButtons();
}
function renderLegModeButtons() {
  const wrap = document.getElementById("legModeWrap");
  if (!wrap) return;
  wrap.innerHTML = LEG_MODES.map((m, i) => `<button class="legModeButton ${i === legModeIndex ? "active" : ""}" data-leg-mode="${m.id}" title="${m.desc}">${i === legModeIndex ? "✓ " : ""}${m.label}</button>`).join("");
}

function getDisplayMode() {
  return DISPLAY_MODES[displayModeIndex] || DISPLAY_MODES[0];
}

function isSkeletonDisplayMode() {
  const id = getDisplayMode().id;
  return id === "skeleton" || id === "all" || id === "muscle";
}

// Step67: 筋肉確認モードで隠す「球」を、表示制御の最上流で判定する。
// lowerBodyRig / bodySegmentRig の個別関数で消すだけでは、毎フレーム更新で再表示される。
function shouldHideSkeletonPartInMuscleMode(obj) {
  return !!(isMuscleDisplayMode() && obj && obj.userData && obj.userData.hideInMuscleMode);
}

function shouldHideSkeletonPartInCurrentMode(obj) {
  return !!(obj && obj.userData && (
    (isMuscleDisplayMode() && obj.userData.hideInMuscleMode) ||
    (isSkeletonDisplayMode() && obj.userData.hideInSkeletonInspection)
  ));
}

function cacheSkeletonBaseScale(obj) {
  if (!obj || !obj.scale) return;
  if (!obj.userData.__baseScale) obj.userData.__baseScale = obj.scale.clone();
}

function forceHideSkeletonObject(obj) {
  if (!obj) return;
  cacheSkeletonBaseScale(obj);
  obj.visible = false;
  // まれに後段の更新処理が visible を true に戻すため、縮尺もゼロ近くにして二重に防ぐ。
  if (obj.scale) obj.scale.set(0.0001, 0.0001, 0.0001);
  if (obj.material) {
    obj.material.transparent = true;
    obj.material.opacity = 0.0;
    obj.material.depthWrite = false;
    obj.material.needsUpdate = true;
  }
}

function restoreSkeletonObjectScale(obj) {
  if (!obj || !obj.scale) return;
  const base = obj.userData && obj.userData.__baseScale;
  if (base) obj.scale.copy(base);
}

function setSkeletonPartVisible(obj, visible, opacityWhenVisible=0.78) {
  if (!obj) return;
  if (shouldHideSkeletonPartInCurrentMode(obj)) {
    forceHideSkeletonObject(obj);
    return;
  }
  const finalVisible = !!visible;
  restoreSkeletonObjectScale(obj);
  obj.visible = finalVisible;
  if (obj.material) {
    obj.material.transparent = true;
    obj.material.opacity = finalVisible ? opacityWhenVisible : 0.0;
    obj.material.depthWrite = finalVisible;
    obj.material.needsUpdate = true;
  }
}

function setSkeletonVisible(visible) {
  for (const p of skeletonParts) {
    setSkeletonPartVisible(p, visible, 0.78);
  }
}

function cacheOriginalMaterialState(obj) {
  obj.traverse((child) => {
    const mat = child.material;
    if (!mat || bodyOriginalMaterials.has(mat)) return;
    bodyOriginalMaterials.set(mat, {
      transparent: !!mat.transparent,
      opacity: mat.opacity,
      depthWrite: mat.depthWrite
    });
  });
}

function setBodySkeletonMode(enabled) {
  cacheOriginalMaterialState(bodyGroup);
  bodyGroup.traverse((child) => {
    const mat = child.material;
    if (!mat) return;
    const saved = bodyOriginalMaterials.get(mat);

    // 肩周り骨格は bodyGroup 内に置くが、骨格確認時には胴体半透明化に巻き込まない。
    // これにより胸郭の中に埋もれず、肩甲骨・烏口骨・叉骨の三点支持が読める。
    if (child.userData && child.userData.isShoulderSkeleton) {
      child.visible = !!enabled;
      if (enabled) {
        mat.transparent = true;
        mat.opacity = child.userData.skeletonOpacity || 0.86;
        mat.depthWrite = false;
      } else if (saved) {
        mat.transparent = saved.transparent;
        mat.opacity = saved.opacity;
        mat.depthWrite = saved.depthWrite;
      }
      mat.needsUpdate = true;
      return;
    }

    if (enabled) {
      mat.transparent = true;
      mat.opacity = Math.min(saved ? saved.opacity : mat.opacity, 0.16);
      mat.depthWrite = false;
    } else if (saved) {
      mat.transparent = saved.transparent;
      mat.opacity = saved.opacity;
      mat.depthWrite = saved.depthWrite;
    }
    mat.needsUpdate = true;
  });
}

function setJointAxisVisible(visible) {
  for (const h of jointAxisHelpers) h.visible = visible;
}

// Step86: 青い棒ベクトル（関節軸）は筋肉確認モードでは完全に消す。
// updateWingMotion/updateWingGeometry 後に表示状態が戻る場合があるため、
// applyDisplayMode だけでなく毎フレーム末尾でも強制する。
function enforceJointAxesForCurrentMode() {
  // Step94: 関節軸ベクトルはDEBUGレイヤーへ隔離。
  setJointAxisVisible(false);
}

function updateReportToggleButton() {
  if (!reportToggleButton) return;
  reportToggleButton.textContent = debugReportVisible ? "レポート：ON" : "レポート：OFF";
  reportToggleButton.classList.toggle("off", !debugReportVisible);
  reportToggleButton.setAttribute("aria-pressed", debugReportVisible ? "true" : "false");
}

function setDebugPanelVisible(visible) {
  // Step94: 画面下レポートは不要表示として廃止。
  if (debugPanel) debugPanel.style.display = "none";
  if (reportToggleButton) {
    reportToggleButton.style.display = "none";
    if (reportToggleButton.parentElement) reportToggleButton.parentElement.style.display = "none";
  }
}

function toggleDebugReport() {
  debugReportVisible = !debugReportVisible;
  applyDisplayMode();
}

function setWingSkeletonMode(enabled) {
  wingTransparent = !!enabled;
  for (const m of wingMaterials) {
    if (!m) continue;
    m.transparent = !!enabled;
    m.opacity = enabled ? Math.min(m.opacity || 1.0, 0.28) : 1.0;
    m.depthWrite = !enabled;
    m.needsUpdate = true;
  }
  for (const w of [leftWing, rightWing]) {
    if (!w || !w.surface) continue;
    w.surface.visible = true;
    if (w.surface.userData.featherStrips) {
      for (const strip of w.surface.userData.featherStrips) {
        strip.material.transparent = !!enabled;
        strip.material.opacity = enabled ? 0.30 : 0.92;
        strip.material.depthWrite = !enabled;
        strip.material.needsUpdate = true;
        if (strip.userData.shaft) {
          const showFeatherShaft = !!enabled && !isMuscleDisplayMode();
          strip.userData.shaft.visible = showFeatherShaft;
          strip.userData.shaft.material.transparent = true;
          strip.userData.shaft.material.opacity = showFeatherShaft ? 0.88 : 0.0;
          strip.userData.shaft.material.depthWrite = showFeatherShaft;
          strip.userData.shaft.material.needsUpdate = true;
        }
      }
    }
  }
}

// Step32: 表示レイヤーを「自然外形」「骨格」「筋肉」「CFD」に分離する。
// 筋肉確認モードでは羽毛・眼・嘴・尾羽・翼面を消し、骨格と筋肉だけを残す。
const naturalVisibilityCache = new Map();
function isMuscleDisplayMode() { return getDisplayMode().id === "muscle"; }

// Step33: 筋肉確認モードの表示分離を修正。
// 前版では bodyGroup 内の Group まで非表示にしたため、
// 胸郭骨格を収めている thoracicRigGroup / thoracicBoneDetailGroup も親ごと消えていた。
// ここでは「自然外形の Mesh / Line だけ」を消し、骨格を含む親 Group は残す。
function isDebugSkeletonObject(obj) {
  return !!(obj && obj.userData && (
    obj.userData.isShoulderSkeleton ||
    obj.userData.isThoracicDetail ||
    obj.userData.isCervicalSkullSkeleton ||
    obj.userData.isMuscleModel
  ));
}
function rememberVisibility(obj) { if (!naturalVisibilityCache.has(obj)) naturalVisibilityCache.set(obj, obj.visible); }
function restoreNaturalVisibility() { for (const [obj, visible] of naturalVisibilityCache.entries()) if (obj) obj.visible = visible; naturalVisibilityCache.clear(); }
function setNaturalVisualIsolation(enabled) {
  if (!enabled) { restoreNaturalVisibility(); return; }
  for (const root of [bodyGroup]) {
    if (!root) continue;
    root.traverse((obj) => {
      if (obj === root || isDebugSkeletonObject(obj)) return;
      // Group を消すと、その子にある胸骨・肋骨・頚椎などの骨格まで親ごと消える。
      // そのため筋肉確認では自然外形の Mesh / Line だけを非表示にする。
      if (obj.type === "Mesh" || obj.type === "Line") {
        rememberVisibility(obj);
        obj.visible = false;
      }
    });
  }
  for (const w of [leftWing, rightWing]) {
    if (!w || !w.surface) continue;
    rememberVisibility(w.surface);
    w.surface.visible = false;
  }
}
function setMuscleModelVisible(visible) {
  if (typeof muscleInspectionGroup !== "undefined" && muscleInspectionGroup) {
    muscleInspectionGroup.visible = !!visible;
    muscleInspectionGroup.traverse((obj) => {
      if (obj.material) {
        obj.material.transparent = true;
        obj.material.opacity = visible ? (obj.userData.muscleOpacity || 0.72) : 0.0;
        obj.material.depthWrite = false;
        obj.material.needsUpdate = true;
      }
    });
  }
}

function applyDisplayMode() {
  const mode = getDisplayMode();
  const rule = getDisplayRule();

  const showSkeleton = rule.skeleton;
  const showMuscle = rule.muscle;
  const showCfd = rule.cfd;
  setNaturalVisualIsolation(rule.naturalIsolation);
  setSkeletonVisible(showSkeleton);
  setLowerBodyJointSpheresForMuscleMode(showMuscle);
  setBodySkeletonMode(showSkeleton);
  setWingSkeletonMode(showSkeleton);
  applyMuscleModeSkeletonExclusions();
  if (showMuscle) for (const w of [leftWing, rightWing]) if (w && w.surface) w.surface.visible = false;
  setMuscleModelVisible(showMuscle);
  // Step86: 筋肉確認では青い関節軸ベクトルを出さない。
  enforceJointAxesForCurrentMode();
  setDebugPanelVisible(showSkeleton);
  if (typeof applyMuscleModeWingSkeletonStyling === "function") applyMuscleModeWingSkeletonStyling();
  if (typeof enforceNoFeatherDebugInMuscleMode === "function") enforceNoFeatherDebugInMuscleMode();
  if (typeof enforceWingNaturalVisualLayerForCurrentMode === "function") enforceWingNaturalVisualLayerForCurrentMode();
  if (typeof cfdVizGroup !== "undefined" && cfdVizGroup) cfdVizGroup.visible = showCfd && !showMuscle;
  applyUnifiedDisplayLayers();

  const btn = document.getElementById("modeButton");
  if (btn) {
    btn.textContent = "表示：" + mode.label;
    btn.setAttribute("aria-expanded", displayMenuOpen ? "true" : "false");
  }
  renderDisplayMenu();
}

function setDisplayModeById(id) {
  const idx = DISPLAY_MODES.findIndex(m => m.id === id);
  displayModeIndex = idx >= 0 ? idx : 0;
  displayMenuOpen = false;
  applyDisplayMode();
}

function nextDisplayMode() {
  displayModeIndex = (displayModeIndex + 1) % DISPLAY_MODES.length;
  applyDisplayMode();
}

function renderDisplayMenu() {
  const menu = document.getElementById("displayMenu");
  if (!menu) return;
  menu.classList.toggle("open", displayMenuOpen);
  menu.innerHTML = DISPLAY_MODES.map((m, i) => `
    <button class="displayModeItem ${i === displayModeIndex ? "active" : ""}" data-mode="${m.id}">
      ${i === displayModeIndex ? "✓ " : ""}${m.label}<small>${m.desc}</small>
    </button>
  `).join("");
}

function toggleDisplayMenu() {
  displayMenuOpen = !displayMenuOpen;
  applyDisplayMode();
}

function clamp01(v) { return Math.max(0, Math.min(1, v)); }
function smooth01(v) { v = clamp01(v); return v * v * (3 - 2 * v); }
function pseudoRand(n) { return Math.abs(Math.sin(n * 12.9898 + 78.233) * 43758.5453) % 1; }
function varyColor(base, warm, noise, strength=0.10) {
  const c = base.clone();
  c.lerp(warm, (noise - 0.5) * strength + strength * 0.5);
  return c;
}

function updateLivingColors(t) {
  const wingPhase = Math.sin(t - 0.22);
  const bodyLight = smooth01(0.50 + 0.16 * Math.sin(t * 0.48 + 0.8) + 0.09 * wingPhase);
  const sideLight = smooth01(0.46 + 0.24 * Math.cos(camTheta - 0.55) + 0.08 * Math.sin(t * 0.31));
  const dorsalFlash = Math.pow(sideLight, 2.2);

  tmpColorB.copy(colBackGreen).lerp(colBackEmerald, 0.18 + 0.46 * dorsalFlash);
  chestMat.color.copy(colDeep).lerp(tmpColorB, 0.52 + 0.30 * bodyLight);
  chestMat.emissive.copy(tmpColorB).multiplyScalar(0.020 + 0.035 * dorsalFlash);

  tmpColorB.copy(colWarmGray).lerp(colPaleThroat, 0.18 + 0.18 * bodyLight);
  bellyMat.color.copy(tmpColorB).lerp(colBackGreen, 0.08 + 0.06 * sideLight);
  bellyMat.emissive.setHex(0x000000);

  transitionMat.color.copy(chestMat.color).lerp(bellyMat.color, 0.55 + 0.10 * Math.sin(t * 0.43));
  transitionMat.emissive.copy(chestMat.emissive).multiplyScalar(0.35);

  throatMat.color.copy(colDeep).lerp(colBlueGreen, 0.18 + 0.18 * sideLight);
  throatMat.emissive.copy(colBlueGreen).multiplyScalar(0.018 * sideLight);

  const angleFlash = Math.pow(clamp01(0.57 + 0.43 * Math.cos(camTheta * 1.18 - 0.72 + 0.18 * Math.sin(t))), 8.0);
  const flapFlash = Math.pow(clamp01(0.55 + 0.45 * Math.sin(t * 1.30 - 0.4)), 5.5);
  const flash = clamp01(angleFlash * 0.82 + flapFlash * 0.18);
  tmpColorB.copy(colGorgetEmerald).lerp(colGorgetBlue, 0.36 + 0.22 * Math.sin(t * 0.63));
  tmpColorB.lerp(colGorgetMagenta, 0.10 + 0.18 * Math.pow(flash, 1.4));
  gorgetMat.color.copy(colGorgetDark).lerp(tmpColorB, 0.10 + 0.90 * flash);
  gorgetMat.emissive.copy(tmpColorB).multiplyScalar(0.04 + 0.20 * flash);

  const wingShine = 0.18 + 0.20 * bodyLight + 0.16 * sideLight;
  wingMat.color.copy(colWingRoot).lerp(colWingTip, wingShine);
  featherMat.color.copy(colWingRoot).lerp(colWingTip, wingShine + 0.08);
  tailMat.color.copy(colTailBlack).lerp(colWingTip, 0.18 + 0.18 * sideLight);

  for (const m of wingMaterials) {
    if (!m || !m.color) continue;
    const q = m.userData && typeof m.userData.spanShade === "number" ? m.userData.spanShade : 0.5;
    const noise = m.userData && typeof m.userData.noise === "number" ? m.userData.noise : 0.5;
    const localFlash = dorsalFlash * (0.55 + 0.45 * noise);
    m.color.copy(colWingRoot).lerp(colWingTip, 0.10 + 0.32 * q + 0.10 * bodyLight + 0.08 * noise);
    m.color.lerp(colBlueGreen, 0.025 * localFlash * (1.0 - q));
    m.roughness = 0.70 + 0.18 * noise;
    m.metalness = 0.02 + 0.05 * (1.0 - noise);
  }

  for (const m of covertMaterials) {
    const q = m.userData && typeof m.userData.q === "number" ? m.userData.q : 0.5;
    const row = m.userData && typeof m.userData.row === "number" ? m.userData.row : 0.5;
    const noise = m.userData && typeof m.userData.noise === "number" ? m.userData.noise : 0.5;
    const micro = 0.5 + 0.5 * Math.sin(t * (0.42 + 0.05 * noise) + noise * 6.283);
    const greenAmount = 0.56 - 0.24 * row + 0.20 * q + 0.20 * dorsalFlash + 0.07 * (noise - 0.5);
    const iridescent = clamp01(0.06 + 0.20 * dorsalFlash * (1.0 - 0.50 * row) + 0.035 * micro);
    m.color.copy(colWarmGray)
      .lerp(colBackGreen, clamp01(greenAmount))
      .lerp(colBackEmerald, iridescent)
      .lerp(colDeep, 0.04 + 0.06 * (1.0 - noise));
    m.emissive.copy(colBackEmerald).multiplyScalar((0.010 + 0.025 * iridescent) * (1.0 - 0.45 * row));
    m.roughness = 0.66 + 0.24 * noise + 0.08 * row;
    m.metalness = 0.05 + 0.13 * iridescent;
  }

  // 胴体表面の短い羽毛レイヤー。大きな単色胴体の上で、羽1枚ごとの色差と構造色を出す。
  if (typeof bodyPlumageMaterials !== "undefined") {
    for (const m of bodyPlumageMaterials) {
      const zone = m.userData.zone || "chest";
      const q = m.userData.q || 0.5;
      const dorsal = m.userData.dorsal || 0.0;
      const ventral = m.userData.ventral || 0.0;
      const noise = m.userData.noise || 0.5;
      const micro = 0.5 + 0.5 * Math.sin(t * (0.35 + noise * 0.16) + noise * 9.1);
      const localFlash = clamp01(dorsalFlash * (0.40 + 0.75 * dorsal) + 0.06 * micro);
      if (zone === "belly") {
        m.color.copy(colWarmGray)
          .lerp(colPaleThroat, 0.18 + 0.12 * micro)
          .lerp(colBackGreen, 0.05 + 0.08 * sideLight * (1.0 - ventral))
          .lerp(colDeep, 0.025 + 0.050 * (1.0 - noise));
        m.emissive.copy(colBackEmerald).multiplyScalar(0.004 * localFlash);
        m.metalness = 0.015 + 0.030 * localFlash;
        m.roughness = 0.82 + 0.12 * noise;
      } else if (zone === "throat") {
        const throatFlash = clamp01(flash * (0.35 + 0.55 * q) + 0.12 * micro);
        tmpColorB.copy(colGorgetEmerald).lerp(colGorgetBlue, 0.35 + 0.25 * noise).lerp(colGorgetMagenta, 0.08 * throatFlash);
        m.color.copy(colGorgetDark).lerp(tmpColorB, 0.22 + 0.58 * throatFlash);
        m.emissive.copy(tmpColorB).multiplyScalar(0.030 + 0.085 * throatFlash);
        m.metalness = 0.20 + 0.32 * throatFlash;
        m.roughness = 0.36 + 0.24 * noise;
      } else {
        const green = clamp01(0.46 + 0.26 * dorsal + 0.18 * localFlash + 0.10 * q + 0.06 * (noise - 0.5));
        m.color.copy(colDeep)
          .lerp(colBackGreen, green)
          .lerp(colBackEmerald, 0.12 + 0.30 * localFlash)
          .lerp(colBlueGreen, 0.06 * sideLight * dorsal);
        m.emissive.copy(colBackEmerald).multiplyScalar(0.010 + 0.045 * localFlash);
        m.metalness = 0.06 + 0.16 * localFlash;
        m.roughness = 0.62 + 0.18 * noise;
      }
    }
  }
}

}

function addNaturalEyesRefined() {

    eyeGroup.userData.baseZ = 1.045;

    eyeGroup.rotation.y = sx * 0.28;

for (let row = 0; row < 3; row++) {
  const count = row === 0 ? 9 : (row === 1 ? 11 : 13);
  for (let k = 0; k < count; k++) {
    const q = count === 1 ? 0.5 : k / (count - 1);
    const side = (q - 0.5) * 2.0;
    const absSide = Math.abs(side);
    const g = new THREE.Group();
    g.userData.side = side;
    g.userData.absSide = absSide;
    g.userData.row = row;
    g.userData.phase = k * 0.37 + row * 0.71;
    const len = (0.118 + 0.025 * row + 0.020 * (1.0 - absSide)) * (0.95 + 0.08 * Math.sin(k * 1.9));
    const rootW = 0.012 + 0.003 * (1.0 - absSide);
    const tipW = 0.016 + 0.010 * absSide + 0.003 * row;

    g.add(m);
    g.userData.baseX = side * (0.040 + 0.018 * row);
    g.userData.baseY = -0.055 - 0.018 * row - 0.010 * absSide;
    g.userData.baseZ = -0.910 - 0.055 * row - 0.010 * absSide;
    g.userData.baseRotX = -0.18 - 0.085 * row - 0.025 * absSide;
    g.userData.baseRotY = side * (0.10 + 0.11 * row + 0.07 * absSide);
    g.userData.baseRotZ = side * (0.018 + 0.035 * row + 0.030 * absSide);

    g.rotation.set(g.userData.baseRotX, g.userData.baseRotY, g.userData.baseRotZ);
    bodyGroup.add(g);
    tailConeFeathers.push(g);
  }
}

function makeTailFeatherGeometry(len, rootW, tipW, notch=0.018) {
  const geo = new THREE.BufferGeometry();
  // local: base at z=0, feather points backward to -z. y gives a slight camber.
  const verts = new Float32Array([
    -rootW,  0.000,  0.000,
     rootW,  0.000,  0.000,
     tipW,   0.012, -len * 0.72,
     tipW*0.48, 0.004, -len + notch,
     0.000, -0.006, -len,
    -tipW*0.48, 0.004, -len + notch,
    -tipW,   0.012, -len * 0.72
  ]);
  geo.setAttribute("position", new THREE.BufferAttribute(verts, 3));
  geo.setIndex([0,1,2, 0,2,6, 6,2,3, 6,3,5, 5,3,4]);
  geo.computeVertexNormals();
  return geo;
}

  featherGroup.userData.asym = Math.sin((i + 9.17) * 12.9898) * 0.012;
  // 尾羽は平面ではなく、浅い円錐面＋羽同士の段差で保持する。
  featherGroup.userData.baseIndex = i;
  featherGroup.userData.layerRank = i + 4;
  featherGroup.userData.basePosX = 0;
  featherGroup.userData.basePosY = 0;
  featherGroup.userData.basePosZ = 0;

  // 尾羽は長く大きくするのではなく、根元は細く胴体に埋め、先端だけ扇状に広げる。
  const len = (0.44 - 0.055 * absSide + 0.018 * Math.cos(i * 1.7)) * 0.90;
  const rootW = (0.014 + 0.002 * (1.0 - absSide)) * 0.72;
  const tipW = (0.035 - 0.004 * absSide) * 1.55;

  const vane = new THREE.Mesh(makeTailFeatherGeometry(len, rootW, tipW, 0.010 + 0.010 * (1.0 - absSide)), tailMat);
  vane.material.transparent = true;
  vane.material.opacity = 0.86;

  const shaft = new THREE.Mesh(

// 胴体羽毛レイヤー：大きな楕円体の上に短い羽を重ね、単色塗装感を消す。

const bodyPlumageGroups = [];
const bodyPlumageMaterials = [];
function makeBodyPlumeGeometry(len=0.105, rootW=0.020, tipW=0.010) {
  const geo = new THREE.BufferGeometry();
  const verts = new Float32Array([0.000,0.014,0.000, -rootW,0.003,-len*0.18, -tipW,-0.002,-len, 0.000,0.006,-len*1.08, tipW,-0.002,-len, rootW,0.003,-len*0.18]);
  geo.setAttribute("position", new THREE.BufferAttribute(verts, 3));
  geo.setIndex([0,1,5, 1,2,5, 5,2,4, 2,3,4]);
  geo.computeVertexNormals();
  return geo;
}
function makeBodyPlumeMaterial(zone, q, dorsal, ventral, seed) {
  const noise = pseudoRand(seed);
  const m = new THREE.MeshStandardMaterial({ color: zone === "belly" ? 0x8b8675 : (zone === "throat" ? 0x0b4f45 : 0x2f7656), roughness: 0.72 + 0.18 * noise, metalness: zone === "throat" ? 0.28 : 0.08, side: THREE.DoubleSide, transparent: true, opacity: zone === "belly" ? 0.78 : 0.84, depthWrite: true });
  m.userData.zone = zone; m.userData.q = q; m.userData.dorsal = dorsal; m.userData.ventral = ventral; m.userData.noise = noise;
  bodyPlumageMaterials.push(m);
  return m;
}
function addBodyPlumageLayer() {
  const g = new THREE.Group();
  g.name = "body_plumage_layer";
  bodyGroup.add(g);
  bodyPlumageGroups.push(g);
  const rings = [
    { z: 0.42, y: 0.08, rx: 0.34, ry: 0.36, count: 18, zone: "chest", len: 0.082 },
    { z: 0.20, y: 0.03, rx: 0.42, ry: 0.44, count: 22, zone: "chest", len: 0.105 },
    { z: -0.05, y: -0.01, rx: 0.40, ry: 0.39, count: 22, zone: "chest", len: 0.112 },
    { z: -0.30, y: -0.04, rx: 0.34, ry: 0.32, count: 18, zone: "belly", len: 0.100 },
    { z: -0.55, y: -0.06, rx: 0.27, ry: 0.25, count: 14, zone: "belly", len: 0.085 }
  ];
  for (let r = 0; r < rings.length; r++) {
    const ring = rings[r];
    for (let i = 0; i < ring.count; i++) {
      const a = -Math.PI * 0.88 + (i / Math.max(1, ring.count - 1)) * Math.PI * 1.76;
      const sx = Math.sin(a), cy = Math.cos(a);
      const dorsal = clamp01((cy + 0.10) * 0.85);
      const ventral = clamp01((-cy + 0.20) * 0.70);
      const sideAbs = Math.abs(sx);
      const zone = ventral > 0.48 && r >= 2 ? "belly" : ring.zone;
      const seed = 41.7 + r * 13.9 + i * 3.31;
      const noise = pseudoRand(seed);
      const q = i / Math.max(1, ring.count - 1);
      const len = ring.len * (0.82 + 0.24 * dorsal + 0.10 * noise - 0.08 * ventral);
      const rootW = 0.014 + 0.008 * (1.0 - sideAbs) + 0.004 * noise;
      const tipW = rootW * (0.38 + 0.12 * noise);
      const mesh = new THREE.Mesh(makeBodyPlumeGeometry(len, rootW, tipW), makeBodyPlumeMaterial(zone, q, dorsal, ventral, seed));
      mesh.position.set(ring.rx * sx, ring.y + ring.ry * cy, ring.z + 0.014 * Math.sin(i * 1.9 + r));
      mesh.rotation.y = sx * 0.70;
      mesh.rotation.x = -0.42 - 0.30 * dorsal + 0.24 * ventral + 0.08 * Math.sin(i + r);
      mesh.rotation.z = -sx * (0.46 + 0.30 * dorsal) + 0.06 * Math.cos(i * 1.3);
      mesh.scale.setScalar(0.86 + 0.20 * noise);
      mesh.userData.baseX = mesh.position.x; mesh.userData.baseY = mesh.position.y; mesh.userData.baseZ = mesh.position.z;
      mesh.userData.baseRotX = mesh.rotation.x; mesh.userData.baseRotY = mesh.rotation.y; mesh.userData.baseRotZ = mesh.rotation.z;
      mesh.userData.phase = seed; mesh.userData.dorsal = dorsal; mesh.userData.ventral = ventral;
      g.add(mesh);
    }
  }
  for (let row = 0; row < 3; row++) {
    const count = 9 - row * 2;
    for (let i = 0; i < count; i++) {
      const q = count === 1 ? 0.5 : i / (count - 1);
      const x = (q - 0.5) * (0.22 - row * 0.035);
      const y = 0.325 - row * 0.040 + 0.006 * Math.sin(i);
      const z = 0.755 + row * 0.020;
      const seed = 203.0 + row * 17.1 + i * 5.7;
      const mesh = new THREE.Mesh(makeBodyPlumeGeometry(0.060 - row * 0.006, 0.013, 0.006), makeBodyPlumeMaterial("throat", q, 0.4, 0.0, seed));
      mesh.position.set(x, y, z);
      mesh.rotation.x = -0.76 + row * 0.12; mesh.rotation.y = x * 1.8; mesh.rotation.z = -(q - 0.5) * 0.55;
      mesh.userData.baseX = mesh.position.x; mesh.userData.baseY = mesh.position.y; mesh.userData.baseZ = mesh.position.z;
      mesh.userData.baseRotX = mesh.rotation.x; mesh.userData.baseRotY = mesh.rotation.y; mesh.userData.baseRotZ = mesh.rotation.z;
      mesh.userData.phase = seed; mesh.userData.dorsal = 0.4; mesh.userData.ventral = 0.0;
      g.add(mesh);
    }
  }
}
addBodyPlumageLayer();

// 実物では関節や肩帯は羽毛と胸筋に埋もれて見えないため、
// 根元ほど密、外側ほど疎になるように重ねる。
const covertFeatherGroups = [];
const covertMaterials = [];

function makeCovertFeatherGeometry(len=0.18, rootW=0.026, tipW=0.010) {
  const geo = new THREE.BufferGeometry();
  const verts = new Float32Array([
     0.000, 0.018, 0.000,
    -rootW, 0.004, -len * 0.18,
    -tipW,  0.000, -len,
     0.000, 0.010, -len * 1.08,
     tipW,  0.000, -len,
     rootW, 0.004, -len * 0.18
  ]);
  geo.setAttribute("position", new THREE.BufferAttribute(verts, 3));
  geo.setIndex([0,1,5, 1,2,5, 5,2,4, 2,3,4]);
  geo.computeVertexNormals();
  return geo;
}

function makeCovertMaterial(q, row) {
  const noise = pseudoRand(11.3 + q * 37.1 + row * 19.7 + covertMaterials.length * 0.83);
  const m = new THREE.MeshStandardMaterial({
    color: 0x315f49,
    roughness: 0.66 + 0.24 * noise + 0.08 * row,
    metalness: 0.06 + 0.05 * (1.0 - row),
    side: THREE.DoubleSide,
    transparent: false,
    opacity: 1.0
  });
  m.color.copy(colBelly)
    .lerp(colChest, 0.34 + 0.42 * q + 0.08 * (noise - 0.5))
    .lerp(colWingRoot, 0.12 + 0.12 * row);
  m.userData.q = q;
  m.userData.row = row;
  m.userData.noise = noise;
  covertMaterials.push(m);
  return m;
}

function addFeatherDensityCover(side) {
  const g = new THREE.Group();
  g.userData.side = side;
  g.userData.baseX = side * 0.365;
  g.userData.baseY = 0.135;
  g.userData.baseZ = 0.215;
  g.position.set(g.userData.baseX, g.userData.baseY, g.userData.baseZ);

  const rows = [
    { count: 13, y: 0.035, z: 0.020, len: 0.115, spread: 0.155, scale: 1.00, row: 0 },
    { count: 11, y: 0.005, z: -0.020, len: 0.155, spread: 0.185, scale: 0.92, row: 1 },
    { count: 9,  y: -0.030, z: -0.050, len: 0.205, spread: 0.205, scale: 0.78, row: 2 }
  ];

  for (const r of rows) {
    for (let i = 0; i < r.count; i++) {
      const q = r.count === 1 ? 0 : i / (r.count - 1);
      const center = q - 0.5;
      const len = r.len * (0.82 + 0.26 * (1.0 - Math.abs(center)) + 0.05 * Math.sin(i * 2.17 + r.row));
      const rootW = 0.018 * r.scale * (1.10 - 0.20 * q);
      const tipW = 0.0065 * r.scale;
      const mesh = new THREE.Mesh(makeCovertFeatherGeometry(len, rootW, tipW), makeCovertMaterial(q, r.row / 2));
      mesh.position.set(
        side * (0.010 + q * r.spread),
        r.y + 0.012 * Math.sin(i * 1.63 + r.row),
        r.z - 0.040 * q + 0.010 * Math.cos(i * 1.91)
      );
      mesh.rotation.y = side * (0.72 + 0.34 * q + 0.08 * Math.sin(i));
      mesh.rotation.z = side * (-0.70 + center * 0.42 + 0.08 * Math.cos(i * 0.7));
      mesh.rotation.x = -0.35 + 0.18 * q + 0.04 * Math.sin(i * 1.2);
      mesh.scale.setScalar(0.88 + 0.18 * Math.sin(i * 1.37 + r.row));
      mesh.userData.baseRotX = mesh.rotation.x;
      mesh.userData.baseRotY = mesh.rotation.y;
      mesh.userData.baseRotZ = mesh.rotation.z;
      mesh.userData.phase = i * 0.41 + r.row * 0.83;
      mesh.userData.q = q;
      mesh.userData.row = r.row;
      g.add(mesh);
    }
  }

  covertFeatherGroups.push(g);
  bodyGroup.add(g);
}

  const aeroLoad = wingDrive && wingDrive.aero ? (wingDrive.aero.liftLoad || 0) : 0;
  const wingLoad = clampStep47(0.52 * pectoralisLoad + 0.28 * supraLoad + 0.20 * Math.abs(aeroLoad), 0, 1.25);
  const reaction = bodyPhys ? (bodyPhys.thoraxReaction || 0) : 0;
  const heave = bodyPhys ? (bodyPhys.heaveReaction || 0) : 0;
  const pelvisLag = bodyPhys ? (bodyPhys.pelvisLag || 0) : 0;
  const pitchForce = wingKin ? (wingKin.forcePitch || 0) : 0;
  const targetPitch = clampStep47(-0.010 * reaction - 0.0045 * pitchForce + 0.0030 * reversal, -thor.maxPitch, thor.maxPitch);
  const targetYaw = clampStep47(0.0022 * Math.sin(tLive * 0.31 + 0.4) + 0.0012 * pelvisLag, -thor.maxYaw, thor.maxYaw);
  const targetRoll = clampStep47(0.0020 * Math.sin(tLive * 0.47 - 0.3) + 0.0014 * reaction, -thor.maxRoll, thor.maxRoll);
  const targetHeave = clampStep47(0.0025 * heave + 0.0012 * wingLoad, -0.004, 0.006);
  const targetRecoilZ = clampStep47(-0.0040 * wingLoad - 0.0020 * reaction, -0.009, 0.004);
  spineFunctionState.thoracicPitch += (targetPitch - spineFunctionState.thoracicPitch) * (1.0 - thor.stiffness + 0.07);
  spineFunctionState.thoracicYaw += (targetYaw - spineFunctionState.thoracicYaw) * (1.0 - thor.stiffness + 0.06);
  spineFunctionState.thoracicRoll += (targetRoll - spineFunctionState.thoracicRoll) * (1.0 - thor.stiffness + 0.06);
  spineFunctionState.thoracicHeave += (targetHeave - spineFunctionState.thoracicHeave) * 0.10;
  spineFunctionState.thoracicRecoilZ += (targetRecoilZ - spineFunctionState.thoracicRecoilZ) * 0.11;
  const synTargetPitch = clampStep47(-0.0020 * pelvisLag - 0.0010 * reaction, -syn.maxBend, syn.maxBend);
  const synTargetYaw = clampStep47(0.0010 * pelvisLag, -syn.maxBend, syn.maxBend);
  const synTargetRoll = clampStep47(0.0009 * (bodyPhys ? (bodyPhys.legLag || 0) : 0), -syn.maxBend, syn.maxBend);
  spineFunctionState.synsacrumPitch += (synTargetPitch - spineFunctionState.synsacrumPitch) * 0.045;
  spineFunctionState.synsacrumYaw += (synTargetYaw - spineFunctionState.synsacrumYaw) * 0.040;

  spineFunctionState.cervicalCounterPitch = -0.82 * (bird.rotation.x + 0.18) - 0.30 * spineFunctionState.thoracicPitch;
  spineFunctionState.cervicalCounterRoll = -0.78 * bird.rotation.z - 0.24 * spineFunctionState.thoracicRoll;

  return spineFunctionState;
}

  const t5 = thoracicSpineEndPoint();

  const pelvisLag = bodyPhys ? (bodyPhys.pelvisLag || 0) : 0;
  const abdomenCouple = bodyPhys ? (bodyPhys.abdomenReaction || 0) : 0;
  const p = t5.clone().lerp(tailBase, 0.58);
  // Step72: 腰仙骨は癒合軸として大きく曲げないが、翼反力が尾側へ遅れて伝わる見た目を足す。

  p.y += -0.006 + 0.0006 * abdomenCouple + 0.0030 * spineFunctionState.synsacrumPitch
    + SPINE_FLEX_WAVE_SPEC.lumbarAmpY * 0.38 * wave;
  p.z += -0.030 - 0.0020 * pelvisLag + 0.010 * spineFunctionState.synsacrumPitch
    - SPINE_FLEX_WAVE_SPEC.lumbarAmpZ * 0.42 * wave;

    + SPINE_FLEX_WAVE_SPEC.lumbarAmpX * 0.28 * Math.sin(tLive * 0.74 - 0.8);

}

function lumbarSynsacrumSegmentPoints(tLive=0, bodyPhys=null) {
  const thoracicEnd = thoracicSpineEndPoint();
  const synsacrum = lumbarSynsacrumPoint(tLive, bodyPhys);
  const pelvisLag = bodyPhys ? (bodyPhys.pelvisLag || 0) : 0;
  const abdomenCouple = bodyPhys ? (bodyPhys.abdomenReaction || 0) : 0;
  const pts = [];
  for (let i = 0; i < SPINE_COUNTS.lumbarSynsacrum; i++) {
    const u = (i + 1) / (SPINE_COUNTS.lumbarSynsacrum + 1);
    const p = thoracicEnd.clone().lerp(synsacrum, u);
    // Step72: 癒合した腰仙椎そのものは剛体寄り。ただし各表示節に微小な位相遅れを入れ、
    // 胸椎末端→骨盤へ反作用が伝わる「しなり」を見せる。
    const env = spineFlexEnvelope(u);
    const wave = spineForceWave(tLive, u, SPINE_FLEX_WAVE_SPEC.lumbarLag, -0.30);
    const tailWave = Math.sin(tLive * 0.72 - i * 0.42 - 0.6);
    p.y += 0.004 * Math.sin(Math.PI * u) + 0.00035 * abdomenCouple + 0.0022 * spineFunctionState.synsacrumPitch

function mirrorShoulderPoint(side, arr) {

function makeCapsuleBone(radius, length, mat, radial=12) {
  return new THREE.Mesh(new THREE.CylinderGeometry(radius, radius * 0.82, length, radial), mat);

// 任意の2点を短い骨で結ぶ。長い直線ロッドに見えないよう、肩帯専用は短く分割する。
function capsuleBetween(a, b, radius, mat, radial=12) {
  const dir = new THREE.Vector3().subVectors(b, a);
  const len = dir.length();
  const m = makeCapsuleBone(radius, len, mat, radial);
  m.position.copy(a).add(b).multiplyScalar(0.5);
  m.quaternion.setFromUnitVectors(new THREE.Vector3(0, 1, 0), dir.clone().normalize());
  return m;
}

// これは関節球ではなく、烏口上筋腱が通って方向転換する小孔なので、肩関節窩の少し前背側に置く。
function getTriossealCanalLocalPoint(side, pts=null) {
  const p = pts || {
    glenoid: getShoulderPoint(side, "glenoid"),
    scapulaMid: getShoulderPoint(side, "scapulaMid"),
    coracoidKnee: getShoulderPoint(side, "coracoidKnee"),
    furculaArm: getShoulderPoint(side, "furculaArm"),
    clavicleShoulder: getShoulderPoint(side, "clavicleShoulder")
  };
  const canal = p.glenoid.clone().multiplyScalar(0.46)
    .add(p.scapulaMid.clone().multiplyScalar(0.16))
    .add(p.coracoidKnee.clone().multiplyScalar(0.20))
    .add(p.furculaArm.clone().multiplyScalar(0.13))
    .add((p.clavicleShoulder || p.furculaArm).clone().multiplyScalar(0.05));
  canal.x += side * 0.006;
  canal.y += 0.050;
  canal.z += 0.064;
  return canal;
}

function updateTriossealCanalVisual(g, pts=null, side=null, supraDrive=0, reversal=0) {

    scapulaMid: getShoulderPoint(side, "scapulaMid"),
    coracoidKnee: getShoulderPoint(side, "coracoidKnee"),
