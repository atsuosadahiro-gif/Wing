
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Side Wing Silhouette Fix</title>
<style>
body { font-family: sans-serif; background:#eef2f5; }
canvas { background:#fff; border-radius:12px; display:block; margin:20px auto; }
</style>
</head>
<body>

<canvas id="c" width="800" height="400"></canvas>

<script>
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

function draw() {
  ctx.clearRect(0,0,800,400);

  // body
  ctx.fillStyle = "#ddd";
  ctx.beginPath();
  ctx.ellipse(400,220,25,35,0,0,Math.PI*2);
  ctx.fill();

  // head
  ctx.beginPath();
  ctx.arc(400,185,10,0,Math.PI*2);
  ctx.fill();

  // ===== SIDE VIEW WING (silhouette-based) =====

  // front wing (visible)
  ctx.fillStyle = "#fff";
  ctx.beginPath();

  // leading edge
  ctx.moveTo(400,210);         // shoulder
  ctx.quadraticCurveTo(460,200,520,215); // forward arc
  ctx.quadraticCurveTo(500,240,450,235); // tip down
  ctx.quadraticCurveTo(420,230,400,220); // back to body

  ctx.closePath();
  ctx.fill();

  // slight shadow for depth
  ctx.fillStyle = "rgba(0,0,0,0.05)";
  ctx.fill();

  // rear wing (hidden, only top edge)
  ctx.strokeStyle = "#bbb";
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(400,205);
  ctx.quadraticCurveTo(440,180,480,195);
  ctx.stroke();

  // airflow arrow
  ctx.strokeStyle = "#3a6ea5";
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.moveTo(100,300);
  ctx.lineTo(300,300);
  ctx.stroke();

  ctx.beginPath();
  ctx.moveTo(300,300);
  ctx.lineTo(290,295);
  ctx.moveTo(300,300);
  ctx.lineTo(290,305);
  ctx.stroke();
}

draw();
</script>

</body>
</html>
