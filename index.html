
<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>羽ばたき後流 渦あり版</title>
<style>
  :root{
    --bg:#041019;
    --panel:#071b2c;
    --panel2:#0a2236;
    --text:#eaf6ff;
    --muted:#b7c9d8;
    --accent:#4da3ff;
  }
  html,body{
    margin:0; padding:0; width:100%; height:100%;
    background: radial-gradient(circle at 50% 10%, #08243a 0%, #041019 45%, #020a10 100%);
    color:var(--text); font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
    overflow:hidden;
  }
  #wrap{
    position:fixed; inset:0;
    display:grid; grid-template-rows:auto 1fr;
  }
  #ui{
    background:linear-gradient(180deg, rgba(4,16,25,.95), rgba(5,20,32,.88));
    border-bottom:1px solid rgba(255,255,255,.08);
    padding:10px 12px 8px 12px;
    backdrop-filter: blur(6px);
    z-index:10;
  }
  .row{
    display:flex; align-items:center; gap:10px; margin:8px 0;
    flex-wrap:wrap;
  }
  label{
    min-width:108px; font-size:16px;
  }
  input[type="range"]{
    width:180px; max-width:46vw;
  }
  button{
    background:#113042; color:#d7e9ff; border:1px solid rgba(255,255,255,.12);
    border-radius:12px; padding:10px 16px; font-size:15px;
    box-shadow: inset 0 0 0 1px rgba(255,255,255,.05);
  }
  #msg{
    color:var(--muted); font-size:13px; line-height:1.35; margin-top:6px;
  }
  canvas{
    width:100%; height:100%; display:block; touch-action:none;
  }
  .pill{
    display:inline-block; font-size:12px; padding:3px 8px; border-radius:999px;
    background:rgba(77,163,255,.12); border:1px solid rgba(77,163,255,.25); color:#cfe6ff;
  }
</style>
</head>
<body>
<div id="wrap">
  <div id="ui">
    <div class="row">
      <label>羽ばたき振幅</label>
      <input id="amp" type="range" min="10" max="120" value="46" />
    </div>
    <div class="row">
      <label>周波数</label>
      <input id="freq" type="range" min="20" max="180" value="72" />
    </div>
    <div class="row">
      <label>迎角ねじり</label>
      <input id="twist" type="range" min="0" max="100" value="42" />
    </div>
    <div class="row">
      <label>渦の強さ</label>
      <input id="strength" type="range" min="10" max="160" value="82" />
      <button id="reset">リセット</button>
      <span class="pill">渦列版</span>
    </div>
    <div id="msg">羽ばたきで交互の渦を放出し、後流に渦列を作る軽量版です。指でなぞると流れを乱せます。</div>
  </div>
  <canvas id="cv"></canvas>
</div>

<script>
(() => {
  const canvas = document.getElementById('cv');
  const ctx = canvas.getContext('2d', { alpha: true });

  const ampEl = document.getElementById('amp');
  const freqEl = document.getElementById('freq');
  const twistEl = document.getElementById('twist');
  const strengthEl = document.getElementById('strength');
  const resetBtn = document.getElementById('reset');

  let W = 0, H = 0, DPR = Math.min(devicePixelRatio || 1, 2);

  let vortices = [];
  let tracers = [];
  let mist = [];
  let touches = [];
  let tPrev = 0;
  let simT = 0;
  let prevStrokeVel = 0;
  let emissionCooldown = 0;
  let frame = 0;

  const MAX_VORTICES = 70;
  const MAX_TRACERS = 900;
  const MAX_MIST = 850;

  function rand(a,b){ return a + Math.random()*(b-a); }
  function clamp(x,a,b){ return Math.max(a, Math.min(b, x)); }

  function resize(){
    const uiH = document.getElementById('ui').getBoundingClientRect().height;
    W = window.innerWidth;
    H = window.innerHeight - uiH;
    canvas.width = Math.floor(W * DPR);
    canvas.height = Math.floor(H * DPR);
    canvas.style.width = W + 'px';
    canvas.style.height = H + 'px';
    ctx.setTransform(DPR,0,0,DPR,0,0);
    seedTracers();
  }

  function params(){
    return {
      amp: +ampEl.value,
      freq: +freqEl.value / 60,
      twist: +twistEl.value / 100,
      strength: +strengthEl.value / 100
    };
  }

  function seedTracers(){
    tracers.length = 0;
    mist.length = 0;
    for(let i=0;i<MAX_TRACERS;i++){
      tracers.push({
        x: rand(0,W),
        y: rand(0,H),
        px: 0, py: 0,
        age: rand(0,200),
        life: rand(80,220),
        a: rand(0.10, 0.42)
      });
      tracers[i].px = tracers[i].x;
      tracers[i].py = tracers[i].y;
    }
    for(let i=0;i<MAX_MIST;i++){
      mist.push({
        x: rand(0,W), y: rand(0,H),
        vx:0, vy:0, age: rand(0,160), life: rand(60,180),
        s: rand(0.8,2.2), a: rand(0.04, 0.18)
      });
    }
    vortices.length = 0;
  }

  function resetAll(){
    simT = 0;
    prevStrokeVel = 0;
    emissionCooldown = 0;
    touches.length = 0;
    seedTracers();
  }

  function emitVortex(x, y, gamma, r, hue=210){
    vortices.push({
      x, y, gamma, r,
      vx: 0,
      vy: 0,
      age: 0,
      life: rand(4.5, 8.5),
      hue
    });
    if(vortices.length > MAX_VORTICES) vortices.splice(0, vortices.length - MAX_VORTICES);
  }

  function wingState(t){
    const p = params();
    const x = W * 0.18;
    const y0 = H * 0.46;
    const y = y0 + p.amp * Math.sin(t * p.freq * Math.PI * 2);
    const vy = p.amp * p.freq * Math.PI * 2 * Math.cos(t * p.freq * Math.PI * 2);
    const chord = Math.max(28, Math.min(54, W * 0.06));
    const ang = 0.25 * p.twist * Math.sin(t * p.freq * Math.PI * 2 + Math.PI/2);
    return {x,y,y0,vy,chord,ang};
  }

  function velocityAt(x,y){
    const p = params();
    let u = 28 + p.freq * 16;
    let v = 0;

    for(let i=0;i<vortices.length;i++){
      const q = vortices[i];
      const dx = x - q.x, dy = y - q.y;
      const rr = dx*dx + dy*dy + q.r*q.r;
      const f = q.gamma / rr;
      u += -dy * f;
      v +=  dx * f;
    }

    for(const tp of touches){
      const dx = x - tp.x, dy = y - tp.y;
      const rr = dx*dx + dy*dy + 240;
      const pull = 900 / rr;
      u += tp.vx * pull;
      v += tp.vy * pull;
    }

    // weak restoring / downwash feel behind wing
    const ws = wingState(simT);
    const dxw = x - ws.x;
    const dyw = y - ws.y;
    if(dxw > 0){
      const g = Math.exp(-(dxw*dxw)/(W*0.12) - (dyw*dyw)/(H*0.03));
      v += ws.vy * 0.16 * g;
      u += 14 * g;
    }
    return {u,v};
  }

  function step(dt){
    simT += dt;
    frame++;

    const p = params();
    const ws = wingState(simT);
    emissionCooldown -= dt;

    const strokeSign = Math.sign(ws.vy || 1);
    const signFlip = Math.sign(prevStrokeVel || 1) !== strokeSign;
    prevStrokeVel = ws.vy;

    // Emit at reversals and also periodically during strong motion
    if(signFlip || (Math.abs(ws.vy) > 80 && emissionCooldown <= 0)){
      const teX = ws.x + Math.cos(ws.ang) * ws.chord * 0.7;
      const teY = ws.y + Math.sin(ws.ang) * ws.chord * 0.7;
      const gamma = (-strokeSign) * (70 + 260 * p.strength + 120 * p.twist);
      const r = 16 + 16 * p.twist;
      emitVortex(teX, teY, gamma, r, gamma > 0 ? 205 : 340);
      // shed partner vortex weaker, offset for more obvious pair
      emitVortex(teX + rand(8,18), teY + strokeSign * rand(8,14), -gamma * 0.45, r*0.85, gamma > 0 ? 340 : 205);
      emissionCooldown = 0.11 + (1.0 - p.freq) * 0.05;
    }

    // advect vortices
    for(let i=vortices.length-1;i>=0;i--){
      const q = vortices[i];
      q.age += dt;
      if(q.age > q.life){ vortices.splice(i,1); continue; }

      // mutual interaction + base flow
      let u = 30 + p.freq * 18;
      let v = 0;
      for(let j=0;j<vortices.length;j++){
        if(i===j) continue;
        const o = vortices[j];
        const dx = q.x - o.x, dy = q.y - o.y;
        const rr = dx*dx + dy*dy + o.r*o.r;
        const f = o.gamma / rr;
        u += -dy * f * 0.55;
        v +=  dx * f * 0.55;
      }
      // downward/upward induced by flapping wing
      const dxw = q.x - ws.x, dyw = q.y - ws.y;
      const g = Math.exp(-(dxw*dxw)/(W*0.08) - (dyw*dyw)/(H*0.02));
      v += ws.vy * 0.06 * g;
      q.x += u * dt;
      q.y += v * dt;
      q.gamma *= Math.pow(0.992, dt*60);
      q.r += 1.8 * dt * 60;

      if(q.x > W + 80 || q.y < -100 || q.y > H + 100){
        vortices.splice(i,1);
      }
    }

    // tracer particles
    for(let i=0;i<tracers.length;i++){
      const tr = tracers[i];
      tr.age += dt * 60;
      tr.px = tr.x; tr.py = tr.y;
      const vel = velocityAt(tr.x, tr.y);
      tr.x += vel.u * dt;
      tr.y += vel.v * dt;

      if(tr.x < -20 || tr.x > W + 20 || tr.y < -20 || tr.y > H + 20 || tr.age > tr.life){
        tr.x = rand(-10, W*0.2);
        tr.y = rand(0,H);
        tr.px = tr.x; tr.py = tr.y;
        tr.age = 0; tr.life = rand(90,220);
      }
    }

    // mist / dye particles
    for(let i=0;i<mist.length;i++){
      const m = mist[i];
      m.age += dt * 60;
      const vel = velocityAt(m.x, m.y);
      m.vx = m.vx * 0.9 + vel.u * 0.1;
      m.vy = m.vy * 0.9 + vel.v * 0.1;
      m.x += m.vx * dt;
      m.y += m.vy * dt;

      if(m.x < -20 || m.x > W + 20 || m.y < -20 || m.y > H + 20 || m.age > m.life){
        m.x = ws.x + rand(-18, 10);
        m.y = ws.y + rand(-14, 14);
        m.vx = 18 + rand(-4, 6);
        m.vy = ws.vy * 0.04 + rand(-8, 8);
        m.age = 0; m.life = rand(70,180);
        m.s = rand(0.8,2.4);
        m.a = rand(0.05, 0.16);
      }
    }

    for(let i=touches.length-1;i>=0;i--){
      touches[i].life -= dt;
      if(touches[i].life <= 0) touches.splice(i,1);
    }
  }

  function drawBackground(){
    ctx.clearRect(0,0,W,H);
    const g = ctx.createLinearGradient(0,0,0,H);
    g.addColorStop(0, 'rgba(5,18,28,1)');
    g.addColorStop(1, 'rgba(2,10,16,1)');
    ctx.fillStyle = g;
    ctx.fillRect(0,0,W,H);

    // faint flow texture
    ctx.strokeStyle = 'rgba(70,140,210,0.06)';
    ctx.lineWidth = 1;
    for(let y=0;y<H;y+=14){
      ctx.beginPath();
      ctx.moveTo(0,y+Math.sin((y+simT*30)*0.03)*2);
      for(let x=0;x<=W;x+=22){
        ctx.lineTo(x, y + Math.sin((x*0.02)+(y*0.016)+simT*1.1)*2.3);
      }
      ctx.stroke();
    }
  }

  function drawMist(){
    ctx.save();
    ctx.globalCompositeOperation = 'screen';
    for(const m of mist){
      const alpha = m.a * (1 - m.age / m.life);
      ctx.fillStyle = `rgba(120,190,255,${alpha})`;
      ctx.beginPath();
      ctx.arc(m.x, m.y, m.s, 0, Math.PI*2);
      ctx.fill();
    }
    ctx.restore();
  }

  function drawTracers(){
    ctx.save();
    ctx.globalCompositeOperation = 'screen';

    // flow lines
    for(const tr of tracers){
      const lifeK = 1 - tr.age / tr.life;
      ctx.strokeStyle = `rgba(210,235,255,${0.12 + tr.a * lifeK})`;
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(tr.px, tr.py);
      ctx.lineTo(tr.x, tr.y);
      ctx.stroke();
    }

    // occasional seed points
    if(frame % 2 === 0){
      for(let i=0;i<tracers.length;i+=12){
        const tr = tracers[i];
        ctx.fillStyle = `rgba(175,220,255,0.12)`;
        ctx.fillRect(tr.x, tr.y, 1.5, 1.5);
      }
    }
    ctx.restore();
  }

  function drawVortexCores(){
    ctx.save();
    ctx.globalCompositeOperation = 'lighter';
    for(const q of vortices){
      const a = 0.28 * (1 - q.age / q.life);
      const r = Math.max(6, q.r*0.45);
      const grad = ctx.createRadialGradient(q.x,q.y,0,q.x,q.y,r*2.2);
      if(q.gamma > 0){
        grad.addColorStop(0, `rgba(100,180,255,${a})`);
        grad.addColorStop(0.5, `rgba(100,180,255,${a*0.4})`);
      } else {
        grad.addColorStop(0, `rgba(255,120,180,${a})`);
        grad.addColorStop(0.5, `rgba(255,120,180,${a*0.35})`);
      }
      grad.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.arc(q.x, q.y, r*2.2, 0, Math.PI*2);
      ctx.fill();

      ctx.strokeStyle = q.gamma > 0 ? `rgba(120,190,255,${0.35*a/0.28})` : `rgba(255,145,190,${0.35*a/0.28})`;
      ctx.lineWidth = 1.2;
      ctx.beginPath();
      ctx.arc(q.x, q.y, r, 0, Math.PI*1.75);
      ctx.stroke();
    }
    ctx.restore();
  }

  function drawWing(){
    const ws = wingState(simT);
    ctx.save();
    ctx.translate(ws.x, ws.y);
    ctx.rotate(ws.ang);

    const rx = Math.max(14, Math.min(22, W*0.022));
    const ry = Math.max(20, Math.min(28, H*0.03));

    // glow
    const grad = ctx.createRadialGradient(-4,-4,2,0,0,ry*1.8);
    grad.addColorStop(0,'rgba(185,225,255,0.95)');
    grad.addColorStop(0.55,'rgba(85,165,245,0.90)');
    grad.addColorStop(1,'rgba(40,100,185,0.18)');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.ellipse(0,0,rx,ry,0,0,Math.PI*2);
    ctx.fill();

    ctx.strokeStyle = 'rgba(225,245,255,0.55)';
    ctx.lineWidth = 1.3;
    ctx.beginPath();
    ctx.moveTo(-rx*0.55, -ry*0.35);
    ctx.quadraticCurveTo(-rx*0.10, -ry*0.05, rx*0.65, ry*0.55);
    ctx.stroke();

    ctx.restore();

    // trailing edge shimmer
    ctx.save();
    ctx.globalCompositeOperation = 'screen';
    ctx.strokeStyle = 'rgba(180,220,255,0.18)';
    for(let i=0;i<4;i++){
      ctx.beginPath();
      ctx.moveTo(ws.x + 8 + i*2, ws.y + (i-1.5)*5);
      ctx.lineTo(ws.x + 24 + i*10, ws.y + (i-1.5)*9 - ws.vy*0.02);
      ctx.stroke();
    }
    ctx.restore();
  }

  function drawLabels(){
    ctx.save();
    ctx.fillStyle = 'rgba(210,225,240,0.25)';
    ctx.font = '12px system-ui, sans-serif';
    ctx.fillText('渦あり後流モデル', 10, H - 12);
    ctx.restore();
  }

  function draw(){
    drawBackground();
    drawMist();
    drawTracers();
    drawVortexCores();
    drawWing();
    drawLabels();
  }

  let lastStamp = performance.now();
  function loop(now){
    const dt = Math.min(0.033, (now - lastStamp) / 1000);
    lastStamp = now;
    step(dt);
    draw();
    requestAnimationFrame(loop);
  }

  function pointerPos(ev){
    const r = canvas.getBoundingClientRect();
    if(ev.touches && ev.touches.length){
      return Array.from(ev.touches).map(t => ({x:t.clientX-r.left, y:t.clientY-r.top}));
    }
    return [{x:ev.clientX-r.left, y:ev.clientY-r.top}];
  }

  let lastTouchPts = [];
  function handleTouch(ev){
    const pts = pointerPos(ev);
    const next = [];
    for(let i=0;i<pts.length;i++){
      const p = pts[i];
      const prev = lastTouchPts[i] || p;
      next.push(p);
      touches.push({
        x:p.x, y:p.y,
        vx:(p.x-prev.x)*9,
        vy:(p.y-prev.y)*9,
        life:0.25
      });
    }
    lastTouchPts = next;
    ev.preventDefault();
  }
  function endTouch(){ lastTouchPts = []; }

  canvas.addEventListener('touchstart', handleTouch, {passive:false});
  canvas.addEventListener('touchmove', handleTouch, {passive:false});
  canvas.addEventListener('touchend', endTouch, {passive:false});
  canvas.addEventListener('mousedown', (e)=>handleTouch(e));
  canvas.addEventListener('mousemove', (e)=>{ if(e.buttons) handleTouch(e); });
  canvas.addEventListener('mouseup', endTouch);

  resetBtn.addEventListener('click', resetAll);
  window.addEventListener('resize', resize);

  resize();
  resetAll();
  requestAnimationFrame(loop);
})();
</script>
</body>
</html>
