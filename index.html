
<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>羽ばたき後流 線画モード + メーター 完全版</title>
<style>
  html,body{
    margin:0; padding:0; width:100%; height:100%; overflow:hidden;
    background:#05111a; color:#eaf6ff;
    font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
  }
  #wrap{
    position:fixed; inset:0;
    display:grid; grid-template-rows:auto 1fr;
  }
  #ui{
    background:linear-gradient(180deg, rgba(4,16,25,.96), rgba(5,20,32,.90));
    border-bottom:1px solid rgba(255,255,255,.08);
    padding:10px 12px 8px;
    backdrop-filter: blur(6px);
    z-index:10;
  }
  .row{
    display:flex; align-items:center; gap:10px;
    margin:8px 0; flex-wrap:wrap;
  }
  label{
    min-width:108px; font-size:16px;
  }
  input[type="range"]{
    width:180px; max-width:46vw;
  }
  button{
    background:#113042; color:#d7e9ff;
    border:1px solid rgba(255,255,255,.12);
    border-radius:12px; padding:10px 16px; font-size:15px;
  }
  .pill{
    display:inline-block; font-size:12px; padding:3px 8px;
    border-radius:999px;
    background:rgba(77,163,255,.10);
    border:1px solid rgba(77,163,255,.22);
    color:#cfe6ff;
  }
  #msg{
    color:#b7c9d8; font-size:13px; line-height:1.35; margin-top:6px;
  }
  canvas{
    width:100%; height:100%; display:block; touch-action:none;
  }
</style>
</head>
<body>
<div id="wrap">
  <div id="ui">
    <div class="row">
      <label>羽ばたき振幅</label>
      <input id="amp" type="range" min="10" max="120" value="40" />
    </div>
    <div class="row">
      <label>周波数</label>
      <input id="freq" type="range" min="20" max="180" value="52" />
    </div>
    <div class="row">
      <label>迎角ねじり</label>
      <input id="twist" type="range" min="0" max="100" value="28" />
    </div>
    <div class="row">
      <label>渦の強さ</label>
      <input id="strength" type="range" min="10" max="160" value="42" />
      <button id="reset">リセット</button>
      <span class="pill">メーター完全版</span>
    </div>
    <div id="msg">
      発光をほぼやめた線画版です。羽ばたきで交互の渦を作り、後流から簡易的に揚力・推力メーターを算出します。指でなぞると流れを乱せます。
    </div>
  </div>
  <canvas id="cv"></canvas>
</div>

<script>
(() => {
  const canvas = document.getElementById('cv');
  const ctx = canvas.getContext('2d', { alpha: false });

  const ampEl = document.getElementById('amp');
  const freqEl = document.getElementById('freq');
  const twistEl = document.getElementById('twist');
  const strengthEl = document.getElementById('strength');
  const resetBtn = document.getElementById('reset');

  let W = 0, H = 0, DPR = Math.min(devicePixelRatio || 1, 2);
  let vortices = [];
  let tracers = [];
  let touches = [];
  let simT = 0;
  let prevStrokeVel = 0;
  let emissionCooldown = 0;

  let liftVal = 0;
  let thrustVal = 0;
  let liftAvg = 0;
  let thrustAvg = 0;

  const MAX_VORTICES = 36;
  const MAX_TRACERS = 520;

  const rand = (a,b) => a + Math.random() * (b-a);

  function resize(){
    const uiH = document.getElementById('ui').getBoundingClientRect().height;
    W = window.innerWidth;
    H = window.innerHeight - uiH;

    canvas.width = Math.floor(W * DPR);
    canvas.height = Math.floor(H * DPR);
    canvas.style.width = W + 'px';
    canvas.style.height = H + 'px';

    ctx.setTransform(DPR,0,0,DPR,0,0);
    seed();
  }

  function params(){
    return {
      amp: +ampEl.value,
      freq: +freqEl.value / 60,
      twist: +twistEl.value / 100,
      strength: +strengthEl.value / 100
    };
  }

  function wingState(t){
    const p = params();
    const x = W * 0.18;
    const y0 = H * 0.46;
    const y = y0 + p.amp * Math.sin(t * p.freq * Math.PI * 2);
    const vy = p.amp * p.freq * Math.PI * 2 * Math.cos(t * p.freq * Math.PI * 2);
    const chord = Math.max(26, Math.min(52, W * 0.055));
    const ang = 0.18 * p.twist * Math.sin(t * p.freq * Math.PI * 2 + Math.PI / 2);
    return { x, y, vy, chord, ang };
  }

  function seed(){
    tracers.length = 0;
    vortices.length = 0;

    for(let i = 0; i < MAX_TRACERS; i++){
      const x = rand(0, W);
      const y = rand(0, H);
      tracers.push({
        x, y,
        px: x, py: y,
        age: rand(0, 160),
        life: rand(70, 150),
        a: rand(0.04, 0.12)
      });
    }
  }

  function resetAll(){
    simT = 0;
    prevStrokeVel = 0;
    emissionCooldown = 0;
    touches.length = 0;
    liftVal = thrustVal = 0;
    liftAvg = thrustAvg = 0;
    seed();
  }

  function emitVortex(x, y, gamma, r){
    vortices.push({ x, y, gamma, r, age: 0, life: rand(2.8, 4.8) });
    if(vortices.length > MAX_VORTICES){
      vortices.splice(0, vortices.length - MAX_VORTICES);
    }
  }

  function velocityAt(x, y){
    const p = params();
    let u = 22 + p.freq * 10;
    let v = 0;

    for(const q of vortices){
      const dx = x - q.x;
      const dy = y - q.y;
      const rr = dx * dx + dy * dy + q.r * q.r;
      const f = q.gamma / rr;
      u += -dy * f;
      v +=  dx * f;
    }

    for(const tp of touches){
      const dx = x - tp.x;
      const dy = y - tp.y;
      const rr = dx * dx + dy * dy + 220;
      const pull = 600 / rr;
      u += tp.vx * pull;
      v += tp.vy * pull;
    }

    return { u, v };
  }

  function computeForces(){
    let lift = 0;
    let thrust = 0;
    let sampleCount = 0;

    const x0 = W * 0.22;
    const x1 = W * 0.72;
    const y0 = H * 0.18;
    const y1 = H * 0.82;

    for(const tr of tracers){
      if(tr.x < x0 || tr.x > x1 || tr.y < y0 || tr.y > y1) continue;

      const vel = velocityAt(tr.x, tr.y);

      lift += -vel.v;
      thrust += vel.u;
      sampleCount++;
    }

    if(sampleCount > 0){
      liftVal = lift / sampleCount;
      thrustVal = thrust / sampleCount;
    } else {
      liftVal = 0;
      thrustVal = 0;
    }

    // time averaging for stability
    liftAvg = liftAvg * 0.92 + liftVal * 0.08;
    thrustAvg = thrustAvg * 0.92 + thrustVal * 0.08;
  }

  function step(dt){
    simT += dt;
    const p = params();
    const ws = wingState(simT);
    emissionCooldown -= dt;

    const strokeSign = Math.sign(ws.vy || 1);
    const signFlip = Math.sign(prevStrokeVel || 1) !== strokeSign;
    prevStrokeVel = ws.vy;

    if(signFlip || (Math.abs(ws.vy) > 60 && emissionCooldown <= 0)){
      const teX = ws.x + Math.cos(ws.ang) * ws.chord * 0.68;
      const teY = ws.y + Math.sin(ws.ang) * ws.chord * 0.68;
      const gamma = (-strokeSign) * (24 + 70 * p.strength + 28 * p.twist);
      const r = 14 + 8 * p.twist;

      emitVortex(teX, teY, gamma, r);
      emitVortex(teX + rand(7, 12), teY + strokeSign * rand(5, 9), -gamma * 0.28, r * 0.82);

      emissionCooldown = 0.19 + (1.0 - p.freq) * 0.05;
    }

    for(let i = vortices.length - 1; i >= 0; i--){
      const q = vortices[i];
      q.age += dt;

      if(q.age > q.life){
        vortices.splice(i, 1);
        continue;
      }

      let u = 24 + p.freq * 11;
      let v = 0;

      for(let j = 0; j < vortices.length; j++){
        if(i === j) continue;
        const o = vortices[j];
        const dx = q.x - o.x;
        const dy = q.y - o.y;
        const rr = dx * dx + dy * dy + o.r * o.r;
        const f = o.gamma / rr;
        u += -dy * f * 0.30;
        v +=  dx * f * 0.30;
      }

      q.x += u * dt;
      q.y += v * dt;
      q.gamma *= Math.pow(0.985, dt * 60);
      q.r += 1.0 * dt * 60;

      if(q.x > W + 60 || q.y < -70 || q.y > H + 70){
        vortices.splice(i, 1);
      }
    }

    for(const tr of tracers){
      tr.age += dt * 60;
      tr.px = tr.x;
      tr.py = tr.y;

      const vel = velocityAt(tr.x, tr.y);
      tr.x += vel.u * dt;
      tr.y += vel.v * dt;

      if(tr.x < -15 || tr.x > W + 15 || tr.y < -15 || tr.y > H + 15 || tr.age > tr.life){
        tr.x = rand(-10, W * 0.16);
        tr.y = rand(0, H);
        tr.px = tr.x;
        tr.py = tr.y;
        tr.age = 0;
        tr.life = rand(70, 150);
      }
    }

    for(let i = touches.length - 1; i >= 0; i--){
      touches[i].life -= dt;
      if(touches[i].life <= 0) touches.splice(i, 1);
    }

    computeForces();
  }

  function drawBackground(){
    ctx.fillStyle = '#07111b';
    ctx.fillRect(0, 0, W, H);

    ctx.strokeStyle = 'rgba(70,140,210,0.035)';
    ctx.lineWidth = 1;

    for(let y = 0; y < H; y += 18){
      ctx.beginPath();
      ctx.moveTo(0, y);
      for(let x = 0; x <= W; x += 24){
        ctx.lineTo(x, y + Math.sin((x * 0.018) + (y * 0.014) + simT * 0.9) * 1.2);
      }
      ctx.stroke();
    }
  }

  function drawTracers(){
    ctx.globalCompositeOperation = 'source-over';

    for(const tr of tracers){
      const k = 1 - tr.age / tr.life;
      ctx.strokeStyle = `rgba(220,235,255,${0.04 + tr.a * k})`;
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(tr.px, tr.py);
      ctx.lineTo(tr.x, tr.y);
      ctx.stroke();
    }
  }

  function drawVortices(){
    for(const q of vortices){
      const k = 1 - q.age / q.life;
      const r = Math.max(4, q.r * 0.38);

      ctx.fillStyle = q.gamma > 0
        ? `rgba(110,180,255,${0.05 * k})`
        : `rgba(255,135,180,${0.05 * k})`;
      ctx.beginPath();
      ctx.arc(q.x, q.y, r * 1.5, 0, Math.PI * 2);
      ctx.fill();

      ctx.strokeStyle = q.gamma > 0
        ? `rgba(130,190,255,${0.14 * k})`
        : `rgba(255,150,190,${0.14 * k})`;
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.arc(q.x, q.y, r, 0, Math.PI * 1.5);
      ctx.stroke();
    }
  }

  function drawWing(){
    const ws = wingState(simT);

    ctx.save();
    ctx.translate(ws.x, ws.y);
    ctx.rotate(ws.ang);

    const rx = Math.max(13, Math.min(20, W * 0.020));
    const ry = Math.max(18, Math.min(26, H * 0.028));

    const grad = ctx.createRadialGradient(-3, -3, 1, 0, 0, ry * 1.2);
    grad.addColorStop(0, 'rgba(200,230,255,0.85)');
    grad.addColorStop(0.6, 'rgba(95,170,245,0.70)');
    grad.addColorStop(1, 'rgba(40,100,185,0.08)');
    ctx.fillStyle = grad;

    ctx.beginPath();
    ctx.ellipse(0, 0, rx, ry, 0, 0, Math.PI * 2);
    ctx.fill();

    ctx.strokeStyle = 'rgba(225,245,255,0.35)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(-rx * 0.55, -ry * 0.35);
    ctx.quadraticCurveTo(-rx * 0.10, -ry * 0.05, rx * 0.65, ry * 0.55);
    ctx.stroke();

    ctx.restore();
  }

  function drawMeter(){
    const boxX = 10;
    const boxY = 10;
    const boxW = 190;
    const boxH = 84;

    ctx.fillStyle = 'rgba(4,12,20,0.68)';
    ctx.fillRect(boxX, boxY, boxW, boxH);

    ctx.strokeStyle = 'rgba(180,220,255,0.16)';
    ctx.lineWidth = 1;
    ctx.strokeRect(boxX, boxY, boxW, boxH);

    ctx.fillStyle = 'rgba(230,245,255,0.92)';
    ctx.font = '13px system-ui, sans-serif';
    ctx.fillText(`↑ 揚力: ${liftVal.toFixed(2)}`, boxX + 10, boxY + 22);
    ctx.fillText(`→ 推力: ${thrustVal.toFixed(2)}`, boxX + 10, boxY + 44);

    ctx.fillStyle = 'rgba(180,220,255,0.82)';
    ctx.fillText(`平均 揚力: ${liftAvg.toFixed(2)}`, boxX + 10, boxY + 66);
    ctx.fillText(`平均 推力: ${thrustAvg.toFixed(2)}`, boxX + 10, boxY + 84);

    const liftBar = Math.max(-50, Math.min(50, liftAvg * 2.0));
    const thrustBar = Math.max(0, Math.min(90, thrustAvg * 1.0));

    ctx.fillStyle = 'rgba(90,170,255,0.75)';
    ctx.fillRect(boxX + 120, boxY + 13, Math.max(0, liftBar), 6);

    ctx.fillStyle = 'rgba(255,150,190,0.75)';
    ctx.fillRect(boxX + 120, boxY + 35, thrustBar, 6);
  }

  function drawLabel(){
    ctx.fillStyle = 'rgba(210,225,240,0.22)';
    ctx.font = '12px system-ui, sans-serif';
    ctx.fillText('線画後流モデル + メーター 完全版', 10, H - 12);
  }

  let lastStamp = performance.now();

  function loop(now){
    const dt = Math.min(0.033, (now - lastStamp) / 1000);
    lastStamp = now;

    step(dt);
    drawBackground();
    drawTracers();
    drawVortices();
    drawWing();
    drawMeter();
    drawLabel();

    requestAnimationFrame(loop);
  }

  function pointerPos(ev){
    const r = canvas.getBoundingClientRect();
    if(ev.touches && ev.touches.length){
      return Array.from(ev.touches).map(t => ({
        x: t.clientX - r.left,
        y: t.clientY - r.top
      }));
    }
    return [{
      x: ev.clientX - r.left,
      y: ev.clientY - r.top
    }];
  }

  let lastTouchPts = [];

  function handleTouch(ev){
    const pts = pointerPos(ev);
    const next = [];

    for(let i = 0; i < pts.length; i++){
      const p = pts[i];
      const prev = lastTouchPts[i] || p;
      next.push(p);

      touches.push({
        x: p.x,
        y: p.y,
        vx: (p.x - prev.x) * 7,
        vy: (p.y - prev.y) * 7,
        life: 0.20
      });
    }

    lastTouchPts = next;
    ev.preventDefault();
  }

  function endTouch(){
    lastTouchPts = [];
  }

  canvas.addEventListener('touchstart', handleTouch, { passive: false });
  canvas.addEventListener('touchmove', handleTouch, { passive: false });
  canvas.addEventListener('touchend', endTouch, { passive: false });
  canvas.addEventListener('mousedown', (e) => handleTouch(e));
  canvas.addEventListener('mousemove', (e) => { if(e.buttons) handleTouch(e); });
  canvas.addEventListener('mouseup', endTouch);

  resetBtn.addEventListener('click', resetAll);
  window.addEventListener('resize', resize);

  resize();
  resetAll();
  requestAnimationFrame(loop);
})();
</script>
</body>
</html>
