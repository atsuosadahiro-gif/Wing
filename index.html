<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Bird Wing Refactor Stable Base</title>
<style>
  :root{
    --bg:#dfe6ef;
    --panel:#e9eef5;
    --panel-stroke:rgba(128,146,173,.25);
    --bone:#6f7f97;
    --feather:#f2efe3;
    --feather-line:#cfc7ac;
    --flow:rgba(110,160,255,.55);
    --body:#f3f0e8;
    --body-shade:#e9e4d8;
    --text:#7f8794;
    --muscle-a:rgba(217,98,98,.45);
    --muscle-b:rgba(79,168,103,.45);
    --tendon:rgba(143,162,189,.45);
  }
  html,body{margin:0;background:var(--bg);font-family:system-ui,sans-serif;}
  canvas{display:block;width:100vw;height:100vh;}
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
(() => {
  'use strict';

  // =========================
  // Core math
  // =========================
  const clamp = (v, a, b) => Math.max(a, Math.min(b, v));
  const mix = (a, b, t) => a * (1 - t) + b * t;
  const rad = (deg) => deg * Math.PI / 180;

  const pt = (x, y, z = 0) => ({ x, y, z });
  const add = (a, b) => ({ x: a.x + b.x, y: a.y + b.y, z: (a.z || 0) + (b.z || 0) });
  const sub = (a, b) => ({ x: a.x - b.x, y: a.y - b.y, z: (a.z || 0) - (b.z || 0) });
  const scale = (a, s) => ({ x: a.x * s, y: a.y * s, z: (a.z || 0) * s });
  const len = (v) => Math.hypot(v.x, v.y, v.z || 0) || 1;
  const norm = (v) => scale(v, 1 / len(v));
  const lerp3 = (a, b, t) => ({ x: mix(a.x, b.x, t), y: mix(a.y, b.y, t), z: mix(a.z || 0, b.z || 0, t) });
  const lerp2 = (a, b, t) => ({ x: mix(a.x, b.x, t), y: mix(a.y, b.y, t) });

  function rotX(p, a) {
    const c = Math.cos(a), s = Math.sin(a);
    return { x: p.x, y: p.y * c - p.z * s, z: p.y * s + p.z * c };
  }
  function rotY(p, a) {
    const c = Math.cos(a), s = Math.sin(a);
    return { x: p.x * c + p.z * s, y: p.y, z: -p.x * s + p.z * c };
  }
  function rotZ(p, a) {
    const c = Math.cos(a), s = Math.sin(a);
    return { x: p.x * c - p.y * s, y: p.x * s + p.y * c, z: p.z };
  }
  function normal2(a, b) {
    const dx = b.x - a.x;
    const dy = b.y - a.y;
    const L = Math.hypot(dx, dy) || 1;
    return { x: -dy / L, y: dx / L };
  }

  // =========================
  // Canvas / layout
  // =========================
  const canvas = document.getElementById('c');
  const ctx = canvas.getContext('2d');

  function resize() {
    const dpr = Math.min(window.devicePixelRatio || 1, 2);
    canvas.width = Math.floor(window.innerWidth * dpr);
    canvas.height = Math.floor(window.innerHeight * dpr);
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }
  window.addEventListener('resize', resize);
  resize();

  function getLayout() {
    const w = window.innerWidth;
    const h = window.innerHeight;
    const margin = 18;
    const gap = 16;
    const panelW = w - margin * 2;
    const panelH = Math.min(420, (h - margin * 2 - gap) / 2);
    return {
      front: { x: margin, y: margin + 36, w: panelW, h: panelH },
      side:  { x: margin, y: margin + 36 + panelH + gap, w: panelW, h: panelH }
    };
  }

  function drawPanel(box, title) {
    const r = 22;
    ctx.fillStyle = getComputedStyle(document.documentElement).getPropertyValue('--panel');
    ctx.strokeStyle = getComputedStyle(document.documentElement).getPropertyValue('--panel-stroke');
    ctx.lineWidth = 2;

    ctx.beginPath();
    ctx.moveTo(box.x + r, box.y);
    ctx.arcTo(box.x + box.w, box.y, box.x + box.w, box.y + box.h, r);
    ctx.arcTo(box.x + box.w, box.y + box.h, box.x, box.y + box.h, r);
    ctx.arcTo(box.x, box.y + box.h, box.x, box.y, r);
    ctx.arcTo(box.x, box.y, box.x + box.w, box.y, r);
    ctx.closePath();
    ctx.fill();
    ctx.stroke();

    ctx.fillStyle = getComputedStyle(document.documentElement).getPropertyValue('--text');
    ctx.font = '600 16px system-ui,sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(title, box.x + box.w / 2, box.y + 28);
  }

  // =========================
  // Motion model
  // =========================
  function flap(t) {
    const s = Math.sin(t);
    return {
      s,
      down: Math.max(0, -s),
      up: Math.max(0, s),
    };
  }

  function bodyMotion(t) {
    return {
      bob: Math.sin(t * 2.1) * 1.4 + Math.sin(t) * 0.8,
      pitch: rad(-2.5 + 1.4 * Math.sin(t * 2.1 - 0.5)),
    };
  }

  function muscleActivations(t) {
    const cyc = t * 2.5;
    const s = Math.sin(cyc);
    return {
      shoulderDown: clamp(-s, 0, 1),
      shoulderUp: clamp(s, 0, 1) * 0.92,
      elbowExtend: clamp(-Math.sin(cyc - 0.18), 0, 1),
      elbowFlex: clamp(Math.sin(cyc - 0.18), 0, 1),
      wristExtend: clamp(-Math.sin(cyc - 0.30), 0, 1),
      wristFlex: clamp(Math.sin(cyc - 0.30), 0, 1),
      spread: clamp(-s, 0, 1),
      fold: clamp(s, 0, 1),
    };
  }

  function integrateJoint(angle, vel, dt, cfg, agonist, antagonist) {
    const active = cfg.kAg * agonist - cfg.kAnt * antagonist;
    const passive = -cfg.kSpring * (angle - cfg.rest);
    const damping = -cfg.kDamp * vel;
    const acc = active + passive + damping;
    vel += acc * dt;
    angle += vel * dt;
    angle = clamp(angle, cfg.min, cfg.max);
    return { angle, vel };
  }

  const wingState = {
    right: { shPitch: rad(36), shVel: 0, elPitch: rad(10), elVel: 0, wrPitch: rad(4), wrVel: 0 },
    left:  { shPitch: rad(36), shVel: 0, elPitch: rad(10), elVel: 0, wrPitch: rad(4), wrVel: 0 },
  };

  function stepWing(sideState, acts, dt) {
    let r = integrateJoint(
      sideState.shPitch, sideState.shVel, dt,
      { min: rad(-78), max: rad(104), rest: rad(18), kAg: 9.2, kAnt: 7.2, kSpring: 12.0, kDamp: 4.6 },
      acts.shoulderUp, acts.shoulderDown
    );
    sideState.shPitch = r.angle;
    sideState.shVel = r.vel;

    r = integrateJoint(
      sideState.elPitch, sideState.elVel, dt,
      { min: rad(-20), max: rad(72), rest: rad(10), kAg: 5.0, kAnt: 4.6, kSpring: 8.4, kDamp: 3.8 },
      acts.elbowFlex, acts.elbowExtend
    );
    sideState.elPitch = r.angle;
    sideState.elVel = r.vel;

    r = integrateJoint(
      sideState.wrPitch, sideState.wrVel, dt,
      { min: rad(-12), max: rad(82), rest: rad(6), kAg: 4.2, kAnt: 3.6, kSpring: 7.4, kDamp: 3.2 },
      acts.wristFlex, acts.wristExtend
    );
    sideState.wrPitch = r.angle;
    sideState.wrVel = r.vel;
  }

  // =========================
  // Unified 3D wing model
  // =========================
  function wing3D(side, t, st) {
    const acts = muscleActivations(t);

    const shoulder = pt(
      side * (58 + 8 * acts.spread - 6 * acts.fold),
      -8 + 6 * Math.sin(t * 2.5 - 0.2),
      0
    );

    const L1 = 54;
    const L2 = 78;
    const L3 = 62;

    const shYaw   = rad(side * (62 + 20 * acts.spread - 28 * acts.fold));
    const shPitch = st.shPitch;
    const shFwd   = rad(34 * acts.spread - 20 * acts.fold);
    const shRoll  = rad(side * (8 * acts.fold - 4 * acts.spread));

    const elYaw   = rad(side * (10 + 10 * acts.spread - 12 * acts.fold));
    const elPitch = st.elPitch;

    const wrYaw    = rad(side * (2 + 10 * acts.spread - 20 * acts.fold));
    const wrPitch  = st.wrPitch;
    const wrFeather = rad(34 * acts.fold - 6 * acts.spread);

    let v1 = pt(L1, 0, 0);
    v1 = rotZ(v1, shPitch);
    v1 = rotY(v1, -shYaw * side);
    v1 = rotX(v1, shFwd);
    v1 = rotX(v1, shRoll);
    const elbow = add(shoulder, { x: v1.x * side, y: v1.y, z: v1.z });

    let v2 = pt(L2, 0, 0);
    v2 = rotZ(v2, elPitch);
    v2 = rotY(v2, -elYaw * side);
    v2 = scale(v2, 0.98 + 0.02 * acts.spread);
    const wrist = add(elbow, { x: v2.x * side, y: v2.y, z: v2.z });

    let v3 = pt(L3, 0, 0);
    v3 = rotZ(v3, wrPitch + wrFeather);
    v3 = rotY(v3, -wrYaw * side);
    v3 = rotX(v3, rad(10 * acts.fold - 3 * acts.spread));
    const tip = add(wrist, { x: v3.x * side, y: v3.y, z: v3.z });

    return { shoulder, elbow, wrist, tip, acts };
  }

  function makeWingSurface3D(wing) {
    const chain = [wing.shoulder, wing.elbow, wing.wrist, wing.tip];
    const lead = [];
    const trail = [];
    for (let i = 0; i < chain.length; i++) {
      const p = chain[i];
      const prev = chain[Math.max(0, i - 1)];
      const next = chain[Math.min(chain.length - 1, i + 1)];
      const tan = norm(sub(next, prev));
      let n = { x: 0, y: -tan.z, z: tan.y };
      n = norm(n);

      const tt = i / (chain.length - 1);
      const thick = mix(20, 7, tt) * (1 + 0.16 * wing.acts.spread - 0.10 * wing.acts.fold);
      lead.push(add(p, scale(n, 0.24 * thick)));
      trail.unshift(add(p, scale(n, -0.56 * thick)));
    }
    return { lead, trail };
  }

  function projectFront(p, cx, cy) {
    return { x: cx + p.x, y: cy + p.y };
  }
  function projectSide(p, cx, cy) {
    return { x: cx + p.z, y: cy + p.y };
  }

  // =========================
  // Drawing helpers
  // =========================
  function drawMuscle(a, b, baseWidth, color, alpha, side) {
    const n = normal2(a, b);
    const off = 4 * side;
    const w = baseWidth * alpha;

    const a1 = { x: a.x + n.x * off, y: a.y + n.y * off };
    const b1 = { x: b.x + n.x * off, y: b.y + n.y * off };

    const poly = [
      { x: a1.x + n.x * w * 0.18, y: a1.y + n.y * w * 0.18 },
      { x: mix(a1.x, b1.x, 0.55) + n.x * w * 0.50, y: mix(a1.y, b1.y, 0.55) + n.y * w * 0.50 },
      { x: b1.x + n.x * w * 0.14, y: b1.y + n.y * w * 0.14 },
      { x: b1.x - n.x * w * 0.14, y: b1.y - n.y * w * 0.14 },
      { x: mix(a1.x, b1.x, 0.55) - n.x * w * 0.50, y: mix(a1.y, b1.y, 0.55) - n.y * w * 0.50 },
      { x: a1.x - n.x * w * 0.18, y: a1.y - n.y * w * 0.18 },
    ];

    ctx.fillStyle = color === 'A'
      ? `rgba(217,98,98,${alpha * 0.55})`
      : `rgba(79,168,103,${alpha * 0.55})`;

    ctx.beginPath();
    ctx.moveTo(poly[0].x, poly[0].y);
    poly.slice(1).forEach(p => ctx.lineTo(p.x, p.y));
    ctx.closePath();
    ctx.fill();

    ctx.strokeStyle = getComputedStyle(document.documentElement).getPropertyValue('--tendon');
    ctx.lineWidth = 1.2;
    ctx.beginPath();
    ctx.moveTo(a.x, a.y);
    ctx.lineTo(a1.x, a1.y);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(b.x, b.y);
    ctx.lineTo(b1.x, b1.y);
    ctx.stroke();
  }

  function drawWingProjected(wing, cx, cy, projector, mode, sideSign) {
    const surf = makeWingSurface3D(wing);
    const lead = surf.lead.map(p => projector(p, cx, cy));
    const trail = surf.trail.map(p => projector(p, cx, cy));
    const shoulder = projector(wing.shoulder, cx, cy);
    const elbow = projector(wing.elbow, cx, cy);
    const wrist = projector(wing.wrist, cx, cy);
    const tip = projector(wing.tip, cx, cy);

    ctx.fillStyle = 'rgba(242,239,227,.90)';
    ctx.beginPath();
    ctx.moveTo(lead[0].x, lead[0].y);
    [...lead.slice(1), ...trail].forEach(p => ctx.lineTo(p.x, p.y));
    ctx.closePath();
    ctx.fill();

    const featherN = 10;
    for (let i = 0; i < featherN; i++) {
      const tt = i / (featherN - 1);
      const p3 = lerpPt3(wing.wrist, wing.tip, tt * 0.98);
      const p = projector(p3, cx, cy);
      let dx, dy;
      if (mode === 'front') {
        dx = sideSign * (18 + 18 * tt + wing.acts.spread * 18 - wing.acts.fold * 10);
        dy = 14 + 8 * tt + wing.acts.spread * 10 - wing.acts.fold * 8;
      } else {
        dx = 28 + 20 * tt + wing.acts.spread * 14 - wing.acts.fold * 8;
        dy = -10 - 8 * tt + wing.acts.spread * 4 - wing.acts.fold * 4;
      }
      ctx.strokeStyle = 'rgba(207,199,172,.9)';
      ctx.lineWidth = mix(1.7, 1.0, tt);
      ctx.beginPath();
      ctx.moveTo(p.x, p.y);
      ctx.lineTo(p.x + dx, p.y + dy);
      ctx.stroke();
    }

    if (mode === 'side') {
      drawMuscle(shoulder, elbow, 14, 'A', 0.35 + wing.acts.shoulderUp * 0.55, -1);
      drawMuscle(shoulder, elbow, 16, 'B', 0.35 + wing.acts.shoulderDown * 0.55, +1);
      drawMuscle(elbow, wrist, 10, 'A', 0.25 + wing.acts.elbowFlex * 0.55, -1);
      drawMuscle(elbow, wrist, 10, 'B', 0.25 + wing.acts.elbowExtend * 0.55, +1);
      drawMuscle(wrist, tip, 7, 'A', 0.25 + wing.acts.wristFlex * 0.55, -1);
      drawMuscle(wrist, tip, 7, 'B', 0.25 + wing.acts.wristExtend * 0.55, +1);
    }

    ctx.strokeStyle = getComputedStyle(document.documentElement).getPropertyValue('--bone');
    ctx.lineWidth = 3.2;
    ctx.beginPath();
    ctx.moveTo(shoulder.x, shoulder.y);
    ctx.lineTo(elbow.x, elbow.y);
    ctx.lineTo(wrist.x, wrist.y);
    ctx.lineTo(tip.x, tip.y);
    ctx.stroke();
  }

  function drawFrontBird(box, t) {
    const cx = box.x + box.w / 2;
    const cy = box.y + box.h * 0.66;
    const body = bodyMotion(t);

    const left = wing3D(-1, t, wingState.left);
    const right = wing3D(+1, t, wingState.right);

    drawWingProjected(left, cx, cy + body.bob, projectFront, 'front', -1);
    drawWingProjected(right, cx, cy + body.bob, projectFront, 'front', +1);

    ctx.save();
    ctx.translate(cx, cy + body.bob - 8);
    ctx.rotate(body.pitch * 0.15);
    ctx.fillStyle = getComputedStyle(document.documentElement).getPropertyValue('--body');
    ctx.beginPath();
    ctx.ellipse(0, 0, 64, 42, 0, 0, Math.PI * 2);
    ctx.fill();

    ctx.fillStyle = getComputedStyle(document.documentElement).getPropertyValue('--body-shade');
    ctx.beginPath(); ctx.ellipse(0, 14, 18, 13, 0, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(-22, -8, 14, 10, 0.2, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(22, -8, 14, 10, -0.2, 0, Math.PI * 2); ctx.fill();

    ctx.fillStyle = '#262626';
    ctx.beginPath(); ctx.arc(-8, -8, 3.2, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(8, -8, 3.2, 0, Math.PI * 2); ctx.fill();

    ctx.strokeStyle = '#262626';
    ctx.lineWidth = 1.8;
    ctx.beginPath();
    ctx.arc(0, -10, 10, 0.25 * Math.PI, 0.75 * Math.PI);
    ctx.stroke();
    ctx.restore();

    ctx.strokeStyle = getComputedStyle(document.documentElement).getPropertyValue('--flow');
    ctx.lineWidth = 1.4;
    for (let i = 0; i < 140; i++) {
      const x = box.x + ((i * 73 + state.t * 160) % box.w);
      const y = box.y + 18 + ((i * 41 + 130) % (box.h - 30));
      ctx.beginPath();
      ctx.moveTo(x, y);
      ctx.lineTo(x + 5, y + 1);
      ctx.stroke();
    }
  }

  function drawSideBird(box, t) {
    const bodyCx = box.x + box.w * 0.30;
    const bodyCy = box.y + box.h * 0.70;
    const body = bodyMotion(t);

    ctx.save();
    ctx.translate(bodyCx, bodyCy + body.bob);
    ctx.rotate(body.pitch);
    ctx.fillStyle = getComputedStyle(document.documentElement).getPropertyValue('--body');
    ctx.beginPath(); ctx.ellipse(0, 0, 66, 38, 0, 0, Math.PI * 2); ctx.fill();

    ctx.fillStyle = getComputedStyle(document.documentElement).getPropertyValue('--body-shade');
    ctx.beginPath(); ctx.ellipse(-18, -12, 18, 12, 0, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(0, 10, 18, 14, 0, 0, Math.PI * 2); ctx.fill();

    ctx.fillStyle = getComputedStyle(document.documentElement).getPropertyValue('--body');
    ctx.beginPath(); ctx.ellipse(-44, -2, 18, 16, 0, 0, Math.PI * 2); ctx.fill();

    ctx.fillStyle = '#262626';
    ctx.beginPath(); ctx.moveTo(-75, 0); ctx.lineTo(-55, -4); ctx.lineTo(-55, 4); ctx.closePath(); ctx.fill();
    ctx.beginPath(); ctx.arc(-48, -6, 3.2, 0, Math.PI * 2); ctx.fill();

    ctx.fillStyle = '#e5dfd3';
    ctx.beginPath(); ctx.moveTo(48, 2); ctx.lineTo(68, 8); ctx.lineTo(48, -6); ctx.closePath(); ctx.fill();
    ctx.restore();

    const wing = wing3D(+1, t, wingState.right);
    drawWingProjected(wing, bodyCx, bodyCy + body.bob, projectSide, 'side', +1);

    ctx.strokeStyle = 'rgba(110,160,255,.45)';
    ctx.setLineDash([4, 8]);
    ctx.lineWidth = 1.6;
    ctx.beginPath();
    for (let i = 0; i <= 52; i++) {
      const tt = t - i * 0.10;
      const qWing = wing3D(+1, tt, wingState.right);
      const q = projectSide(qWing.tip, bodyCx, bodyCy + bodyMotion(tt).bob);
      if (i === 0) ctx.moveTo(q.x, q.y);
      else ctx.lineTo(q.x, q.y);
    }
    ctx.stroke();
    ctx.setLineDash([]);
  }

  // =========================
  // Main loop
  // =========================
  const state = { t: 0 };
  let last = performance.now();

  function frame(ts) {
    const dt = clamp((ts - last) / 1000, 1 / 240, 1 / 30);
    last = ts;
    state.t = ts * 0.001;

    const acts = muscleActivations(state.t);
    stepWing(wingState.right, acts, dt);
    stepWing(wingState.left, acts, dt);

    ctx.clearRect(0, 0, window.innerWidth, window.innerHeight);
    const boxes = getLayout();
    drawPanel(boxes.front, 'Front view');
    drawPanel(boxes.side, 'Left view');
    drawFrontBird(boxes.front, state.t);
    drawSideBird(boxes.side, state.t);

    requestAnimationFrame(frame);
  }

  requestAnimationFrame(frame);
})();
</script>
</body>
</html>
