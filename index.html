
<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>羽ばたき後流 渦あり版 調整版</title>
<style>
  :root{
    --bg:#041019;
    --panel:#071b2c;
    --text:#eaf6ff;
    --muted:#b7c9d8;
  }
  html,body{
    margin:0; padding:0; width:100%; height:100%;
    background: radial-gradient(circle at 50% 10%, #08243a 0%, #041019 45%, #020a10 100%);
    color:var(--text); font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
    overflow:hidden;
  }
  #wrap{ position:fixed; inset:0; display:grid; grid-template-rows:auto 1fr; }
  #ui{
    background:linear-gradient(180deg, rgba(4,16,25,.95), rgba(5,20,32,.88));
    border-bottom:1px solid rgba(255,255,255,.08);
    padding:10px 12px 8px;
    backdrop-filter: blur(6px);
    z-index:10;
  }
  .row{ display:flex; align-items:center; gap:10px; margin:8px 0; flex-wrap:wrap; }
  label{ min-width:108px; font-size:16px; }
  input[type="range"]{ width:180px; max-width:46vw; }
  button{
    background:#113042; color:#d7e9ff; border:1px solid rgba(255,255,255,.12);
    border-radius:12px; padding:10px 16px; font-size:15px;
    box-shadow: inset 0 0 0 1px rgba(255,255,255,.05);
  }
  .pill{
    display:inline-block; font-size:12px; padding:3px 8px; border-radius:999px;
    background:rgba(77,163,255,.10); border:1px solid rgba(77,163,255,.22); color:#cfe6ff;
  }
  #msg{ color:var(--muted); font-size:13px; line-height:1.35; margin-top:6px; }
  canvas{ width:100%; height:100%; display:block; touch-action:none; }
</style>
</head>
<body>
<div id="wrap">
  <div id="ui">
    <div class="row">
      <label>羽ばたき振幅</label>
      <input id="amp" type="range" min="10" max="120" value="42" />
    </div>
    <div class="row">
      <label>周波数</label>
      <input id="freq" type="range" min="20" max="180" value="58" />
    </div>
    <div class="row">
      <label>迎角ねじり</label>
      <input id="twist" type="range" min="0" max="100" value="35" />
    </div>
    <div class="row">
      <label>渦の強さ</label>
      <input id="strength" type="range" min="10" max="160" value="52" />
      <button id="reset">リセット</button>
      <span class="pill">白飛び調整版</span>
    </div>
    <div id="msg">発光を抑え、渦核と流線が見やすくなるよう調整した版です。指でなぞると流れを乱せます。</div>
  </div>
  <canvas id="cv"></canvas>
</div>

<script>
(() => {
  const canvas = document.getElementById('cv');
  const ctx = canvas.getContext('2d', { alpha: true });

  const ampEl = document.getElementById('amp');
  const freqEl = document.getElementById('freq');
  const twistEl = document.getElementById('twist');
  const strengthEl = document.getElementById('strength');
  const resetBtn = document.getElementById('reset');

  let W = 0, H = 0, DPR = Math.min(devicePixelRatio || 1, 2);

  let vortices = [];
  let tracers = [];
  let mist = [];
  let touches = [];
  let simT = 0;
  let prevStrokeVel = 0;
  let emissionCooldown = 0;
  let frame = 0;

  const MAX_VORTICES = 48;
  const MAX_TRACERS = 560;
  const MAX_MIST = 360;

  function rand(a,b){ return a + Math.random()*(b-a); }

  function resize(){
    const uiH = document.getElementById('ui').getBoundingClientRect().height;
    W = window.innerWidth;
    H = window.innerHeight - uiH;
    canvas.width = Math.floor(W * DPR);
    canvas.height = Math.floor(H * DPR);
    canvas.style.width = W + 'px';
    canvas.style.height = H + 'px';
    ctx.setTransform(DPR,0,0,DPR,0,0);
    seed();
  }

  function params(){
    return {
      amp: +ampEl.value,
      freq: +freqEl.value / 60,
      twist: +twistEl.value / 100,
      strength: +strengthEl.value / 100
    };
  }

  function seed(){
    tracers.length = 0;
    mist.length = 0;
    vortices.length = 0;
    for(let i=0;i<MAX_TRACERS;i++){
      tracers.push({
        x: rand(0,W), y: rand(0,H), px: 0, py: 0,
        age: rand(0,180), life: rand(70,170),
        a: rand(0.05, 0.18)
      });
      tracers[i].px = tracers[i].x;
      tracers[i].py = tracers[i].y;
    }
    for(let i=0;i<MAX_MIST;i++){
      mist.push({
        x: rand(0,W), y: rand(0,H), vx:0, vy:0,
        age: rand(0,120), life: rand(45,110),
        s: rand(0.7,1.7), a: rand(0.015, 0.05)
      });
    }
  }

  function resetAll(){
    simT = 0;
    prevStrokeVel = 0;
    emissionCooldown = 0;
    touches.length = 0;
    seed();
  }

  function wingState(t){
    const p = params();
    const x = W * 0.18;
    const y0 = H * 0.46;
    const y = y0 + p.amp * Math.sin(t * p.freq * Math.PI * 2);
    const vy = p.amp * p.freq * Math.PI * 2 * Math.cos(t * p.freq * Math.PI * 2);
    const chord = Math.max(28, Math.min(54, W * 0.06));
    const ang = 0.22 * p.twist * Math.sin(t * p.freq * Math.PI * 2 + Math.PI/2);
    return {x,y,y0,vy,chord,ang};
  }

  function emitVortex(x, y, gamma, r){
    vortices.push({ x, y, gamma, r, age:0, life:rand(3.2, 5.6) });
    if(vortices.length > MAX_VORTICES) vortices.splice(0, vortices.length - MAX_VORTICES);
  }

  function velocityAt(x,y){
    const p = params();
    let u = 24 + p.freq * 12;
    let v = 0;

    for(const q of vortices){
      const dx = x - q.x, dy = y - q.y;
      const rr = dx*dx + dy*dy + q.r*q.r;
      const f = q.gamma / rr;
      u += -dy * f;
      v +=  dx * f;
    }

    for(const tp of touches){
      const dx = x - tp.x, dy = y - tp.y;
      const rr = dx*dx + dy*dy + 200;
      const pull = 700 / rr;
      u += tp.vx * pull;
      v += tp.vy * pull;
    }

    const ws = wingState(simT);
    const dxw = x - ws.x, dyw = y - ws.y;
    if(dxw > 0){
      const g = Math.exp(-(dxw*dxw)/(W*0.14) - (dyw*dyw)/(H*0.035));
      u += 10 * g;
      v += ws.vy * 0.10 * g;
    }

    return {u,v};
  }

  function step(dt){
    simT += dt;
    frame++;
    const p = params();
    const ws = wingState(simT);

    emissionCooldown -= dt;
    const strokeSign = Math.sign(ws.vy || 1);
    const signFlip = Math.sign(prevStrokeVel || 1) !== strokeSign;
    prevStrokeVel = ws.vy;

    if(signFlip || (Math.abs(ws.vy) > 70 && emissionCooldown <= 0)){
      const teX = ws.x + Math.cos(ws.ang) * ws.chord * 0.7;
      const teY = ws.y + Math.sin(ws.ang) * ws.chord * 0.7;
      const gamma = (-strokeSign) * (34 + 105 * p.strength + 45 * p.twist);
      const r = 16 + 10 * p.twist;
      emitVortex(teX, teY, gamma, r);
      emitVortex(teX + rand(8,14), teY + strokeSign * rand(6,10), -gamma * 0.34, r*0.85);
      emissionCooldown = 0.17 + (1.0 - p.freq) * 0.05;
    }

    for(let i=vortices.length-1;i>=0;i--){
      const q = vortices[i];
      q.age += dt;
      if(q.age > q.life){ vortices.splice(i,1); continue; }

      let u = 26 + p.freq * 15;
      let v = 0;
      for(let j=0;j<vortices.length;j++){
        if(i===j) continue;
        const o = vortices[j];
        const dx = q.x - o.x, dy = q.y - o.y;
        const rr = dx*dx + dy*dy + o.r*o.r;
        const f = o.gamma / rr;
        u += -dy * f * 0.42;
        v +=  dx * f * 0.42;
      }
      q.x += u * dt;
      q.y += v * dt;
      q.gamma *= Math.pow(0.988, dt*60);
      q.r += 1.3 * dt * 60;

      if(q.x > W + 60 || q.y < -80 || q.y > H + 80){
        vortices.splice(i,1);
      }
    }

    for(const tr of tracers){
      tr.age += dt * 60;
      tr.px = tr.x; tr.py = tr.y;
      const vel = velocityAt(tr.x, tr.y);
      tr.x += vel.u * dt;
      tr.y += vel.v * dt;

      if(tr.x < -15 || tr.x > W + 15 || tr.y < -15 || tr.y > H + 15 || tr.age > tr.life){
        tr.x = rand(-10, W*0.18);
        tr.y = rand(0,H);
        tr.px = tr.x; tr.py = tr.y;
        tr.age = 0; tr.life = rand(80,170);
      }
    }

    for(const m of mist){
      m.age += dt * 60;
      const vel = velocityAt(m.x, m.y);
      m.vx = m.vx * 0.90 + vel.u * 0.10;
      m.vy = m.vy * 0.90 + vel.v * 0.10;
      m.x += m.vx * dt;
      m.y += m.vy * dt;

      if(m.x < -15 || m.x > W + 15 || m.y < -15 || m.y > H + 15 || m.age > m.life){
        m.x = ws.x + rand(-10, 8);
        m.y = ws.y + rand(-10, 10);
        m.vx = 14 + rand(-3, 5);
        m.vy = ws.vy * 0.03 + rand(-5, 5);
        m.age = 0; m.life = rand(40,100);
        m.s = rand(0.7,1.7);
        m.a = rand(0.015,0.05);
      }
    }

    for(let i=touches.length-1;i>=0;i--){
      touches[i].life -= dt;
      if(touches[i].life <= 0) touches.splice(i,1);
    }
  }

  function drawBackground(){
    ctx.clearRect(0,0,W,H);
    const g = ctx.createLinearGradient(0,0,0,H);
    g.addColorStop(0, 'rgba(5,18,28,1)');
    g.addColorStop(1, 'rgba(2,10,16,1)');
    ctx.fillStyle = g;
    ctx.fillRect(0,0,W,H);

    ctx.strokeStyle = 'rgba(70,140,210,0.04)';
    ctx.lineWidth = 1;
    for(let y=0;y<H;y+=16){
      ctx.beginPath();
      ctx.moveTo(0,y+Math.sin((y+simT*20)*0.03)*1.5);
      for(let x=0;x<=W;x+=24){
        ctx.lineTo(x, y + Math.sin((x*0.02)+(y*0.016)+simT*1.1)*1.7);
      }
      ctx.stroke();
    }
  }

  function drawMist(){
    ctx.save();
    ctx.globalCompositeOperation = 'screen';
    for(const m of mist){
      const alpha = m.a * (1 - m.age / m.life);
      ctx.fillStyle = `rgba(120,190,255,${alpha})`;
      ctx.beginPath();
      ctx.arc(m.x, m.y, m.s, 0, Math.PI*2);
      ctx.fill();
    }
    ctx.restore();
  }

  function drawTracers(){
    ctx.save();
    ctx.globalCompositeOperation = 'source-over';
    for(const tr of tracers){
      const lifeK = 1 - tr.age / tr.life;
      ctx.strokeStyle = `rgba(220,238,255,${0.05 + tr.a * lifeK})`;
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(tr.px, tr.py);
      ctx.lineTo(tr.x, tr.y);
      ctx.stroke();
    }
    ctx.restore();
  }

  function drawVortexCores(){
    for(const q of vortices){
      const a = 0.11 * (1 - q.age / q.life);
      const r = Math.max(5, q.r*0.42);
      const grad = ctx.createRadialGradient(q.x,q.y,0,q.x,q.y,r*1.8);
      if(q.gamma > 0){
        grad.addColorStop(0, `rgba(100,180,255,${a})`);
        grad.addColorStop(0.45, `rgba(100,180,255,${a*0.35})`);
      } else {
        grad.addColorStop(0, `rgba(255,120,180,${a})`);
        grad.addColorStop(0.45, `rgba(255,120,180,${a*0.35})`);
      }
      grad.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.arc(q.x, q.y, r*1.8, 0, Math.PI*2);
      ctx.fill();

      ctx.strokeStyle = q.gamma > 0 ? 'rgba(120,190,255,0.16)' : 'rgba(255,145,190,0.16)';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.arc(q.x, q.y, r, 0, Math.PI*1.6);
      ctx.stroke();
    }
  }

  function drawWing(){
    const ws = wingState(simT);
    ctx.save();
    ctx.translate(ws.x, ws.y);
    ctx.rotate(ws.ang);

    const rx = Math.max(14, Math.min(22, W*0.022));
    const ry = Math.max(20, Math.min(28, H*0.03));

    const grad = ctx.createRadialGradient(-4,-4,2,0,0,ry*1.6);
    grad.addColorStop(0,'rgba(185,225,255,0.92)');
    grad.addColorStop(0.55,'rgba(85,165,245,0.82)');
    grad.addColorStop(1,'rgba(40,100,185,0.12)');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.ellipse(0,0,rx,ry,0,0,Math.PI*2);
    ctx.fill();

    ctx.strokeStyle = 'rgba(225,245,255,0.45)';
    ctx.lineWidth = 1.1;
    ctx.beginPath();
    ctx.moveTo(-rx*0.55, -ry*0.35);
    ctx.quadraticCurveTo(-rx*0.10, -ry*0.05, rx*0.65, ry*0.55);
    ctx.stroke();

    ctx.restore();
  }

  function drawLabel(){
    ctx.fillStyle = 'rgba(210,225,240,0.22)';
    ctx.font = '12px system-ui, sans-serif';
    ctx.fillText('渦あり後流モデル 調整版', 10, H - 12);
  }

  let lastStamp = performance.now();
  function loop(now){
    const dt = Math.min(0.033, (now - lastStamp) / 1000);
    lastStamp = now;
    step(dt);
    drawBackground();
    drawMist();
    drawTracers();
    drawVortexCores();
    drawWing();
    drawLabel();
    requestAnimationFrame(loop);
  }

  function pointerPos(ev){
    const r = canvas.getBoundingClientRect();
    if(ev.touches && ev.touches.length){
      return Array.from(ev.touches).map(t => ({x:t.clientX-r.left, y:t.clientY-r.top}));
    }
    return [{x:ev.clientX-r.left, y:ev.clientY-r.top}];
  }

  let lastTouchPts = [];
  function handleTouch(ev){
    const pts = pointerPos(ev);
    const next = [];
    for(let i=0;i<pts.length;i++){
      const p = pts[i];
      const prev = lastTouchPts[i] || p;
      next.push(p);
      touches.push({
        x:p.x, y:p.y,
        vx:(p.x-prev.x)*8,
        vy:(p.y-prev.y)*8,
        life:0.20
      });
    }
    lastTouchPts = next;
    ev.preventDefault();
  }
  function endTouch(){ lastTouchPts = []; }

  canvas.addEventListener('touchstart', handleTouch, {passive:false});
  canvas.addEventListener('touchmove', handleTouch, {passive:false});
  canvas.addEventListener('touchend', endTouch, {passive:false});
  canvas.addEventListener('mousedown', (e)=>handleTouch(e));
  canvas.addEventListener('mousemove', (e)=>{ if(e.buttons) handleTouch(e); });
  canvas.addEventListener('mouseup', endTouch);

  resetBtn.addEventListener('click', resetAll);
  window.addEventListener('resize', resize);

  resize();
  resetAll();
  requestAnimationFrame(loop);
})();
</script>
</body>
</html>
