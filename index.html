<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>羽ばたき翼の流れ - スマホ対応版</title>
  <style>
    html, body {
      margin: 0;
      height: 100%;
      background: #03070d;
      color: #eaf4ff;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      overflow: hidden;
    }
    #wrap {
      position: fixed;
      inset: 0;
      display: grid;
      grid-template-rows: auto 1fr;
    }
    #ui {
      background: linear-gradient(180deg, rgba(3,12,24,0.98), rgba(5,18,32,0.94));
      border-bottom: 1px solid rgba(255,255,255,0.08);
      padding: 10px 12px 12px;
      box-sizing: border-box;
      display: flex;
      flex-wrap: wrap;
      gap: 10px 18px;
      align-items: center;
    }
    .ctl {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      white-space: nowrap;
      font-size: 15px;
    }
    .ctl input[type="range"] { width: 120px; }
    button {
      background: #12314d;
      color: #e7f2ff;
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 10px;
      padding: 8px 14px;
      font-size: 15px;
    }
    #msg {
      width: 100%;
      opacity: 0.85;
      font-size: 13px;
      line-height: 1.4;
    }
    canvas {
      width: 100%;
      height: 100%;
      display: block;
      touch-action: none;
    }
  </style>
</head>
<body>
<div id="wrap">
  <div id="ui">
    <label class="ctl">羽ばたき振幅 <input id="amp" type="range" min="0.2" max="1.6" step="0.01" value="0.85"></label>
    <label class="ctl">周波数 <input id="freq" type="range" min="0.3" max="2.4" step="0.01" value="0.95"></label>
    <label class="ctl">迎角ねじり <input id="twist" type="range" min="0.0" max="2.4" step="0.01" value="1.35"></label>
    <label class="ctl">渦の強さ <input id="vort" type="range" min="0.2" max="2.4" step="0.01" value="1.15"></label>
    <button id="reset">リセット</button>
    <div id="msg">スマホ対応の軽量版です。羽ばたきで生じる後流の渦を近似表示します。指で画面をなぞると流れを乱せます。</div>
  </div>
  <canvas id="cv"></canvas>
</div>
<script>
(() => {
  const cv = document.getElementById('cv');
  const ctx = cv.getContext('2d', { alpha: false });
  const ampEl = document.getElementById('amp');
  const freqEl = document.getElementById('freq');
  const twistEl = document.getElementById('twist');
  const vortEl = document.getElementById('vort');
  const resetBtn = document.getElementById('reset');

  let W = 0, H = 0, DPR = Math.min(devicePixelRatio || 1, 2);
  let simW = 0, simH = 0, N = 0;
  let u, v, u2, v2, dye, dye2, curl;
  let particles = [];
  let touches = [];
  let vortices = [];
  let lastT = 0;
  let simScale = 6;

  function idx(x, y) { return x + y * simW; }
  function clamp(a, mn, mx) { return a < mn ? mn : a > mx ? mx : a; }
  function lerp(a, b, t) { return a + (b - a) * t; }

  function alloc() {
    simW = Math.max(90, Math.floor(W / simScale));
    simH = Math.max(50, Math.floor(H / simScale));
    N = simW * simH;
    u = new Float32Array(N); v = new Float32Array(N);
    u2 = new Float32Array(N); v2 = new Float32Array(N);
    dye = new Float32Array(N); dye2 = new Float32Array(N);
    curl = new Float32Array(N);
    particles = [];
    const pCount = Math.min(5000, Math.floor(simW * simH * 0.5));
    for (let i = 0; i < pCount; i++) {
      particles.push({
        x: Math.random() * simW,
        y: Math.random() * simH,
        px: 0, py: 0,
        life: Math.random() * 200
      });
    }
    vortices = [];
  }

  function resize() {
    const uiH = document.getElementById('ui').offsetHeight;
    const rectW = window.innerWidth;
    const rectH = window.innerHeight - uiH;
    cv.width = Math.max(1, Math.floor(rectW * DPR));
    cv.height = Math.max(1, Math.floor(rectH * DPR));
    cv.style.width = rectW + 'px';
    cv.style.height = rectH + 'px';
    ctx.setTransform(1, 0, 0, 1, 0, 0);
    ctx.scale(DPR, DPR);
    W = rectW;
    H = rectH;
    simScale = W < 500 ? 7 : 6;
    alloc();
  }

  function clearSim() {
    u.fill(0); v.fill(0); dye.fill(0); curl.fill(0); vortices.length = 0;
    for (const p of particles) {
      p.x = Math.random() * simW;
      p.y = Math.random() * simH;
      p.life = Math.random() * 200;
    }
  }

  function sample(arr, x, y) {
    x = clamp(x, 0, simW - 1.001);
    y = clamp(y, 0, simH - 1.001);
    const x0 = x | 0, y0 = y | 0;
    const x1 = Math.min(x0 + 1, simW - 1), y1 = Math.min(y0 + 1, simH - 1);
    const tx = x - x0, ty = y - y0;
    const a = arr[idx(x0, y0)], b = arr[idx(x1, y0)], c = arr[idx(x0, y1)], d = arr[idx(x1, y1)];
    return lerp(lerp(a, b, tx), lerp(c, d, tx), ty);
  }

  function addImpulse(cx, cy, fx, fy, radius, dyeAmount = 0) {
    const minX = Math.max(1, Math.floor(cx - radius));
    const maxX = Math.min(simW - 2, Math.ceil(cx + radius));
    const minY = Math.max(1, Math.floor(cy - radius));
    const maxY = Math.min(simH - 2, Math.ceil(cy + radius));
    const r2 = radius * radius;
    for (let y = minY; y <= maxY; y++) {
      for (let x = minX; x <= maxX; x++) {
        const dx = x - cx, dyv = y - cy;
        const d2 = dx * dx + dyv * dyv;
        if (d2 > r2) continue;
        const fall = Math.exp(-d2 / (r2 * 0.38));
        const i = idx(x, y);
        u[i] += fx * fall;
        v[i] += fy * fall;
        dye[i] += dyeAmount * fall;
      }
    }
  }

  function spawnVortex(x, y, str, rad, ageMax) {
    vortices.push({ x, y, str, rad, age: 0, ageMax });
    if (vortices.length > 36) vortices.shift();
  }

  function applyVortices(dt) {
    const advectSpeed = 7.5;
    for (let n = vortices.length - 1; n >= 0; n--) {
      const q = vortices[n];
      q.age += dt;
      q.x += advectSpeed * dt;
      q.y += Math.sin(q.age * 2.3) * 0.03;
      if (q.age > q.ageMax || q.x > simW + 15) {
        vortices.splice(n, 1);
        continue;
      }
      const minX = Math.max(1, Math.floor(q.x - q.rad));
      const maxX = Math.min(simW - 2, Math.ceil(q.x + q.rad));
      const minY = Math.max(1, Math.floor(q.y - q.rad));
      const maxY = Math.min(simH - 2, Math.ceil(q.y + q.rad));
      const decay = 1 - q.age / q.ageMax;
      for (let y = minY; y <= maxY; y++) {
        for (let x = minX; x <= maxX; x++) {
          const dx = x - q.x, dyv = y - q.y;
          const rr = dx * dx + dyv * dyv + 0.8;
          const r = Math.sqrt(rr);
          if (r > q.rad) continue;
          const tang = q.str * decay * Math.exp(-rr / (q.rad * q.rad * 0.7));
          const i = idx(x, y);
          u[i] += (-dyv / r) * tang;
          v[i] += ( dx / r) * tang;
          dye[i] += 0.03 * decay;
        }
      }
    }
  }

  function wingForTime(t) {
    const A = parseFloat(ampEl.value);
    const F = parseFloat(freqEl.value);
    const T = parseFloat(twistEl.value);
    const cx = simW * 0.22;
    const cy = simH * 0.50 + Math.sin(t * F * Math.PI * 2) * (simH * 0.16 * A);
    const vy = Math.cos(t * F * Math.PI * 2) * (simH * 0.16 * A) * (F * Math.PI * 2);
    const ang = Math.sin(t * F * Math.PI * 2 + Math.PI * 0.42) * (0.32 + T * 0.42);
    const chord = simW * 0.085;
    const thick = simH * 0.035;
    return { cx, cy, vy, ang, chord, thick };
  }

  let prevWing = null;
  function applyWing(t, dt) {
    const wing = wingForTime(t);
    const x0 = wing.cx - wing.chord * 0.5;
    const x1 = wing.cx + wing.chord * 0.5;
    const y0 = wing.cy;
    const tx = Math.cos(wing.ang), ty = Math.sin(wing.ang);
    const nx = -ty, ny = tx;
    const V = parseFloat(vortEl.value);

    for (let s = 0; s <= 10; s++) {
      const a = s / 10;
      const px = lerp(x0, x1, a);
      const py = y0 + (a - 0.5) * wing.chord * ty * 0.3;
      const localBias = (a - 0.2);
      const pushX = 1.2 + Math.abs(wing.vy) * 0.02;
      const pushY = wing.vy * (0.65 + localBias * 0.35);
      addImpulse(px, py, pushX, pushY, wing.thick * (1.7 - Math.abs(a - 0.5)), 0.05);
    }

    const edgeX = wing.cx + tx * wing.chord * 0.54;
    const edgeY = wing.cy + ty * wing.chord * 0.18;
    const edgeSign = Math.sign(wing.vy || 1);
    if (prevWing) {
      const signNow = Math.sign(wing.vy || 1);
      const signPrev = Math.sign(prevWing.vy || 1);
      if (signNow !== signPrev || Math.abs(wing.vy) > simH * 0.18) {
        spawnVortex(edgeX, edgeY, -edgeSign * (1.3 + V * 2.1), 6 + V * 5, 3.4);
      }
    }
    addImpulse(edgeX, edgeY, 2.2 + V * 1.8, wing.vy * 0.16, wing.thick * 1.8, 0.22 + 0.08 * V);
    prevWing = wing;
    return wing;
  }

  function applyTouchForces() {
    for (const t of touches) {
      const gx = t.x / W * simW;
      const gy = t.y / H * simH;
      addImpulse(gx, gy, t.vx * 0.8, t.vy * 0.8, 6, 0.18);
      t.vx *= 0.7;
      t.vy *= 0.7;
    }
  }

  function advect(dt) {
    const back = dt * 0.95;
    for (let y = 1; y < simH - 1; y++) {
      for (let x = 1; x < simW - 1; x++) {
        const i = idx(x, y);
        const bx = x - u[i] * back;
        const by = y - v[i] * back;
        u2[i] = sample(u, bx, by) * 0.992;
        v2[i] = sample(v, bx, by) * 0.992;
        dye2[i] = sample(dye, bx, by) * 0.985;
      }
    }
    [u, u2] = [u2, u];
    [v, v2] = [v2, v];
    [dye, dye2] = [dye2, dye];
  }

  function diffuseAndBoundary() {
    for (let y = 1; y < simH - 1; y++) {
      for (let x = 1; x < simW - 1; x++) {
        const i = idx(x, y);
        u[i] = (u[i] + 0.2 * (u[idx(x-1,y)] + u[idx(x+1,y)] + u[idx(x,y-1)] + u[idx(x,y+1)])) / 1.8;
        v[i] = (v[i] + 0.2 * (v[idx(x-1,y)] + v[idx(x+1,y)] + v[idx(x,y-1)] + v[idx(x,y+1)])) / 1.8;
      }
    }
    for (let x = 0; x < simW; x++) {
      u[idx(x, 0)] = u[idx(x, simH - 1)] = 0;
      v[idx(x, 0)] = v[idx(x, simH - 1)] = 0;
    }
    for (let y = 0; y < simH; y++) {
      u[idx(0, y)] *= 0.2;
      v[idx(0, y)] *= 0.2;
      u[idx(simW - 1, y)] = u[idx(simW - 2, y)] * 0.98 + 0.04;
      v[idx(simW - 1, y)] = v[idx(simW - 2, y)] * 0.98;
    }
  }

  function computeCurl() {
    for (let y = 1; y < simH - 1; y++) {
      for (let x = 1; x < simW - 1; x++) {
        const i = idx(x, y);
        const dvdx = (v[idx(x+1,y)] - v[idx(x-1,y)]) * 0.5;
        const dudy = (u[idx(x,y+1)] - u[idx(x,y-1)]) * 0.5;
        curl[i] = dvdx - dudy;
      }
    }
  }

  function step(t, dt) {
    for (let k = 0; k < 2; k++) {
      applyWing(t + k * dt * 0.5, dt * 0.5);
      applyVortices(dt * 0.5);
      applyTouchForces();
      advect(dt * 0.5);
      diffuseAndBoundary();
    }
    computeCurl();
  }

  function drawField() {
    ctx.fillStyle = '#02060b';
    ctx.fillRect(0, 0, W, H);

    const cellW = W / simW;
    const cellH = H / simH;
    for (let y = 1; y < simH - 1; y++) {
      for (let x = 1; x < simW - 1; x++) {
        const i = idx(x, y);
        const d = dye[i];
        const c = curl[i];
        if (d < 0.01 && Math.abs(c) < 0.03) continue;
        const pos = clamp(c * 0.5 + 0.5, 0, 1);
        const blue = Math.floor(120 + d * 160 + pos * 50);
        const red = Math.floor(40 + Math.max(0, -c) * 180 + d * 45);
        const green = Math.floor(70 + d * 120);
        const alpha = clamp(d * 0.12 + Math.abs(c) * 0.13, 0, 0.6);
        ctx.fillStyle = `rgba(${red},${green},${blue},${alpha})`;
        ctx.fillRect(x * cellW, y * cellH, cellW + 1, cellH + 1);
      }
    }
  }

  function drawParticles() {
    ctx.lineWidth = 1;
    for (const p of particles) {
      p.life -= 1;
      if (p.life <= 0 || p.x < 0 || p.x >= simW || p.y < 0 || p.y >= simH) {
        p.x = Math.random() * (simW * 0.55);
        p.y = Math.random() * simH;
        p.px = p.x; p.py = p.y;
        p.life = 120 + Math.random() * 160;
      }
      p.px = p.x; p.py = p.y;
      const vx = sample(u, p.x, p.y);
      const vy = sample(v, p.x, p.y);
      p.x += vx * 0.09 + 0.06;
      p.y += vy * 0.09;
      const sx0 = p.px / simW * W, sy0 = p.py / simH * H;
      const sx1 = p.x / simW * W, sy1 = p.y / simH * H;
      const speed = Math.min(1, Math.hypot(vx, vy) * 0.12);
      ctx.strokeStyle = `rgba(${80 + speed*120}, ${170 + speed*60}, 255, ${0.10 + speed*0.22})`;
      ctx.beginPath();
      ctx.moveTo(sx0, sy0);
      ctx.lineTo(sx1, sy1);
      ctx.stroke();
    }
  }

  function drawWing(t) {
    const wing = wingForTime(t);
    const cx = wing.cx / simW * W;
    const cy = wing.cy / simH * H;
    const chord = wing.chord / simW * W;
    const thick = wing.thick / simH * H;
    ctx.save();
    ctx.translate(cx, cy);
    ctx.rotate(wing.ang);
    const grd = ctx.createLinearGradient(-chord * 0.55, 0, chord * 0.55, 0);
    grd.addColorStop(0, 'rgba(230,245,255,0.90)');
    grd.addColorStop(0.45, 'rgba(135,205,255,0.95)');
    grd.addColorStop(1, 'rgba(76,150,235,0.88)');
    ctx.fillStyle = grd;
    ctx.shadowBlur = 16;
    ctx.shadowColor = 'rgba(90,180,255,0.35)';
    ctx.beginPath();
    ctx.ellipse(0, 0, chord * 0.52, thick * 1.05, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.shadowBlur = 0;
    ctx.strokeStyle = 'rgba(255,255,255,0.45)';
    ctx.lineWidth = 1.2;
    ctx.beginPath();
    ctx.moveTo(-chord * 0.45, 0);
    ctx.quadraticCurveTo(-chord * 0.1, -thick * 0.45, chord * 0.48, 0);
    ctx.stroke();
    ctx.restore();
  }

  function drawLabels(t) {
    const wing = wingForTime(t);
    const text = `flow: ${Math.abs(wing.vy).toFixed(1)}   vortices: ${vortices.length}`;
    ctx.fillStyle = 'rgba(220,235,255,0.7)';
    ctx.font = '12px system-ui, sans-serif';
    ctx.fillText(text, 12, H - 12);
  }

  function frame(ts) {
    const t = ts * 0.001;
    let dt = lastT ? Math.min(0.033, t - lastT) : 0.016;
    lastT = t;
    step(t, dt);
    drawField();
    drawParticles();
    drawWing(t);
    drawLabels(t);
    requestAnimationFrame(frame);
  }

  function ptFromEvent(ev) {
    const r = cv.getBoundingClientRect();
    return { x: ev.clientX - r.left, y: ev.clientY - r.top };
  }

  let activeTouch = false;
  cv.addEventListener('pointerdown', (ev) => {
    activeTouch = true;
    const p = ptFromEvent(ev);
    touches = [{ x: p.x, y: p.y, vx: 0, vy: 0 }];
  });
  cv.addEventListener('pointermove', (ev) => {
    if (!activeTouch) return;
    const p = ptFromEvent(ev);
    const t = touches[0] || { x: p.x, y: p.y, vx: 0, vy: 0 };
    t.vx = (p.x - t.x) / W * simW * 1.8;
    t.vy = (p.y - t.y) / H * simH * 1.8;
    t.x = p.x; t.y = p.y;
    touches[0] = t;
  });
  window.addEventListener('pointerup', () => { activeTouch = false; touches = []; });
  window.addEventListener('pointercancel', () => { activeTouch = false; touches = []; });
  resetBtn.addEventListener('click', clearSim);
  window.addEventListener('resize', resize);

  resize();
  clearSim();
  requestAnimationFrame(frame);
})();
</script>
</body>
</html>
