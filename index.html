<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>WebGPU Flapping Wing Flow</title>
<style>
  html, body { margin: 0; height: 100%; background: #041018; color: #d7e3ea; font-family: system-ui, sans-serif; }
  #wrap { position: fixed; inset: 0; display: grid; grid-template-rows: auto 1fr; }
  #ui {
    display: flex; flex-wrap: wrap; gap: 12px; align-items: center;
    padding: 10px 14px; background: rgba(4,16,24,0.9); backdrop-filter: blur(4px);
    border-bottom: 1px solid rgba(255,255,255,0.08);
  }
  #ui label { display: inline-flex; align-items: center; gap: 6px; font-size: 14px; }
  #ui input[type="range"] { width: 120px; }
  #msg { opacity: 0.85; font-size: 13px; }
  canvas { width: 100%; height: 100%; display: block; }
  button {
    background: #113042; color: #d7e3ea; border: 1px solid rgba(255,255,255,0.15);
    border-radius: 8px; padding: 6px 12px; cursor: pointer;
  }
</style>
</head>
<body>
<div id="wrap">
  <div id="ui">
    <label>羽ばたき振幅 <input id="amp" type="range" min="0.05" max="0.35" value="0.18" step="0.005"></label>
    <label>周波数 <input id="freq" type="range" min="0.3" max="3.0" value="1.2" step="0.05"></label>
    <label>迎角ねじり <input id="pitch" type="range" min="-1.0" max="1.0" value="0.45" step="0.01"></label>
    <label>渦の強さ <input id="swirl" type="range" min="0.0" max="2.5" value="1.2" step="0.05"></label>
    <button id="resetBtn">リセット</button>
    <span id="msg">WebGPUで近似的に羽ばたき翼の後流を描画します</span>
  </div>
  <canvas id="c"></canvas>
</div>

<script type="module">
const canvas = document.getElementById('c');
const msg = document.getElementById('msg');
const ampEl = document.getElementById('amp');
const freqEl = document.getElementById('freq');
const pitchEl = document.getElementById('pitch');
const swirlEl = document.getElementById('swirl');
const resetBtn = document.getElementById('resetBtn');

if (!navigator.gpu) {
  msg.textContent = 'このブラウザは WebGPU 非対応です。Chrome / Edge の比較的新しい版で試してください。';
  throw new Error('WebGPU unsupported');
}

const adapter = await navigator.gpu.requestAdapter();
if (!adapter) {
  msg.textContent = 'GPUアダプタを取得できませんでした。';
  throw new Error('No adapter');
}
const device = await adapter.requestDevice();

const context = canvas.getContext('webgpu');
const format = navigator.gpu.getPreferredCanvasFormat();

const GRID_W = 320;
const GRID_H = 192;
const WORKGROUP = 8;
const CELLS = GRID_W * GRID_H;
const FLOATS_PER_CELL = 4; // vec4f
const BYTES_PER_FIELD = CELLS * FLOATS_PER_CELL * 4;

function resizeCanvas() {
  const dpr = Math.min(devicePixelRatio || 1, 2);
  const w = Math.max(1, Math.floor(canvas.clientWidth * dpr));
  const h = Math.max(1, Math.floor(canvas.clientHeight * dpr));
  canvas.width = w;
  canvas.height = h;
  context.configure({
    device,
    format,
    alphaMode: 'opaque',
  });
}
resizeCanvas();
addEventListener('resize', resizeCanvas);

function createFieldBuffer(label) {
  return device.createBuffer({
    label,
    size: BYTES_PER_FIELD,
    usage: GPUBufferUsage.STORAGE | GPUBufferUsage.COPY_DST | GPUBufferUsage.COPY_SRC,
  });
}
const velA = createFieldBuffer('velA');
const velB = createFieldBuffer('velB');
const dyeA = createFieldBuffer('dyeA');
const dyeB = createFieldBuffer('dyeB');

const uniformsArray = new Float32Array(16);
const uniformsBuffer = device.createBuffer({
  size: uniformsArray.byteLength,
  usage: GPUBufferUsage.UNIFORM | GPUBufferUsage.COPY_DST,
});

function clearBuffer(buf) {
  const zero = new Float32Array(BYTES_PER_FIELD / 4);
  device.queue.writeBuffer(buf, 0, zero);
}
function resetSim() {
  clearBuffer(velA);
  clearBuffer(velB);
  clearBuffer(dyeA);
  clearBuffer(dyeB);
}
resetBtn.onclick = resetSim;
resetSim();

const simShader = device.createShaderModule({
  label: 'simShader',
  code: `
struct Uniforms {
  grid : vec2f,
  dt : f32,
  time : f32,
  amp : f32,
  freq : f32,
  pitchBias : f32,
  swirl : f32,
  aspect : f32,
  resetFlag : f32,
  pad0 : f32,
  pad1 : f32,
  pad2 : f32,
};

@group(0) @binding(0) var<uniform> U : Uniforms;
@group(0) @binding(1) var<storage, read> velIn : array<vec4f>;
@group(0) @binding(2) var<storage, read_write> velOut : array<vec4f>;
@group(0) @binding(3) var<storage, read> dyeIn : array<vec4f>;
@group(0) @binding(4) var<storage, read_write> dyeOut : array<vec4f>;

fn idx(x: u32, y: u32) -> u32 {
  return y * u32(U.grid.x) + x;
}

fn clampCoord(x: i32, maxv: i32) -> i32 {
  return max(0, min(x, maxv));
}

fn sampleField(field: ptr<function, array<vec4f>>, p: vec2f) -> vec4f {
  let gx = U.grid.x;
  let gy = U.grid.y;
  let fp = vec2f(
    clamp(p.x, 0.0, gx - 1.001),
    clamp(p.y, 0.0, gy - 1.001)
  );
  let x0 = i32(floor(fp.x));
  let y0 = i32(floor(fp.y));
  let x1 = clampCoord(x0 + 1, i32(gx) - 1);
  let y1 = clampCoord(y0 + 1, i32(gy) - 1);
  let tx = fp.x - f32(x0);
  let ty = fp.y - f32(y0);

  let c00 = (*field)[idx(u32(x0), u32(y0))];
  let c10 = (*field)[idx(u32(x1), u32(y0))];
  let c01 = (*field)[idx(u32(x0), u32(y1))];
  let c11 = (*field)[idx(u32(x1), u32(y1))];

  let a = mix(c00, c10, tx);
  let b = mix(c01, c11, tx);
  return mix(a, b, ty);
}

fn wingState(t: f32) -> vec4f {
  let cy = 0.5 + U.amp * sin(2.0 * 3.14159265 * U.freq * t);
  let theta = 0.55 * U.amp * cos(2.0 * 3.14159265 * U.freq * t) + 0.35 * U.pitchBias * sin(4.0 * 3.14159265 * U.freq * t + 1.2);
  return vec4f(0.34, cy, theta, 0.16);
}

fn wingVelocity(t: f32) -> vec2f {
  let vy = U.amp * 2.0 * 3.14159265 * U.freq * cos(2.0 * 3.14159265 * U.freq * t);
  return vec2f(0.0, vy);
}

fn distanceToSegment(p: vec2f, a: vec2f, b: vec2f) -> f32 {
  let ab = b - a;
  let h = clamp(dot(p - a, ab) / max(dot(ab, ab), 1e-6), 0.0, 1.0);
  return length((p - a) - ab * h);
}

@compute @workgroup_size(${WORKGROUP}, ${WORKGROUP})
fn main(@builtin(global_invocation_id) gid: vec3u) {
  if (gid.x >= u32(U.grid.x) || gid.y >= u32(U.grid.y)) {
    return;
  }

  let i = idx(gid.x, gid.y);
  let cell = vec2f(f32(gid.x), f32(gid.y));
  let uv = (cell + vec2f(0.5, 0.5)) / U.grid;

  if (U.resetFlag > 0.5) {
    velOut[i] = vec4f(0.0);
    dyeOut[i] = vec4f(0.0);
    return;
  }

  var velArray : array<vec4f, 1>;
  var dyeArray : array<vec4f, 1>;
  // dummy arrays to satisfy pointers; actual indexing uses source arrays copied below
  // WGSL doesn't support taking a pointer to runtime arrays directly in every implementation,
  // so inline bilinear sampling is duplicated via source arrays.
  let gx = U.grid.x;
  let gy = U.grid.y;

  let back = cell - velIn[i].xy * U.dt * vec2f(gx / gy, 1.0) * 28.0;

  let fp = vec2f(
    clamp(back.x, 0.0, gx - 1.001),
    clamp(back.y, 0.0, gy - 1.001)
  );
  let x0 = i32(floor(fp.x));
  let y0 = i32(floor(fp.y));
  let x1 = clampCoord(x0 + 1, i32(gx) - 1);
  let y1 = clampCoord(y0 + 1, i32(gy) - 1);
  let tx = fp.x - f32(x0);
  let ty = fp.y - f32(y0);

  let vi00 = velIn[idx(u32(x0), u32(y0))];
  let vi10 = velIn[idx(u32(x1), u32(y0))];
  let vi01 = velIn[idx(u32(x0), u32(y1))];
  let vi11 = velIn[idx(u32(x1), u32(y1))];
  let di00 = dyeIn[idx(u32(x0), u32(y0))];
  let di10 = dyeIn[idx(u32(x1), u32(y0))];
  let di01 = dyeIn[idx(u32(x0), u32(y1))];
  let di11 = dyeIn[idx(u32(x1), u32(y1))];

  var vel = mix(mix(vi00, vi10, tx), mix(vi01, vi11, tx), ty);
  var dye = mix(mix(di00, di10, tx), mix(di01, di11, tx), ty);

  // simple viscosity / smoothing
  let xm = max(i32(gid.x) - 1, 0);
  let xp = min(i32(gid.x) + 1, i32(gx) - 1);
  let ym = max(i32(gid.y) - 1, 0);
  let yp = min(i32(gid.y) + 1, i32(gy) - 1);

  let vl = velIn[idx(u32(xm), gid.y)].xy;
  let vr = velIn[idx(u32(xp), gid.y)].xy;
  let vb = velIn[idx(gid.x, u32(ym))].xy;
  let vt = velIn[idx(gid.x, u32(yp))].xy;
  let lap = (vl + vr + vb + vt - 4.0 * vel.xy);
  vel.xy += 0.11 * lap;

  vel.xy *= 0.994;
  dye.xyz *= 0.992;

  let w = wingState(U.time);
  let center = w.xy;
  let theta = w.z;
  let halfLen = w.w;
  let dir = vec2f(cos(theta), sin(theta));
  let nrm = vec2f(-dir.y, dir.x);
  let a = center - dir * halfLen;
  let b = center + dir * halfLen;
  let d = distanceToSegment(uv, a, b);

  let wingVel = wingVelocity(U.time);
  let thickness = 0.024;
  let nearWing = exp(-pow(d / thickness, 2.0));

  // push air downward/backward on downstroke; weaker opposite on upstroke
  let stroke = wingVel.y;
  let momentum = nearWing * (0.16 + abs(stroke) * 1.8);
  vel.xy += (wingVel * 0.9 - dir * 0.10 * abs(stroke)) * nearWing;

  // leading/trailing edge vortices
  let rel = uv - center;
  let span = dot(rel, dir);
  let side = sign(span);
  let edgeMask = exp(-pow((abs(span) - halfLen) / 0.05, 2.0));
  let core = exp(-pow(dot(rel, nrm) / 0.03, 2.0));
  let swirlDir = nrm * side * sign(stroke + 1e-4);
  vel.xy += swirlDir * U.swirl * edgeMask * core * 0.035;

  // solid-ish wing region: drag local flow toward wing motion
  let bodyMask = exp(-pow(d / 0.016, 2.0)) * exp(-pow(span / (halfLen * 1.1), 6.0));
  vel.xy = mix(vel.xy, wingVel + dir * 0.12 * sign(-stroke), clamp(bodyMask * 0.75, 0.0, 1.0));

  // inject dye to visualize wake
  let wake = max(0.0, dot(normalize(vec2f(1.0, 0.1)), vel.xy + vec2f(0.001, 0.0)));
  let warm = vec3f(0.98, 0.83, 0.38);
  let cool = vec3f(0.22, 0.72, 1.0);
  let tint = mix(cool, warm, clamp(abs(stroke) * 0.8, 0.0, 1.0));
  dye.xyz += tint * (0.018 * nearWing + 0.010 * edgeMask * core + wake * 0.0015);
  dye.w = 1.0;

  // mild rightward flow so wake trails behind wing
  vel.x += 0.0018;

  velOut[i] = vec4f(vel.xy, 0.0, 0.0);
  dyeOut[i] = vec4f(dye.xyz, 1.0);
}
`
});

const renderShader = device.createShaderModule({
  label: 'renderShader',
  code: `
struct Uniforms {
  grid : vec2f,
  dt : f32,
  time : f32,
  amp : f32,
  freq : f32,
  pitchBias : f32,
  swirl : f32,
  aspect : f32,
  resetFlag : f32,
  pad0 : f32,
  pad1 : f32,
  pad2 : f32,
};

@group(0) @binding(0) var<uniform> U : Uniforms;
@group(0) @binding(1) var<storage, read> vel : array<vec4f>;
@group(0) @binding(2) var<storage, read> dye : array<vec4f>;

struct VSOut {
  @builtin(position) pos : vec4f,
  @location(0) uv : vec2f,
};

fn idx(x: u32, y: u32) -> u32 {
  return y * u32(U.grid.x) + x;
}

@vertex
fn vsMain(@builtin(vertex_index) vi: u32) -> VSOut {
  var pos = array<vec2f, 6>(
    vec2f(-1.0, -1.0),
    vec2f( 1.0, -1.0),
    vec2f(-1.0,  1.0),
    vec2f(-1.0,  1.0),
    vec2f( 1.0, -1.0),
    vec2f( 1.0,  1.0)
  );
  var out : VSOut;
  out.pos = vec4f(pos[vi], 0.0, 1.0);
  out.uv = pos[vi] * 0.5 + 0.5;
  return out;
}

@fragment
fn fsMain(in: VSOut) -> @location(0) vec4f {
  let p = vec2u(
    min(u32(in.uv.x * U.grid.x), u32(U.grid.x) - 1u),
    min(u32((1.0 - in.uv.y) * U.grid.y), u32(U.grid.y) - 1u)
  );
  let i = idx(p.x, p.y);
  let v = vel[i].xy;
  let d = dye[i].xyz;

  let speed = length(v) * 16.0;
  let base = vec3f(0.02, 0.05, 0.09);
  let flow = vec3f(0.10, 0.35, 0.65) * speed;
  var color = base + d + flow;

  // overlay wing
  let t = U.time;
  let cy = 0.5 + U.amp * sin(2.0 * 3.14159265 * U.freq * t);
  let theta = 0.55 * U.amp * cos(2.0 * 3.14159265 * U.freq * t) + 0.35 * U.pitchBias * sin(4.0 * 3.14159265 * U.freq * t + 1.2);
  let center = vec2f(0.34, cy);
  let dir = vec2f(cos(theta), sin(theta));
  let nrm = vec2f(-dir.y, dir.x);
  let rel = vec2f(in.uv.x, 1.0 - in.uv.y) - center;
  let span = dot(rel, dir);
  let chord = dot(rel, nrm);
  let halfLen = 0.16;
  let wingMask = smoothstep(0.022, 0.0, abs(chord)) * smoothstep(0.18, 0.14, abs(span));
  color = mix(color, vec3f(0.92, 0.95, 0.98), wingMask);

  // grid subtle
  let gx = abs(fract(in.uv.x * 24.0) - 0.5);
  let gy = abs(fract(in.uv.y * 14.0) - 0.5);
  let grid = smoothstep(0.495, 0.5, max(gx, gy)) * 0.04;
  color += grid;

  color = pow(color, vec3f(0.82));
  return vec4f(color, 1.0);
}
`
});

const simBindGroupLayout = device.createBindGroupLayout({
  entries: [
    { binding: 0, visibility: GPUShaderStage.COMPUTE, buffer: { type: 'uniform' } },
    { binding: 1, visibility: GPUShaderStage.COMPUTE, buffer: { type: 'read-only-storage' } },
    { binding: 2, visibility: GPUShaderStage.COMPUTE, buffer: { type: 'storage' } },
    { binding: 3, visibility: GPUShaderStage.COMPUTE, buffer: { type: 'read-only-storage' } },
    { binding: 4, visibility: GPUShaderStage.COMPUTE, buffer: { type: 'storage' } },
  ],
});

const renderBindGroupLayout = device.createBindGroupLayout({
  entries: [
    { binding: 0, visibility: GPUShaderStage.VERTEX | GPUShaderStage.FRAGMENT, buffer: { type: 'uniform' } },
    { binding: 1, visibility: GPUShaderStage.FRAGMENT, buffer: { type: 'read-only-storage' } },
    { binding: 2, visibility: GPUShaderStage.FRAGMENT, buffer: { type: 'read-only-storage' } },
  ],
});

const simPipeline = device.createComputePipeline({
  layout: device.createPipelineLayout({ bindGroupLayouts: [simBindGroupLayout] }),
  compute: { module: simShader, entryPoint: 'main' },
});

const renderPipeline = device.createRenderPipeline({
  layout: device.createPipelineLayout({ bindGroupLayouts: [renderBindGroupLayout] }),
  vertex: { module: renderShader, entryPoint: 'vsMain' },
  fragment: { module: renderShader, entryPoint: 'fsMain', targets: [{ format }] },
  primitive: { topology: 'triangle-list' },
});

function makeSimBindGroup(inVel, outVel, inDye, outDye) {
  return device.createBindGroup({
    layout: simBindGroupLayout,
    entries: [
      { binding: 0, resource: { buffer: uniformsBuffer } },
      { binding: 1, resource: { buffer: inVel } },
      { binding: 2, resource: { buffer: outVel } },
      { binding: 3, resource: { buffer: inDye } },
      { binding: 4, resource: { buffer: outDye } },
    ],
  });
}

function makeRenderBindGroup(vel, dye) {
  return device.createBindGroup({
    layout: renderBindGroupLayout,
    entries: [
      { binding: 0, resource: { buffer: uniformsBuffer } },
      { binding: 1, resource: { buffer: vel } },
      { binding: 2, resource: { buffer: dye } },
    ],
  });
}

let ping = 0;
let lastTime = performance.now();
let simTime = 0;

function frame(now) {
  const dt = Math.min(0.033, (now - lastTime) * 0.001 || 0.016);
  lastTime = now;
  simTime += dt;

  uniformsArray[0] = GRID_W;
  uniformsArray[1] = GRID_H;
  uniformsArray[2] = dt;
  uniformsArray[3] = simTime;
  uniformsArray[4] = parseFloat(ampEl.value);
  uniformsArray[5] = parseFloat(freqEl.value);
  uniformsArray[6] = parseFloat(pitchEl.value);
  uniformsArray[7] = parseFloat(swirlEl.value);
  uniformsArray[8] = canvas.width / Math.max(1, canvas.height);
  uniformsArray[9] = 0;
  device.queue.writeBuffer(uniformsBuffer, 0, uniformsArray);

  const inVel = ping === 0 ? velA : velB;
  const outVel = ping === 0 ? velB : velA;
  const inDye = ping === 0 ? dyeA : dyeB;
  const outDye = ping === 0 ? dyeB : dyeA;

  const simBindGroup = makeSimBindGroup(inVel, outVel, inDye, outDye);
  const renderBindGroup = makeRenderBindGroup(outVel, outDye);

  const encoder = device.createCommandEncoder();

  const cpass = encoder.beginComputePass();
  cpass.setPipeline(simPipeline);
  cpass.setBindGroup(0, simBindGroup);
  cpass.dispatchWorkgroups(Math.ceil(GRID_W / WORKGROUP), Math.ceil(GRID_H / WORKGROUP));
  cpass.end();

  const view = context.getCurrentTexture().createView();
  const rpass = encoder.beginRenderPass({
    colorAttachments: [{
      view,
      clearValue: { r: 0.01, g: 0.02, b: 0.035, a: 1 },
      loadOp: 'clear',
      storeOp: 'store',
    }],
  });
  rpass.setPipeline(renderPipeline);
  rpass.setBindGroup(0, renderBindGroup);
  rpass.draw(6);
  rpass.end();

  device.queue.submit([encoder.finish()]);
  ping = 1 - ping;
  requestAnimationFrame(frame);
}

requestAnimationFrame(frame);
</script>
</body>
</html>
