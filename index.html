
<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>鳥の翼 研究モード C</title>
<style>
  html,body{
    margin:0; padding:0; width:100%; height:100%; overflow:hidden;
    background:#06111a; color:#eaf6ff;
    font-family:system-ui,-apple-system,"Segoe UI",sans-serif;
  }
  #wrap{position:fixed; inset:0; display:grid; grid-template-rows:auto 1fr;}
  #ui{
    background:linear-gradient(180deg, rgba(4,16,25,.96), rgba(5,20,32,.90));
    border-bottom:1px solid rgba(255,255,255,.08);
    padding:10px 12px 8px;
    backdrop-filter:blur(6px);
    z-index:10;
  }
  .row{display:flex; align-items:center; gap:10px; margin:8px 0; flex-wrap:wrap;}
  label{min-width:108px; font-size:16px;}
  input[type="range"]{width:180px; max-width:46vw;}
  button{
    background:#113042; color:#d7e9ff; border:1px solid rgba(255,255,255,.12);
    border-radius:12px; padding:10px 16px; font-size:15px;
  }
  .pill{
    display:inline-block; font-size:12px; padding:3px 8px; border-radius:999px;
    background:rgba(77,163,255,.10); border:1px solid rgba(77,163,255,.22); color:#cfe6ff;
  }
  #msg{color:#b7c9d8; font-size:13px; line-height:1.35; margin-top:6px;}
  canvas{width:100%; height:100%; display:block; touch-action:none;}
</style>
</head>
<body>
<div id="wrap">
  <div id="ui">
    <div class="row">
      <label>羽ばたき振幅</label>
      <input id="amp" type="range" min="10" max="120" value="46" />
    </div>
    <div class="row">
      <label>周波数</label>
      <input id="freq" type="range" min="20" max="180" value="62" />
    </div>
    <div class="row">
      <label>迎角ねじり</label>
      <input id="twist" type="range" min="0" max="100" value="52" />
    </div>
    <div class="row">
      <label>渦の強さ</label>
      <input id="strength" type="range" min="10" max="160" value="54" />
      <button id="reset">リセット</button>
      <span class="pill">C: 見た目+物理</span>
    </div>
    <div id="msg">
      非対称羽ばたき、羽の束、先端ねじれ、8の字寄り軌道、簡易揚力・推力メーターを統合した版です。指で流れを乱せます。
    </div>
  </div>
  <canvas id="cv"></canvas>
</div>

<script>
(() => {
  const canvas = document.getElementById('cv');
  const ctx = canvas.getContext('2d', { alpha:false });

  const ampEl = document.getElementById('amp');
  const freqEl = document.getElementById('freq');
  const twistEl = document.getElementById('twist');
  const strengthEl = document.getElementById('strength');
  const resetBtn = document.getElementById('reset');

  let W=0, H=0, DPR=Math.min(devicePixelRatio||1, 2);
  let vortices=[], tracers=[], touches=[];
  let simT=0, prevStrokeVel=0, emissionCooldown=0;
  let liftVal=0, thrustVal=0, liftAvg=0, thrustAvg=0;

  const MAX_VORTICES = 78;
  const MAX_TRACERS = 900;
  const rand = (a,b)=>a+Math.random()*(b-a);

  function resize(){
    const uiH = document.getElementById('ui').getBoundingClientRect().height;
    W = innerWidth; H = innerHeight - uiH;
    canvas.width = Math.floor(W*DPR);
    canvas.height = Math.floor(H*DPR);
    canvas.style.width = W+'px';
    canvas.style.height = H+'px';
    ctx.setTransform(DPR,0,0,DPR,0,0);
    seed();
  }

  function params(){
    return {
      amp:+ampEl.value,
      freq:+freqEl.value/60,
      twist:+twistEl.value/100,
      strength:+strengthEl.value/100
    };
  }

  function seed(){
    tracers.length=0;
    vortices.length=0;
    for(let i=0;i<MAX_TRACERS;i++){
      const x=rand(0,W), y=rand(0,H);
      tracers.push({
        x,y,px:x,py:y,
        age:rand(0,160),
        life:rand(70,160),
        a:rand(0.03,0.09)
      });
    }
  }

  function resetAll(){
    simT=0; prevStrokeVel=0; emissionCooldown=0;
    touches.length=0;
    liftVal=thrustVal=liftAvg=thrustAvg=0;
    seed();
  }

  function localToWorld(x,y,ox,oy,ang){
    const c=Math.cos(ang), s=Math.sin(ang);
    return {x:ox+x*c-y*s, y:oy+x*s+y*c};
  }

  function wingState(t){
    const p = params();
    const ph = t * p.freq * Math.PI * 2;

    const bodyX = W * 0.50 + 4*Math.sin(ph)*0.2;
    const bodyY = H * 0.55 + p.amp*0.04*Math.sin(ph-0.3);

    const vy = p.amp * p.freq * Math.PI * 2 * Math.cos(ph);
    const s = Math.sin(ph), c = Math.cos(ph);

    const down = Math.max(0, s);
    const up = Math.max(0, -s);

    // Eight-ish path for shoulder line and body bob
    const shoulderLift = p.amp * 0.72 * s;
    const shoulderFore = 10 * Math.sin(2*ph) * 0.35;

    // Asymmetric flapping
    const fold = 0.14 + 0.64 * up;
    const spread = 0.74 + 0.40 * down;

    const humerus = Math.min(54, Math.max(30, W*0.050)) * (0.97 + 0.03*down);
    const ulna    = Math.min(100, Math.max(64, W*0.100)) * (1.00 - 0.26*fold);
    const hand    = Math.min(78, Math.max(44, W*0.078)) * (1.00 - 0.20*fold);

    const shoulderSpread = Math.min(25, Math.max(10, W*0.022));
    const shoulderY = bodyY - 10 + shoulderLift;
    const shoulderXCenter = bodyX + shoulderFore;

    const base = -Math.PI/2 + 0.90*s;
    const elbowDrive = 0.34*p.twist*(0.25 + 0.90*down) - 0.30*fold;
    const wristDrive = 0.30*p.twist*(0.20 + 1.05*down) - 0.42*fold;

    const a1 = base;
    const a2 = base + elbowDrive + 0.12*Math.sin(ph - 0.45);
    const a3 = a2 + wristDrive + 0.18*Math.sin(ph - 0.9);

    return {
      ph, s, c, vy, down, up, fold, spread,
      bodyX, bodyY, shoulderSpread, shoulderY, shoulderXCenter,
      humerus, ulna, hand,
      a1, a2, a3,
      bodyTilt: 0.03*Math.sin(ph+0.4),
      tailFan: 0.24 + 0.24*down
    };
  }

  function wingJoints(ws, side){
    const dir = side === 'left' ? -1 : 1;
    const shX = ws.shoulderXCenter + dir*ws.shoulderSpread;
    const shY = ws.shoulderY;

    // perfectly synchronized, mirrored only in x
    const a1 = side === 'left' ? Math.PI - ws.a1 : ws.a1;
    const a2 = side === 'left' ? Math.PI - ws.a2 : ws.a2;
    const a3 = side === 'left' ? Math.PI - ws.a3 : ws.a3;

    const elbowX = shX + Math.cos(a1)*ws.humerus;
    const elbowY = shY + Math.sin(a1)*ws.humerus;
    const wristX = elbowX + Math.cos(a2)*ws.ulna;
    const wristY = elbowY + Math.sin(a2)*ws.ulna;
    const tipX   = wristX + Math.cos(a3)*ws.hand;
    const tipY   = wristY + Math.sin(a3)*ws.hand;
    return {shX, shY, elbowX, elbowY, wristX, wristY, tipX, tipY, a1, a2, a3};
  }

  function emitVortex(x,y,gamma,r){
    vortices.push({x,y,gamma,r,age:0,life:rand(2.8,5.3)});
    if(vortices.length>MAX_VORTICES){
      vortices.splice(0, vortices.length-MAX_VORTICES);
    }
  }

  function velocityAt(x,y){
    const p = params();
    let u = 22 + p.freq*10;
    let v = 0;

    for(const q of vortices){
      const dx=x-q.x, dy=y-q.y;
      const rr=dx*dx+dy*dy+q.r*q.r;
      const f=q.gamma/rr;
      u += -dy*f;
      v +=  dx*f;
    }

    for(const tp of touches){
      const dx=x-tp.x, dy=y-tp.y;
      const rr=dx*dx+dy*dy+220;
      const pull=600/rr;
      u += tp.vx*pull;
      v += tp.vy*pull;
    }
    return {u,v};
  }

  function computeForces(){
    let lift=0, thrust=0, n=0;
    const x0=W*0.16, x1=W*0.84;
    const y0=H*0.14, y1=H*0.86;
    for(const tr of tracers){
      if(tr.x<x0||tr.x>x1||tr.y<y0||tr.y>y1) continue;
      const vel=velocityAt(tr.x,tr.y);
      lift += -vel.v;
      thrust += vel.u;
      n++;
    }
    liftVal = n ? lift/n : 0;
    thrustVal = n ? thrust/n : 0;
    liftAvg = liftAvg*0.92 + liftVal*0.08;
    thrustAvg = thrustAvg*0.92 + thrustVal*0.08;
  }

  function step(dt){
    simT += dt;
    const p = params();
    const ws = wingState(simT);
    const left = wingJoints(ws, 'left');
    const right = wingJoints(ws, 'right');

    emissionCooldown -= dt;
    const strokeSign = Math.sign(ws.vy || 1);
    const signFlip = Math.sign(prevStrokeVel || 1) !== strokeSign;
    prevStrokeVel = ws.vy;

    if(signFlip || (Math.abs(ws.vy)>60 && emissionCooldown<=0)){
      const gamma = (-strokeSign) * (26 + 78*p.strength + 36*p.twist);
      const r = 13 + 10*p.twist;
      for(const wing of [left,right]){
        emitVortex(wing.tipX, wing.tipY, gamma, r);
        emitVortex(wing.tipX + rand(-6,6), wing.tipY + strokeSign*rand(4,10), -gamma*0.30, r*0.82);
        emitVortex(wing.wristX + rand(-4,4), wing.wristY + strokeSign*rand(2,7), gamma*0.34, r*0.68);
      }
      emissionCooldown = 0.15 + (1.0 - p.freq)*0.05;
    }

    for(let i=vortices.length-1;i>=0;i--){
      const q=vortices[i];
      q.age += dt;
      if(q.age>q.life){ vortices.splice(i,1); continue; }

      let u = 24 + p.freq*11;
      let v = 0;
      for(let j=0;j<vortices.length;j++){
        if(i===j) continue;
        const o=vortices[j];
        const dx=q.x-o.x, dy=q.y-o.y;
        const rr=dx*dx+dy*dy+o.r*o.r;
        const f=o.gamma/rr;
        u += -dy*f*0.30;
        v +=  dx*f*0.30;
      }
      q.x += u*dt;
      q.y += v*dt;
      q.gamma *= Math.pow(0.985, dt*60);
      q.r += 1.0*dt*60;

      if(q.x>W+80||q.x<-80||q.y<-90||q.y>H+90) vortices.splice(i,1);
    }

    for(const tr of tracers){
      tr.age += dt*60;
      tr.px = tr.x; tr.py = tr.y;
      const vel = velocityAt(tr.x,tr.y);
      tr.x += vel.u*dt;
      tr.y += vel.v*dt;
      if(tr.x<-15||tr.x>W+15||tr.y<-15||tr.y>H+15||tr.age>tr.life){
        tr.x = rand(-10, W*0.12);
        tr.y = rand(0, H);
        tr.px=tr.x; tr.py=tr.y; tr.age=0; tr.life=rand(70,150);
      }
    }

    for(let i=touches.length-1;i>=0;i--){
      touches[i].life -= dt;
      if(touches[i].life<=0) touches.splice(i,1);
    }

    computeForces();
  }

  function drawBackground(){
    ctx.fillStyle='#07111b';
    ctx.fillRect(0,0,W,H);
    ctx.strokeStyle='rgba(70,140,210,0.030)';
    ctx.lineWidth=1;
    for(let y=0;y<H;y+=18){
      ctx.beginPath();
      ctx.moveTo(0,y);
      for(let x=0;x<=W;x+=24){
        ctx.lineTo(x, y + Math.sin((x*0.018)+(y*0.014)+simT*0.9)*1.2);
      }
      ctx.stroke();
    }
  }

  function drawTracers(){
    for(const tr of tracers){
      const k = 1 - tr.age/tr.life;
      ctx.strokeStyle = `rgba(220,235,255,${0.036 + tr.a*k})`;
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(tr.px,tr.py);
      ctx.lineTo(tr.x,tr.y);
      ctx.stroke();
    }
  }

  function drawVortices(){
    for(const q of vortices){
      const k = 1 - q.age/q.life;
      const r = Math.max(4, q.r*0.38);
      ctx.fillStyle = q.gamma>0 ? `rgba(110,180,255,${0.045*k})` : `rgba(255,135,180,${0.045*k})`;
      ctx.beginPath();
      ctx.arc(q.x,q.y,r*1.5,0,Math.PI*2);
      ctx.fill();
      ctx.strokeStyle = q.gamma>0 ? `rgba(130,190,255,${0.13*k})` : `rgba(255,150,190,${0.13*k})`;
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.arc(q.x,q.y,r,0,Math.PI*1.5);
      ctx.stroke();
    }
  }

  function drawWing(ws, joint, side, depthScale=1){
    const {shX,shY,elbowX,elbowY,wristX,wristY,tipX,tipY,a1,a2,a3} = joint;
    const humW = 12*ws.spread*depthScale;
    const ulnaW = 18*(1-0.18*ws.fold)*depthScale;
    const handW = 11*(1-0.28*ws.fold)*depthScale;

    const nx1=-Math.sin(a1), ny1=Math.cos(a1);
    const nx2=-Math.sin(a2), ny2=Math.cos(a2);
    const nx3=-Math.sin(a3), ny3=Math.cos(a3);

    ctx.save();
    ctx.lineJoin='round';
    ctx.lineCap='round';

    // inner arm
    let g = ctx.createLinearGradient(shX,shY,elbowX,elbowY);
    g.addColorStop(0, `rgba(210,236,255,${0.84*depthScale})`);
    g.addColorStop(1, `rgba(112,176,245,${0.70*depthScale})`);
    ctx.fillStyle=g;
    ctx.strokeStyle=`rgba(235,245,255,${0.12*depthScale})`;
    ctx.lineWidth=1;

    ctx.beginPath();
    ctx.moveTo(shX + nx1*humW*0.34, shY + ny1*humW*0.34);
    ctx.quadraticCurveTo(
      shX + Math.cos(a1)*ws.humerus*0.28 + nx1*humW*0.14,
      shY + Math.sin(a1)*ws.humerus*0.28 + ny1*humW*0.14,
      elbowX + nx1*humW*0.10, elbowY + ny1*humW*0.10
    );
    ctx.lineTo(elbowX - nx1*humW*0.18, elbowY - ny1*humW*0.18);
    ctx.quadraticCurveTo(
      shX + Math.cos(a1)*ws.humerus*0.22 - nx1*humW*0.20,
      shY + Math.sin(a1)*ws.humerus*0.22 - ny1*humW*0.20,
      shX - nx1*humW*0.14, shY - ny1*humW*0.14
    );
    ctx.closePath();
    ctx.fill(); ctx.stroke();

    // secondary surface
    g = ctx.createLinearGradient(elbowX,elbowY,wristX,wristY);
    g.addColorStop(0, `rgba(188,224,255,${0.78*depthScale})`);
    g.addColorStop(1, `rgba(88,150,232,${0.66*depthScale})`);
    ctx.fillStyle=g;
    ctx.beginPath();
    ctx.moveTo(elbowX + nx2*ulnaW*0.34, elbowY + ny2*ulnaW*0.34);
    ctx.quadraticCurveTo(
      elbowX + Math.cos(a2)*ws.ulna*0.40 + nx2*ulnaW*0.20,
      elbowY + Math.sin(a2)*ws.ulna*0.40 + ny2*ulnaW*0.20,
      wristX + nx2*ulnaW*0.10, wristY + ny2*ulnaW*0.10
    );
    ctx.lineTo(wristX - nx2*ulnaW*0.18, wristY - ny2*ulnaW*0.18);
    ctx.quadraticCurveTo(
      elbowX + Math.cos(a2)*ws.ulna*0.38 - nx2*ulnaW*0.18,
      elbowY + Math.sin(a2)*ws.ulna*0.38 - ny2*ulnaW*0.18,
      elbowX - nx2*ulnaW*0.28, elbowY - ny2*ulnaW*0.28
    );
    ctx.closePath();
    ctx.fill(); ctx.stroke();

    // covert feather rows
    for(let row=0; row<2; row++){
      for(let i=0;i<6;i++){
        const k=i/5;
        const bx = elbowX + Math.cos(a2)*(ws.ulna*(0.12+0.12*k));
        const by = elbowY + Math.sin(a2)*(ws.ulna*(0.12+0.12*k));
        const dir = side==='left' ? -1 : 1;
        const fang = a2 + dir*(-0.08 + 0.06*i) + dir*0.05*ws.down;
        const flen = 16 + 4*k + 5*ws.spread - row*3;
        const fwid = 4.0 - 0.4*k;
        const tx = bx + Math.cos(fang)*flen;
        const ty = by + Math.sin(fang)*flen;
        const fnx=-Math.sin(fang), fny=Math.cos(fang);
        ctx.fillStyle = `rgba(188,222,255,${(0.26 - 0.02*k - row*0.05)*depthScale})`;
        ctx.beginPath();
        ctx.moveTo(bx + fnx*fwid, by + fny*fwid);
        ctx.quadraticCurveTo(
          bx + Math.cos(fang)*flen*0.55 + fnx*fwid*0.5,
          by + Math.sin(fang)*flen*0.55 + fny*fwid*0.5,
          tx, ty
        );
        ctx.quadraticCurveTo(
          bx + Math.cos(fang)*flen*0.44 - fnx*fwid*0.4,
          by + Math.sin(fang)*flen*0.44 - fny*fwid*0.4,
          bx - fnx*fwid*0.6, by - fny*fwid*0.6
        );
        ctx.closePath();
        ctx.fill();
      }
    }

    // primaries
    const featherCount=9;
    const dir = side==='left' ? -1 : 1;
    for(let i=0;i<featherCount;i++){
      const k=i/(featherCount-1);
      const baseX = wristX + Math.cos(a3)*(ws.hand*(0.12 + 0.10*k));
      const baseY = wristY + Math.sin(a3)*(ws.hand*(0.12 + 0.10*k));
      const twistSpread = (k*k) * (0.18 + 0.22*ws.down + 0.18*params().twist);
      const fang = a3 + dir*(-0.24 + 0.08*i) + dir*twistSpread - dir*0.12*ws.up;
      const flen = 30 + 18*k + 10*ws.spread;
      const fwid = 5.2 - 0.45*k;
      const tx = baseX + Math.cos(fang)*flen;
      const ty = baseY + Math.sin(fang)*flen;
      const fnx=-Math.sin(fang), fny=Math.cos(fang);

      ctx.fillStyle = `rgba(192,226,255,${(0.70 - 0.045*k)*depthScale})`;
      ctx.strokeStyle = `rgba(225,242,255,${0.10*depthScale})`;
      ctx.lineWidth=0.75;

      ctx.beginPath();
      ctx.moveTo(baseX + fnx*fwid, baseY + fny*fwid);
      ctx.quadraticCurveTo(
        baseX + Math.cos(fang)*flen*0.56 + fnx*fwid*0.7,
        baseY + Math.sin(fang)*flen*0.56 + fny*fwid*0.7,
        tx, ty
      );
      ctx.quadraticCurveTo(
        baseX + Math.cos(fang)*flen*0.46 - fnx*fwid*0.42,
        baseY + Math.sin(fang)*flen*0.46 - fny*fwid*0.42,
        baseX - fnx*fwid*0.68, baseY - fny*fwid*0.68
      );
      ctx.closePath();
      ctx.fill(); ctx.stroke();
    }

    ctx.restore();
  }

  function drawBody(ws){
    ctx.save();
    ctx.translate(ws.bodyX, ws.bodyY);

    const bodyGrad = ctx.createRadialGradient(-6,-10,1,0,0,44);
    bodyGrad.addColorStop(0,'rgba(226,240,255,0.94)');
    bodyGrad.addColorStop(0.38,'rgba(122,182,248,0.76)');
    bodyGrad.addColorStop(1,'rgba(40,100,185,0.08)');
    ctx.fillStyle = bodyGrad;
    ctx.beginPath();
    ctx.ellipse(0,8,28,38,0,0,Math.PI*2);
    ctx.fill();

    ctx.fillStyle='rgba(184,222,255,0.40)';
    ctx.beginPath();
    ctx.ellipse(0,-20,15,17,0,0,Math.PI*2);
    ctx.fill();

    ctx.fillStyle='rgba(30,55,84,0.78)';
    ctx.beginPath();
    ctx.arc(-4,-22,1.6,0,Math.PI*2);
    ctx.arc(4,-22,1.6,0,Math.PI*2);
    ctx.fill();

    ctx.fillStyle='rgba(220,190,120,0.70)';
    ctx.beginPath();
    ctx.moveTo(0,-17);
    ctx.lineTo(-5,-11);
    ctx.lineTo(5,-11);
    ctx.closePath();
    ctx.fill();

    ctx.strokeStyle='rgba(235,245,255,0.18)';
    ctx.lineWidth=1;
    ctx.beginPath();
    ctx.moveTo(0,-3);
    ctx.lineTo(0,24);
    ctx.stroke();

    for(let i=0;i<5;i++){
      const k=i/4;
      const fang = Math.PI/2 + (-0.28 + 0.14*i)*(0.40 + 0.50*ws.down);
      const flen = 16 + 10*(1 - Math.abs(k-0.5)*2);
      const bx = (k-0.5)*8;
      const by = 36;
      const tx = bx + Math.cos(fang)*flen;
      const ty = by + Math.sin(fang)*flen;
      const fnx=-Math.sin(fang), fny=Math.cos(fang);
      ctx.fillStyle='rgba(176,216,252,0.62)';
      ctx.beginPath();
      ctx.moveTo(bx + fnx*3.8, by + fny*3.8);
      ctx.quadraticCurveTo(
        bx + Math.cos(fang)*flen*0.56 + fnx*1.8,
        by + Math.sin(fang)*flen*0.56 + fny*1.8,
        tx, ty
      );
      ctx.quadraticCurveTo(
        bx + Math.cos(fang)*flen*0.44 - fnx*1.6,
        by + Math.sin(fang)*flen*0.44 - fny*1.6,
        bx - fnx*2.8, by - fny*2.8
      );
      ctx.closePath();
      ctx.fill();
    }

    ctx.restore();
  }

  function drawBird(){
    const ws = wingState(simT);
    const left = wingJoints(ws,'left');
    const right = wingJoints(ws,'right');
    drawWing(ws,left,'left',0.95);
    drawBody(ws);
    drawWing(ws,right,'right',0.95);
  }

  function drawMeter(){
    const boxX=10, boxY=10, boxW=190, boxH=86;
    ctx.fillStyle='rgba(4,12,20,0.68)';
    ctx.fillRect(boxX,boxY,boxW,boxH);
    ctx.strokeStyle='rgba(180,220,255,0.16)';
    ctx.lineWidth=1;
    ctx.strokeRect(boxX,boxY,boxW,boxH);

    ctx.fillStyle='rgba(230,245,255,0.92)';
    ctx.font='13px system-ui, sans-serif';
    ctx.fillText(`↑ 揚力: ${liftVal.toFixed(2)}`, boxX+10, boxY+22);
    ctx.fillText(`→ 推力: ${thrustVal.toFixed(2)}`, boxX+10, boxY+44);
    ctx.fillText(`平均 揚力: ${liftAvg.toFixed(2)}`, boxX+10, boxY+66);
    ctx.fillText(`平均 推力: ${thrustAvg.toFixed(2)}`, boxX+10, boxY+84);

    const liftBar=Math.max(-50,Math.min(50,liftAvg*2.0));
    const thrustBar=Math.max(0,Math.min(90,thrustAvg*1.0));
    ctx.fillStyle='rgba(90,170,255,0.75)';
    ctx.fillRect(boxX+122, boxY+13, Math.max(0,liftBar), 6);
    ctx.fillStyle='rgba(255,150,190,0.75)';
    ctx.fillRect(boxX+122, boxY+35, thrustBar, 6);
  }

  function drawLabel(){
    ctx.fillStyle='rgba(210,225,240,0.22)';
    ctx.font='12px system-ui, sans-serif';
    ctx.fillText('鳥の正面2枚翼 同期版 + メーター', 10, H-12);
  }

  let lastStamp = performance.now();
  function loop(now){
    const dt=Math.min(0.033,(now-lastStamp)/1000);
    lastStamp=now;
    step(dt);
    drawBackground();
    drawTracers();
    drawVortices();
    drawBird();
    drawMeter();
    drawLabel();
    requestAnimationFrame(loop);
  }

  function pointerPos(ev){
    const r=canvas.getBoundingClientRect();
    if(ev.touches && ev.touches.length){
      return Array.from(ev.touches).map(t=>({x:t.clientX-r.left, y:t.clientY-r.top}));
    }
    return [{x:ev.clientX-r.left, y:ev.clientY-r.top}];
  }

  let lastTouchPts=[];
  function handleTouch(ev){
    const pts=pointerPos(ev);
    const next=[];
    for(let i=0;i<pts.length;i++){
      const p=pts[i];
      const prev=lastTouchPts[i]||p;
      next.push(p);
      touches.push({
        x:p.x, y:p.y,
        vx:(p.x-prev.x)*7,
        vy:(p.y-prev.y)*7,
        life:0.20
      });
    }
    lastTouchPts=next;
    ev.preventDefault();
  }
  function endTouch(){ lastTouchPts=[]; }

  canvas.addEventListener('touchstart',handleTouch,{passive:false});
  canvas.addEventListener('touchmove',handleTouch,{passive:false});
  canvas.addEventListener('touchend',endTouch,{passive:false});
  canvas.addEventListener('mousedown',(e)=>handleTouch(e));
  canvas.addEventListener('mousemove',(e)=>{ if(e.buttons) handleTouch(e); });
  canvas.addEventListener('mouseup',endTouch);

  resetBtn.addEventListener('click',resetAll);
  window.addEventListener('resize',resize);

  resize();
  resetAll();
  requestAnimationFrame(loop);
})();
</script>
</body>
</html>
